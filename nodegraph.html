<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Node Graph — Resolve Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0b;
  --surface: #111113;
  --surface2: #18181c;
  --surface3: #1e1e24;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #e8e6e0;
  --muted: #6b6966;
  --accent: #c8f060;
  --accent2: #60b8f0;
  --font-head: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --font-mono: 'DM Mono', monospace;
}
body { background:var(--bg); color:var(--text); font-family:var(--font-body); font-weight:300; height:100vh; overflow:hidden; display:flex; flex-direction:column; }

/* ── HEADER ── */
header { border-bottom:1px solid var(--border); padding:0 1.5rem; display:flex; align-items:center; justify-content:space-between; height:52px; background:var(--bg); z-index:20; flex-shrink:0; }
.logo { font-family:var(--font-head); font-weight:700; font-size:1rem; letter-spacing:-0.02em; color:var(--text); text-decoration:none; }
.logo span { color:var(--accent); }
.header-actions { display:flex; gap:8px; align-items:center; }
.btn { font-family:var(--font-body); font-size:12px; padding:5px 12px; border-radius:5px; border:1px solid var(--border2); background:transparent; color:var(--muted); cursor:pointer; text-decoration:none; transition:all .15s; display:inline-flex; align-items:center; gap:5px; white-space:nowrap; }
.btn:hover { color:var(--text); border-color:rgba(255,255,255,.2); }
.btn.active { color:var(--accent); border-color:rgba(200,240,96,.4); background:rgba(200,240,96,.06); }
.btn-accent { background:var(--accent); color:#0a0a0b; border-color:transparent; font-weight:500; }
.btn-accent:hover { background:#d4f570; color:#0a0a0b; }

/* ── LAYOUT ── */
.app { display:flex; flex:1; overflow:hidden; }

/* ── LEFT TOOLBAR ── */
.toolbar { width:220px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; flex-shrink:0; }
.tb-section { padding:10px; border-bottom:1px solid var(--border); }
.tb-label { font-size:9px; font-family:var(--font-mono); text-transform:uppercase; letter-spacing:.1em; color:var(--muted); margin-bottom:8px; }

/* Node search + dropdown */
.node-add-wrap { position:relative; }
.node-add-input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:5px; padding:7px 10px; color:var(--text); font-family:var(--font-mono); font-size:10px; outline:none; transition:border-color .15s; }
.node-add-input:focus { border-color:var(--border2); }
.node-add-input::placeholder { color:var(--muted); }
.node-add-dropdown { position:absolute; left:0; right:0; top:100%; margin-top:3px; background:var(--surface); border:1px solid var(--border2); border-radius:6px; z-index:50; max-height:200px; overflow-y:auto; display:none; box-shadow:0 8px 32px rgba(0,0,0,.6); }
.node-add-dropdown.open { display:block; }
.nad-item { padding:6px 10px; font-size:11px; font-family:var(--font-mono); color:var(--muted); cursor:pointer; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); transition:background .1s, color .1s; }
.nad-item:last-child { border-bottom:none; }
.nad-item:hover, .nad-item.focused { background:var(--surface2); color:var(--text); }
.nad-cat { font-size:8px; opacity:.4; text-transform:uppercase; letter-spacing:.04em; }
.nad-add { color:var(--accent2); }
.nad-add:hover { background:rgba(96,184,240,.07); color:var(--accent2); }
.nad-add-btn { width:100%; margin-top:6px; font-size:10px; font-family:var(--font-mono); padding:6px; border-radius:4px; border:1px solid rgba(200,240,96,.3); background:rgba(200,240,96,.05); color:var(--accent); cursor:pointer; text-align:center; transition:all .12s; }
.nad-add-btn:hover { background:rgba(200,240,96,.12); }

/* Saved graphs */
.saved-list { overflow-y:auto; flex:1; }
.saved-item { display:flex; align-items:center; gap:8px; padding:8px 10px; border-bottom:1px solid var(--border); cursor:pointer; transition:background .1s; }
.saved-item:hover { background:var(--surface2); }
.saved-item-name { font-size:11px; font-family:var(--font-head); color:var(--text); flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.saved-item-meta { font-size:9px; font-family:var(--font-mono); color:var(--muted); }
.saved-item-del { font-size:8px; padding:2px 5px; border:1px solid rgba(240,96,96,.25); border-radius:3px; background:transparent; color:#f06060; cursor:pointer; flex-shrink:0; opacity:0; transition:opacity .12s; }
.saved-item:hover .saved-item-del { opacity:1; }
.saved-empty { padding:1.5rem 10px; text-align:center; font-size:11px; color:var(--muted); font-family:var(--font-mono); }

/* ── CANVAS AREA ── */
.canvas-wrap { flex:1; position:relative; overflow:hidden; background:#0d0d10; }
#ng-canvas { position:absolute; inset:0; width:100%; height:100%; }

/* SVG connection layer */
#svg-layer { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; overflow:visible; }
#svg-layer .conn { pointer-events:stroke; cursor:pointer; }

/* Nodes on top of SVG */
#node-layer { position:absolute; inset:0; }

/* Canvas toolbar */
.canvas-tb { position:absolute; top:10px; left:50%; transform:translateX(-50%); display:flex; gap:6px; align-items:center; background:var(--surface); border:1px solid var(--border2); border-radius:8px; padding:5px 8px; z-index:10; box-shadow:0 4px 20px rgba(0,0,0,.5); }
.ctb-sep { width:1px; height:14px; background:var(--border); }
.ctb-btn { font-size:10px; font-family:var(--font-mono); padding:4px 9px; border-radius:4px; border:1px solid transparent; background:transparent; color:var(--muted); cursor:pointer; transition:all .12s; white-space:nowrap; }
.ctb-btn:hover { color:var(--text); background:rgba(255,255,255,.05); }
.ctb-zoom { color:var(--accent); font-size:10px; font-family:var(--font-mono); min-width:42px; text-align:center; }

/* Coord readout */
.canvas-coords { position:absolute; bottom:10px; left:12px; font-size:9px; font-family:var(--font-mono); color:rgba(255,255,255,.2); pointer-events:none; }

/* ── NODES ── */
.ng-node {
  position:absolute;
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:8px;
  min-width:140px;
  user-select:none;
  cursor:grab;
  transition:border-color .15s, box-shadow .15s;
  z-index:5;
}
.ng-node:active { cursor:grabbing; }
.ng-node.selected { border-color:rgba(200,240,96,.5); box-shadow:0 0 0 1px rgba(200,240,96,.18), 0 6px 24px rgba(0,0,0,.5); z-index:6; }
.ng-node-header { padding:7px 10px 6px; display:flex; align-items:center; gap:6px; border-bottom:1px solid var(--border); }
.ng-node-name { font-size:11px; font-family:var(--font-head); font-weight:600; color:var(--text); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.ng-node-close { font-size:10px; padding:0 3px; border:none; background:none; color:var(--muted); cursor:pointer; opacity:.4; transition:opacity .12s; line-height:1; flex-shrink:0; }
.ng-node-close:hover { opacity:1; color:#f06060; }
.ng-node-body { padding:8px 10px; display:flex; flex-direction:column; gap:6px; }
.ng-node-cat { font-size:8px; font-family:var(--font-mono); color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }

/* Ports */
.ng-ports { display:flex; flex-direction:column; gap:5px; }
.ng-port-row { display:flex; align-items:center; justify-content:space-between; gap:6px; min-height:18px; }
.ng-port-label { font-size:9px; font-family:var(--font-mono); color:var(--muted); }

/* Port hit targets (wider than visual) */
.ng-port { width:18px; height:18px; display:flex; align-items:center; justify-content:center; cursor:crosshair; position:relative; flex-shrink:0; }
.ng-port:hover .port-shape { filter:brightness(1.6); }

/* Square = output */
.port-square { width:10px; height:10px; background:#0d0d10; border:1.5px solid #60b8f0; border-radius:2px; pointer-events:none; transition:all .12s; }
/* Triangle = input */
.port-triangle { width:0; height:0; border-left:6px solid transparent; border-right:6px solid transparent; border-bottom:10px solid #c8f060; pointer-events:none; transition:all .12s; }
.ng-port.connected .port-square { background:rgba(96,184,240,.25); border-color:#60b8f0; }
.ng-port.connected .port-triangle { border-bottom-color:#c8f060; filter:brightness(1.2); }
.ng-port.port-highlight .port-square,
.ng-port.port-highlight .port-triangle { filter:brightness(2); }

/* Port add/remove */
.ng-port-actions { display:flex; gap:4px; margin-top:4px; }
.ng-port-btn { flex:1; font-size:8px; font-family:var(--font-mono); padding:3px 5px; border-radius:3px; border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; text-align:center; transition:all .12s; }
.ng-port-btn:hover { border-color:var(--border2); color:var(--text); }
.ng-port-btn.add-in { border-color:rgba(200,240,96,.2); color:rgba(200,240,96,.6); }
.ng-port-btn.add-in:hover { border-color:rgba(200,240,96,.5); color:var(--accent); }
.ng-port-btn.add-out { border-color:rgba(96,184,240,.2); color:rgba(96,184,240,.6); }
.ng-port-btn.add-out:hover { border-color:rgba(96,184,240,.5); color:var(--accent2); }
.ng-port-btn.rem-port { border-color:rgba(240,96,96,.2); color:rgba(240,96,96,.5); }
.ng-port-btn.rem-port:hover { border-color:rgba(240,96,96,.5); color:#f06060; }

/* ── RIGHT PANEL — connection colour ── */
.rpanel { width:180px; background:var(--surface); border-left:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; flex-shrink:0; }
.rp-section { padding:10px; border-bottom:1px solid var(--border); }
.rp-label { font-size:9px; font-family:var(--font-mono); text-transform:uppercase; letter-spacing:.1em; color:var(--muted); margin-bottom:8px; }
.conn-info { font-size:10px; font-family:var(--font-mono); color:var(--muted); line-height:1.6; }
.conn-info.has-sel { color:var(--text); }
.color-swatches { display:grid; grid-template-columns:repeat(5,1fr); gap:4px; margin-bottom:8px; }
.swatch { width:100%; aspect-ratio:1; border-radius:4px; border:2px solid transparent; cursor:pointer; transition:transform .12s, border-color .12s; }
.swatch:hover { transform:scale(1.15); }
.swatch.active { border-color:rgba(255,255,255,.5); }
.color-custom { display:flex; align-items:center; gap:6px; }
.color-custom label { font-size:9px; font-family:var(--font-mono); color:var(--muted); }
.color-custom input[type=color] { width:32px; height:24px; border:1px solid var(--border2); border-radius:4px; background:none; cursor:pointer; padding:0; }
.conn-del-btn { width:100%; font-size:10px; font-family:var(--font-mono); padding:5px; border-radius:4px; border:1px solid rgba(240,96,96,.25); background:transparent; color:#f06060; cursor:pointer; margin-top:6px; transition:all .12s; }
.conn-del-btn:hover { background:rgba(240,96,96,.08); }

/* Save to DB section */
.save-section { padding:10px; display:flex; flex-direction:column; gap:6px; }
.save-name-inp { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:5px; padding:7px 8px; color:var(--text); font-family:var(--font-body); font-size:11px; outline:none; transition:border-color .15s; }
.save-name-inp:focus { border-color:var(--accent); }
.save-name-inp::placeholder { color:var(--muted); }
.save-graph-btn { width:100%; font-size:10px; font-family:var(--font-mono); padding:6px; border-radius:4px; border:1px solid rgba(200,240,96,.3); background:rgba(200,240,96,.06); color:var(--accent); cursor:pointer; transition:all .12s; text-align:center; }
.save-graph-btn:hover { background:rgba(200,240,96,.14); }

/* Link to effect section */
.link-section { padding:10px; display:flex; flex-direction:column; gap:6px; flex:1; overflow:hidden; }
.effect-link-list { display:flex; flex-direction:column; gap:4px; overflow-y:auto; flex:1; }
.eff-link-item { display:flex; align-items:center; gap:5px; font-size:10px; font-family:var(--font-mono); color:var(--muted); padding:4px 6px; background:var(--surface2); border-radius:4px; }
.eff-link-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--text); }
.eff-link-del { font-size:8px; padding:1px 4px; border:1px solid rgba(240,96,96,.2); border-radius:2px; background:transparent; color:#f06060; cursor:pointer; flex-shrink:0; }
.eff-link-picker { position:relative; }
.eff-search-inp { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:5px; padding:6px 8px; color:var(--text); font-family:var(--font-mono); font-size:10px; outline:none; }
.eff-search-inp::placeholder { color:var(--muted); }
.eff-search-inp:focus { border-color:var(--border2); }
.eff-dropdown { position:absolute; left:0; right:0; bottom:100%; margin-bottom:3px; background:var(--surface); border:1px solid var(--border2); border-radius:6px; z-index:50; max-height:160px; overflow-y:auto; display:none; box-shadow:0 -8px 24px rgba(0,0,0,.5); }
.eff-dropdown.open { display:block; }
.eff-dd-item { padding:6px 10px; font-size:10px; font-family:var(--font-mono); color:var(--muted); cursor:pointer; border-bottom:1px solid var(--border); transition:background .1s; }
.eff-dd-item:hover { background:var(--surface2); color:var(--text); }

/* ── DRAWING CONNECTION LINE ── */
#drawing-svg { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; overflow:visible; z-index:15; }

/* ── TOAST ── */
.toast { position:fixed; top:68px; right:16px; background:var(--accent); color:#0a0a0b; padding:8px 18px; border-radius:8px; font-size:12px; font-weight:500; font-family:var(--font-body); opacity:0; transform:translateY(-6px); transition:all .22s; pointer-events:none; z-index:99; }
.toast.show { opacity:1; transform:translateY(0); }

/* ── GRID BACKGROUND ── */
.canvas-grid { position:absolute; inset:0; pointer-events:none; }
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html">Resolve<span>.</span>Library</a>
  <div class="header-actions">
    <a class="btn" href="index.html">Effect library</a>
    <a class="btn" href="videos.html">Video library</a>
    <a class="btn" href="spline.html">Spline editor</a>
    <a class="btn active" href="nodegraph.html">Node graph</a>
    <a class="btn" href="add.html">+ Add effect</a>
  </div>
</header>

<div class="app">

  <!-- ── LEFT TOOLBAR ── -->
  <div class="toolbar">
    <div class="tb-section">
      <div class="tb-label">Add node</div>
      <div class="node-add-wrap">
        <input class="node-add-input" id="nad-input" type="text" placeholder="Search node…" autocomplete="off"
          oninput="nadSearch()" onkeydown="nadKey(event)" onfocus="nadOpen()" onblur="setTimeout(nadClose,160)">
        <div class="node-add-dropdown" id="nad-dropdown"></div>
      </div>
      <button class="nad-add-btn" onclick="addNode('Custom')">+ Add custom node</button>
    </div>

    <div class="tb-section" style="flex-shrink:0">
      <div class="tb-label">Saved graphs</div>
    </div>
    <div class="saved-list" id="saved-list"></div>
  </div>

  <!-- ── CANVAS ── -->
  <div class="canvas-wrap" id="canvas-wrap">
    <!-- Grid bg drawn by canvas -->
    <canvas id="ng-canvas"></canvas>

    <!-- SVG arrows -->
    <svg id="svg-layer" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arr" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
          <path d="M0,0 L0,7 L7,3.5 Z" fill="currentColor"/>
        </marker>
      </defs>
    </svg>

    <!-- In-progress drag line -->
    <svg id="drawing-svg" xmlns="http://www.w3.org/2000/svg"></svg>

    <!-- Node DOM elements -->
    <div id="node-layer"></div>

    <!-- Canvas toolbar -->
    <div class="canvas-tb">
      <button class="ctb-btn" onclick="zoomBy(1.25)" title="Zoom in">＋</button>
      <button class="ctb-btn" onclick="zoomBy(1/1.25)" title="Zoom out">－</button>
      <button class="ctb-btn" onclick="zoomReset()">Reset view</button>
      <div class="ctb-sep"></div>
      <button class="ctb-btn" onclick="clearAll()">Clear canvas</button>
      <div class="ctb-sep"></div>
      <span class="ctb-zoom" id="zoom-label">100%</span>
    </div>

    <div class="canvas-coords" id="canvas-coords">x: 0 &nbsp;|&nbsp; y: 0</div>
  </div>

  <!-- ── RIGHT PANEL ── -->
  <div class="rpanel">
    <div class="rp-section">
      <div class="rp-label">Connection</div>
      <div class="conn-info" id="conn-info">Click an arrow to select it</div>
      <div id="conn-controls" style="display:none">
        <div class="color-swatches" id="color-swatches"></div>
        <div class="color-custom">
          <label>Custom</label>
          <input type="color" id="custom-color" value="#c8f060" oninput="setConnColor(this.value)">
        </div>
        <button class="conn-del-btn" onclick="deleteSelectedConn()">Remove connection</button>
      </div>
    </div>

    <div class="rp-section">
      <div class="rp-label">Save graph</div>
      <div class="save-section" style="padding:0">
        <input class="save-name-inp" id="save-name" type="text" placeholder="Graph name…">
        <button class="save-graph-btn" onclick="saveGraph()">Save to library</button>
      </div>
    </div>

    <div class="link-section">
      <div class="rp-label">Link to effect</div>
      <div class="effect-link-list" id="effect-link-list"></div>
      <div class="eff-link-picker">
        <input class="eff-search-inp" id="eff-search" type="text" placeholder="Find effect…" oninput="effSearch()" onfocus="effDDOpen()" onblur="setTimeout(effDDClose,160)">
        <div class="eff-dropdown" id="eff-dropdown"></div>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>

  {n:'Dissolve',c:'Merge'},{n:'DepthMerge',c:'Merge'},{n:'ColorComposite',c:'Merge'},
  {n:'pRender',c:'Particle'},{n:'pSpawn',c:'Particle'},{n:'pEmitter',c:'Particle'},
  {n:'pGravity',c:'Particle'},{n:'pTurbulence',c:'Particle'},{n:'pBounce',c:'Particle'},
  {n:'Crop',c:'Transform'},{n:'Flip',c:'Transform'},{n:'Letterbox',c:'Transform'},
  {n:'Resize',c:'Transform'},{n:'Scale',c:'Transform'},{n:'Transform',c:'Transform'},
  {n:'PipeRouter',c:'Flow'},{n:'Note',c:'Flow'},{n:'Custom',c:'Custom'},
];
const _UN = [];
const _seenUN = new Set();
for (const n of FUSION_NODES) { if (!_seenUN.has(n.n)) { _seenUN.add(n.n); _UN.push(n); } }

/* ════════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════════ */
let nodes = [];       // { id, name, cat, x, y, inputs:[], outputs:[] }
let conns = [];       // { id, fromNode, fromPort, toNode, toPort, color }
let selectedConn = null;
let selectedNode = null;
let nodeIdCtr = 1;
let connIdCtr = 1;

// Viewport transform
let vpX = 0, vpY = 0, vpZ = 1;

// Drag state
let draggingNode = null;
let dragOffX = 0, dragOffY = 0;

// Panning
let isPanning = false;
let panStart = null;

// Drawing connection
let drawingConn = null; // { fromNode, fromPort, startX, startY, curX, curY }

// Saved graphs
let savedGraphs = [];
try { savedGraphs = JSON.parse(localStorage.getItem('ng-graphs') || '[]'); } catch {}

// Linked effects for current graph
let linkedEffects = [];

const CONN_COLORS = [
  '#c8f060','#60b8f0','#f0a060','#f06060','#c060f0',
  '#60f0c8','#f0e060','#a8a8ff','#ff88aa','#88ffcc',
];

/* ════════════════════════════════════════════════════
   CANVAS GRID
════════════════════════════════════════════════════ */
const canvas = document.getElementById('ng-canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  drawGrid();
}

function drawGrid() {
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle = '#0d0d10';
  ctx.fillRect(0,0,w,h);

  const gridSize = 28 * vpZ;
  const offsetX = ((vpX % 28) * vpZ) % gridSize;
  const offsetY = ((vpY % 28) * vpZ) % gridSize;

  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let x = (offsetX % gridSize) - gridSize; x < w + gridSize; x += gridSize) {
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke();
  }
  for (let y = (offsetY % gridSize) - gridSize; y < h + gridSize; y += gridSize) {
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke();
  }
  // Coarser lines every 4
  const bigGrid = gridSize * 4;
  ctx.strokeStyle = 'rgba(255,255,255,0.07)';
  const bOffX = ((vpX % 112) * vpZ) % bigGrid;
  const bOffY = ((vpY % 112) * vpZ) % bigGrid;
  for (let x = (bOffX % bigGrid) - bigGrid; x < w + bigGrid; x += bigGrid) {
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke();
  }
  for (let y = (bOffY % bigGrid) - bigGrid; y < h + bigGrid; y += bigGrid) {
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke();
  }
}

new ResizeObserver(resizeCanvas).observe(document.getElementById('canvas-wrap'));
resizeCanvas();

/* ════════════════════════════════════════════════════
   VIEWPORT
════════════════════════════════════════════════════ */
function applyVP() {
  const nl = document.getElementById('node-layer');
  nl.style.transform = `translate(${vpX}px,${vpY}px) scale(${vpZ})`;
  nl.style.transformOrigin = '0 0';
  const sl = document.getElementById('svg-layer');
  sl.style.transform = `translate(${vpX}px,${vpY}px) scale(${vpZ})`;
  sl.style.transformOrigin = '0 0';
  drawGrid();
  document.getElementById('zoom-label').textContent = Math.round(vpZ*100)+'%';
  renderAllConns();
}

function zoomBy(factor, cx, cy) {
  const wrap = document.getElementById('canvas-wrap');
  const ox = cx ?? wrap.clientWidth/2;
  const oy = cy ?? wrap.clientHeight/2;
  const oldZ = vpZ;
  vpZ = Math.max(0.2, Math.min(4, vpZ * factor));
  vpX = ox - (ox - vpX) * (vpZ/oldZ);
  vpY = oy - (oy - vpY) * (vpZ/oldZ);
  applyVP();
}

function zoomReset() { vpX=0; vpY=0; vpZ=1; applyVP(); }

// Screen → canvas coords
function screenToCanvas(sx, sy) {
  return { x: (sx - vpX) / vpZ, y: (sy - vpY) / vpZ };
}
function canvasToScreen(cx, cy) {
  return { x: cx * vpZ + vpX, y: cy * vpZ + vpY };
}

/* ════════════════════════════════════════════════════
   NODE CREATION
════════════════════════════════════════════════════ */
function addNode(name, cat, atX, atY) {
  const wrap = document.getElementById('canvas-wrap');
  const cx = atX ?? wrap.clientWidth/2;
  const cy = atY ?? wrap.clientHeight/2;
  const pos = screenToCanvas(cx - 70, cy - 40);
  const node = {
    id: 'n' + (nodeIdCtr++),
    name: name || 'Custom',
    cat: cat || 'Custom',
    x: pos.x,
    y: pos.y,
    inputs: ['Input'],
    outputs: ['Output'],
  };
  nodes.push(node);
  renderNode(node);
  return node;
}

function renderNode(node) {
  let el = document.getElementById('nd-' + node.id);
  if (!el) {
    el = document.createElement('div');
    el.id = 'nd-' + node.id;
    el.className = 'ng-node';
    document.getElementById('node-layer').appendChild(el);
    setupNodeDrag(el, node);
  }
  el.style.left = node.x + 'px';
  el.style.top  = node.y + 'px';

  // Build port HTML
  const maxPorts = Math.max(node.inputs.length, node.outputs.length);
  let portRows = '';
  for (let i = 0; i < maxPorts; i++) {
    const inp = node.inputs[i];
    const out = node.outputs[i];
    portRows += `<div class="ng-port-row">`;
    if (inp !== undefined) {
      portRows += `<div class="ng-port port-in" data-node="${node.id}" data-port="${i}" data-side="in" title="${inp}" onmousedown="portMouseDown(event,this)">
        <div class="port-shape port-triangle"></div>
      </div>
      <span class="ng-port-label" style="text-align:left;flex:1">${inp}</span>`;
    } else {
      portRows += `<div style="width:18px"></div><span class="ng-port-label" style="flex:1"></span>`;
    }
    if (out !== undefined) {
      portRows += `<span class="ng-port-label" style="text-align:right;flex:1">${out}</span>
      <div class="ng-port port-out" data-node="${node.id}" data-port="${i}" data-side="out" title="${out}" onmousedown="portMouseDown(event,this)">
        <div class="port-shape port-square"></div>
      </div>`;
    } else {
      portRows += `<span class="ng-port-label" style="flex:1"></span><div style="width:18px"></div>`;
    }
    portRows += `</div>`;
  }

  el.innerHTML = `
    <div class="ng-node-header">
      <span class="ng-node-name" title="${node.name}">${node.name}</span>
      <button class="ng-node-close" onclick="removeNode('${node.id}')" title="Remove node">✕</button>
    </div>
    <div class="ng-node-body">
      <span class="ng-node-cat">${node.cat}</span>
      <div class="ng-ports">${portRows}</div>
      <div class="ng-port-actions" id="pa-${node.id}" style="display:none">
        <button class="ng-port-btn add-in" onclick="addPort('${node.id}','in')">＋ In</button>
        <button class="ng-port-btn add-out" onclick="addPort('${node.id}','out')">＋ Out</button>
        <button class="ng-port-btn rem-port" onclick="removePort('${node.id}')">－ Port</button>
      </div>
    </div>
  `;

  // Show/hide port actions on click
  el.addEventListener('click', e => {
    if (e.target.closest('.ng-port') || e.target.closest('.ng-node-close') || e.target.closest('.ng-port-btn')) return;
    const pa = document.getElementById('pa-'+node.id);
    const isShown = pa.style.display !== 'none';
    // Hide all others
    document.querySelectorAll('[id^="pa-"]').forEach(p => p.style.display='none');
    pa.style.display = isShown ? 'none' : 'flex';
  });

  updateConnectedPortStyles(node.id);
  renderAllConns();
}

function setupNodeDrag(el, node) {
  el.addEventListener('mousedown', e => {
    if (e.target.closest('.ng-port') || e.target.closest('.ng-node-close') || e.target.closest('.ng-port-btn')) return;
    e.stopPropagation();
    selectNode(node.id);
    const sc = screenToCanvas(e.clientX, e.clientY);
    dragOffX = sc.x - node.x;
    dragOffY = sc.y - node.y;
    draggingNode = node;
    el.style.zIndex = 10;
  });
}

function selectNode(id) {
  document.querySelectorAll('.ng-node').forEach(n => n.classList.remove('selected'));
  selectedNode = id;
  if (id) document.getElementById('nd-'+id)?.classList.add('selected');
}

function removeNode(id) {
  nodes = nodes.filter(n => n.id !== id);
  conns = conns.filter(c => c.fromNode !== id && c.toNode !== id);
  const el = document.getElementById('nd-'+id);
  if (el) el.remove();
  renderAllConns();
}

function addPort(nodeId, side) {
  const node = nodes.find(n => n.id === nodeId);
  if (!node) return;
  const num = side === 'in' ? node.inputs.length+1 : node.outputs.length+1;
  const label = side === 'in' ? `In ${num}` : `Out ${num}`;
  if (side === 'in') node.inputs.push(label);
  else node.outputs.push(label);
  renderNode(node);
}

function removePort(nodeId) {
  const node = nodes.find(n => n.id === nodeId);
  if (!node) return;
  // Remove the last port from whichever side is longer, keeping at least 1 each
  if (node.outputs.length >= node.inputs.length && node.outputs.length > 1) {
    const idx = node.outputs.length - 1;
    conns = conns.filter(c => !(c.fromNode===nodeId && c.fromPort===idx));
    node.outputs.pop();
  } else if (node.inputs.length > 1) {
    const idx = node.inputs.length - 1;
    conns = conns.filter(c => !(c.toNode===nodeId && c.toPort===idx));
    node.inputs.pop();
  }
  renderNode(node);
}

/* ════════════════════════════════════════════════════
   PORT POSITION HELPERS
════════════════════════════════════════════════════ */
function getPortScreenPos(nodeId, portIdx, side) {
  const el = document.querySelector(`#nd-${nodeId} .ng-port[data-port="${portIdx}"][data-side="${side}"]`);
  if (!el) return null;
  const r = el.getBoundingClientRect();
  const wr = document.getElementById('canvas-wrap').getBoundingClientRect();
  return { x: r.left + r.width/2 - wr.left, y: r.top + r.height/2 - wr.top };
}

function getPortCanvasPos(nodeId, portIdx, side) {
  const sp = getPortScreenPos(nodeId, portIdx, side);
  if (!sp) return null;
  return screenToCanvas(sp.x, sp.y);
}

/* ════════════════════════════════════════════════════
   CONNECTIONS
════════════════════════════════════════════════════ */
function renderAllConns() {
  const svg = document.getElementById('svg-layer');
  // Clear existing paths
  svg.querySelectorAll('.conn').forEach(e => e.remove());
  svg.querySelectorAll('marker').forEach(() => {}); // keep defs

  conns.forEach(c => {
    const from = getPortCanvasPos(c.fromNode, c.fromPort, 'out');
    const to   = getPortCanvasPos(c.toNode,   c.toPort,   'in');
    if (!from || !to) return;

    const mid = (to.x - from.x) * 0.5;
    const pathD = `M ${from.x} ${from.y} C ${from.x+Math.abs(mid)} ${from.y}, ${to.x-Math.abs(mid)} ${to.y}, ${to.x} ${to.y}`;

    // Marker per connection color
    const markId = 'arr-' + c.id;
    let marker = svg.querySelector('#'+markId);
    if (!marker) {
      marker = document.createElementNS('http://www.w3.org/2000/svg','marker');
      marker.setAttribute('id', markId);
      marker.setAttribute('markerWidth','7');
      marker.setAttribute('markerHeight','7');
      marker.setAttribute('refX','6');
      marker.setAttribute('refY','3.5');
      marker.setAttribute('orient','auto');
      const p = document.createElementNS('http://www.w3.org/2000/svg','path');
      p.setAttribute('d','M0,0 L0,7 L7,3.5 Z');
      p.setAttribute('fill', c.color || '#c8f060');
      marker.appendChild(p);
      svg.querySelector('defs')?.appendChild(marker) || svg.insertBefore(marker, svg.firstChild);
    } else {
      marker.querySelector('path').setAttribute('fill', c.color || '#c8f060');
    }

    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', pathD);
    path.setAttribute('fill','none');
    path.setAttribute('stroke', c.color || '#c8f060');
    path.setAttribute('stroke-width', selectedConn===c.id ? '2.5' : '1.8');
    path.setAttribute('stroke-opacity', selectedConn===c.id ? '1' : '0.7');
    path.setAttribute('marker-end', `url(#${markId})`);
    path.classList.add('conn');
    path.dataset.id = c.id;
    path.style.pointerEvents = 'stroke';
    path.style.cursor = 'pointer';
    if (selectedConn === c.id) {
      path.setAttribute('stroke-dasharray','none');
      path.setAttribute('filter','drop-shadow(0 0 3px ' + c.color + ')');
    }
    path.addEventListener('click', e => { e.stopPropagation(); selectConn(c.id); });
    svg.appendChild(path);
  });
}

function selectConn(id) {
  selectedConn = id;
  const c = conns.find(x => x.id === id);
  const info = document.getElementById('conn-info');
  const ctrl = document.getElementById('conn-controls');
  if (c) {
    const fn = nodes.find(n=>n.id===c.fromNode);
    const tn = nodes.find(n=>n.id===c.toNode);
    info.textContent = `${fn?.name||'?'} → ${tn?.name||'?'}`;
    info.classList.add('has-sel');
    ctrl.style.display = 'block';
    document.getElementById('custom-color').value = c.color || '#c8f060';
    buildColorSwatches(c.color);
  }
  renderAllConns();
}

function buildColorSwatches(activeColor) {
  const sw = document.getElementById('color-swatches');
  sw.innerHTML = '';
  CONN_COLORS.forEach(col => {
    const s = document.createElement('div');
    s.className = 'swatch' + (col===activeColor?' active':'');
    s.style.background = col;
    s.title = col;
    s.onclick = () => setConnColor(col);
    sw.appendChild(s);
  });
}

function setConnColor(color) {
  if (!selectedConn) return;
  const c = conns.find(x => x.id === selectedConn);
  if (c) {
    c.color = color;
    // Remove cached marker so it refreshes
    document.getElementById('arr-'+c.id)?.remove();
    buildColorSwatches(color);
    renderAllConns();
  }
}

function deleteSelectedConn() {
  if (!selectedConn) return;
  conns = conns.filter(c => c.id !== selectedConn);
  document.getElementById('arr-'+selectedConn)?.remove();
  selectedConn = null;
  document.getElementById('conn-info').textContent = 'Click an arrow to select it';
  document.getElementById('conn-info').classList.remove('has-sel');
  document.getElementById('conn-controls').style.display = 'none';
  updateAllPortStyles();
  renderAllConns();
}

function updateConnectedPortStyles(nodeId) {
  const node = nodes.find(n => n.id === nodeId);
  if (!node) return;
  const el = document.getElementById('nd-'+nodeId);
  if (!el) return;
  el.querySelectorAll('.ng-port').forEach(p => {
    const side = p.dataset.side;
    const idx = parseInt(p.dataset.port);
    const connected = side==='out'
      ? conns.some(c=>c.fromNode===nodeId&&c.fromPort===idx)
      : conns.some(c=>c.toNode===nodeId&&c.toPort===idx);
    p.classList.toggle('connected', connected);
  });
}

function updateAllPortStyles() {
  nodes.forEach(n => updateConnectedPortStyles(n.id));
}

/* ════════════════════════════════════════════════════
   PORT DRAG (draw connection)
════════════════════════════════════════════════════ */
function portMouseDown(e, portEl) {
  e.stopPropagation();
  e.preventDefault();
  const nodeId = portEl.dataset.node;
  const portIdx = parseInt(portEl.dataset.port);
  const side = portEl.dataset.side;
  const sp = getPortScreenPos(nodeId, portIdx, side);
  if (!sp) return;
  drawingConn = { fromNode: nodeId, fromPort: portIdx, fromSide: side, startX: sp.x, startY: sp.y, curX: sp.x, curY: sp.y };
  updateDrawingLine();
}

function updateDrawingLine() {
  const dsvg = document.getElementById('drawing-svg');
  dsvg.innerHTML = '';
  if (!drawingConn) return;
  const { startX, startY, curX, curY } = drawingConn;
  const mid = Math.abs(curX - startX) * 0.5;
  let d;
  if (drawingConn.fromSide === 'out') {
    d = `M ${startX} ${startY} C ${startX+mid} ${startY}, ${curX-mid} ${curY}, ${curX} ${curY}`;
  } else {
    d = `M ${startX} ${startY} C ${startX-mid} ${startY}, ${curX+mid} ${curY}, ${curX} ${curY}`;
  }
  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d', d);
  path.setAttribute('fill','none');
  path.setAttribute('stroke','rgba(200,240,96,0.5)');
  path.setAttribute('stroke-width','1.8');
  path.setAttribute('stroke-dasharray','5,4');
  dsvg.appendChild(path);

  // Snap highlight
  const hovered = getHoveredPort(curX, curY);
  document.querySelectorAll('.ng-port.port-highlight').forEach(p => p.classList.remove('port-highlight'));
  if (hovered) hovered.classList.add('port-highlight');
}

function getHoveredPort(sx, sy) {
  const ports = document.querySelectorAll('.ng-port');
  for (const p of ports) {
    const r = p.getBoundingClientRect();
    const wr = document.getElementById('canvas-wrap').getBoundingClientRect();
    const px = r.left + r.width/2 - wr.left;
    const py = r.top + r.height/2 - wr.top;
    if (Math.hypot(sx-px, sy-py) < 16) return p;
  }
  return null;
}

/* ════════════════════════════════════════════════════
   CANVAS MOUSE / WHEEL
════════════════════════════════════════════════════ */
const wrap = document.getElementById('canvas-wrap');

wrap.addEventListener('mousemove', e => {
  const wr = wrap.getBoundingClientRect();
  const sx = e.clientX - wr.left;
  const sy = e.clientY - wr.top;
  const cp = screenToCanvas(sx, sy);
  document.getElementById('canvas-coords').textContent = `x: ${Math.round(cp.x)}  |  y: ${Math.round(cp.y)}`;

  if (drawingConn) {
    drawingConn.curX = sx;
    drawingConn.curY = sy;
    updateDrawingLine();
    return;
  }
  if (draggingNode) {
    const nc = screenToCanvas(sx, sy);
    draggingNode.x = nc.x - dragOffX;
    draggingNode.y = nc.y - dragOffY;
    const el = document.getElementById('nd-'+draggingNode.id);
    if (el) { el.style.left = draggingNode.x+'px'; el.style.top = draggingNode.y+'px'; }
    renderAllConns();
    return;
  }
  if (isPanning) {
    vpX = panStart.vpX + (e.clientX - panStart.mx);
    vpY = panStart.vpY + (e.clientY - panStart.my);
    applyVP();
  }
});

wrap.addEventListener('mousedown', e => {
  if (e.target === wrap || e.target === canvas || e.target.id==='svg-layer') {
    // Deselect
    selectNode(null);
    if (selectedConn) {
      selectedConn = null;
      document.getElementById('conn-info').textContent = 'Click an arrow to select it';
      document.getElementById('conn-info').classList.remove('has-sel');
      document.getElementById('conn-controls').style.display = 'none';
      renderAllConns();
    }
    document.querySelectorAll('[id^="pa-"]').forEach(p => p.style.display='none');
    isPanning = true;
    panStart = { mx: e.clientX, my: e.clientY, vpX, vpY };
  }
});

document.addEventListener('mouseup', e => {
  isPanning = false;

  if (drawingConn) {
    const wr = wrap.getBoundingClientRect();
    const sx = e.clientX - wr.left;
    const sy = e.clientY - wr.top;
    const hovPort = getHoveredPort(sx, sy);
    if (hovPort) {
      const hn = hovPort.dataset.node;
      const hp = parseInt(hovPort.dataset.port);
      const hs = hovPort.dataset.side;
      // Must connect out→in or in→out
      if (hs !== drawingConn.fromSide && hn !== drawingConn.fromNode) {
        const fromNode = drawingConn.fromSide==='out' ? drawingConn.fromNode : hn;
        const fromPort = drawingConn.fromSide==='out' ? drawingConn.fromPort : hp;
        const toNode   = drawingConn.fromSide==='in'  ? drawingConn.fromNode : hn;
        const toPort   = drawingConn.fromSide==='in'  ? drawingConn.fromPort : hp;
        // No duplicate connections
        const exists = conns.some(c=>c.fromNode===fromNode&&c.fromPort===fromPort&&c.toNode===toNode&&c.toPort===toPort);
        if (!exists) {
          conns.push({ id:'c'+(connIdCtr++), fromNode, fromPort, toNode, toPort, color: CONN_COLORS[0] });
          updateAllPortStyles();
        }
      }
    }
    document.querySelectorAll('.ng-port.port-highlight').forEach(p => p.classList.remove('port-highlight'));
    drawingConn = null;
    document.getElementById('drawing-svg').innerHTML = '';
    renderAllConns();
  }

  if (draggingNode) {
    const el = document.getElementById('nd-'+draggingNode.id);
    if (el) el.style.zIndex = '';
    draggingNode = null;
  }
});

wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const wr = wrap.getBoundingClientRect();
  const sx = e.clientX - wr.left;
  const sy = e.clientY - wr.top;
  const factor = e.deltaY < 0 ? 1.12 : 1/1.12;
  zoomBy(factor, sx, sy);
}, { passive: false });

/* ════════════════════════════════════════════════════
   NODE ADD DROPDOWN
════════════════════════════════════════════════════ */
let nadFocusIdx = -1;

function nadOpen() { nadSearch(); }
function nadClose() { document.getElementById('nad-dropdown').classList.remove('open'); nadFocusIdx=-1; }

function nadSearch() {
  const q = document.getElementById('nad-input').value.toLowerCase().trim();
  const dd = document.getElementById('nad-dropdown');
  dd.innerHTML = '';
  let matches = q ? _UN.filter(n=>n.n.toLowerCase().includes(q)) : _UN;
  matches = matches.slice(0,40);

  if (!matches.length && !q) { dd.classList.remove('open'); return; }

  matches.forEach((node,i) => {
    const item = document.createElement('div');
    item.className = 'nad-item';
    item.dataset.idx = i;
    item.innerHTML = `<span>${node.n}</span><span class="nad-cat">${node.c}</span>`;
    item.addEventListener('mousedown', () => {
      addNode(node.n, node.c);
      document.getElementById('nad-input').value='';
      dd.classList.remove('open');
    });
    dd.appendChild(item);
  });

  if (q && !_UN.some(n=>n.n.toLowerCase()===q)) {
    const item = document.createElement('div');
    item.className = 'nad-item nad-add';
    item.innerHTML = `<span>+ Add "<strong>${document.getElementById('nad-input').value}</strong>"</span><span class="nad-cat">Custom</span>`;
    item.addEventListener('mousedown', () => {
      addNode(document.getElementById('nad-input').value, 'Custom');
      document.getElementById('nad-input').value='';
      dd.classList.remove('open');
    });
    dd.appendChild(item);
  }

  dd.classList.add('open');
  updateNadFocus();
}

function updateNadFocus() {
  document.querySelectorAll('.nad-item').forEach((el,i) => el.classList.toggle('focused', i===nadFocusIdx));
}

function nadKey(e) {
  const items = document.querySelectorAll('.nad-item');
  if (e.key==='ArrowDown') { e.preventDefault(); nadFocusIdx=Math.min(nadFocusIdx+1,items.length-1); updateNadFocus(); }
  else if (e.key==='ArrowUp') { e.preventDefault(); nadFocusIdx=Math.max(nadFocusIdx-1,0); updateNadFocus(); }
  else if (e.key==='Enter') {
    e.preventDefault();
    if (nadFocusIdx>=0&&items[nadFocusIdx]) items[nadFocusIdx].dispatchEvent(new Event('mousedown'));
    else {
      const q = document.getElementById('nad-input').value.trim();
      if (q) { const m=_UN.find(n=>n.n.toLowerCase()===q.toLowerCase()); addNode(m?m.n:q, m?m.c:'Custom'); document.getElementById('nad-input').value=''; document.getElementById('nad-dropdown').classList.remove('open'); }
    }
  }
  else if (e.key==='Escape') { document.getElementById('nad-dropdown').classList.remove('open'); }
}

/* ════════════════════════════════════════════════════
   SAVE / LOAD GRAPHS
════════════════════════════════════════════════════ */
function saveGraph() {
  const name = document.getElementById('save-name').value.trim();
  if (!name) { document.getElementById('save-name').focus(); return; }
  const graph = {
    id: Date.now().toString(),
    name,
    savedAt: new Date().toISOString(),
    nodes: nodes.map(n => ({...n})),
    conns: conns.map(c => ({...c})),
    linkedEffects: [...linkedEffects],
    vpX, vpY, vpZ,
  };
  savedGraphs = savedGraphs.filter(g => g.name !== name);
  savedGraphs.unshift(graph);
  localStorage.setItem('ng-graphs', JSON.stringify(savedGraphs));
  document.getElementById('save-name').value = '';

  // Also save as a node graph in the effects DB
  saveGraphToEffectsDB(graph);

  buildSavedList();
  toast('Graph saved!');
}

function saveGraphToEffectsDB(graph) {
  const effects = JSON.parse(localStorage.getItem('resolve-effects') || '[]');
  // Remove old version with same graph name
  const filtered = effects.filter(e => !(e._isNodeGraph && e.name === graph.name));
  const effect = {
    id: 'ng-' + graph.id,
    _isNodeGraph: true,
    name: graph.name,
    cat: 'node-graph',
    desc: `Node graph with ${graph.nodes.length} node${graph.nodes.length!==1?'s':''} and ${graph.conns.length} connection${graph.conns.length!==1?'s':''}`,
    nodes: graph.nodes.map(n => n.name),
    _graphData: graph,
    date: new Date().toISOString().split('T')[0],
    tags: ['node-graph'],
    tool: 'DaVinci Resolve — Node Graph',
  };
  filtered.unshift(effect);
  localStorage.setItem('resolve-effects', JSON.stringify(filtered));
}

function loadGraph(graph) {
  clearCanvas();
  vpX = graph.vpX ?? 0;
  vpY = graph.vpY ?? 0;
  vpZ = graph.vpZ ?? 1;
  nodeIdCtr = 1;
  connIdCtr = 1;

  // Restore nodes
  graph.nodes.forEach(n => {
    nodes.push({...n});
    renderNode(nodes[nodes.length-1]);
    const id = parseInt(n.id.replace('n',''));
    if (id >= nodeIdCtr) nodeIdCtr = id+1;
  });

  // Restore connections
  graph.conns.forEach(c => {
    conns.push({...c});
    const id = parseInt(c.id.replace('c',''));
    if (id >= connIdCtr) connIdCtr = id+1;
  });

  linkedEffects = graph.linkedEffects || [];
  renderLinkedEffects();
  updateAllPortStyles();
  applyVP();
  document.getElementById('save-name').value = graph.name;
}

function clearCanvas() {
  nodes.forEach(n => document.getElementById('nd-'+n.id)?.remove());
  nodes = []; conns = [];
  document.getElementById('svg-layer').querySelectorAll('.conn,marker').forEach(e=>e.remove());
  selectedConn = null; selectedNode = null;
  linkedEffects = [];
  renderLinkedEffects();
  document.getElementById('conn-info').textContent = 'Click an arrow to select it';
  document.getElementById('conn-info').classList.remove('has-sel');
  document.getElementById('conn-controls').style.display = 'none';
}

function clearAll() {
  if (nodes.length && !confirm('Clear all nodes and connections?')) return;
  clearCanvas();
  document.getElementById('save-name').value = '';
}

function buildSavedList() {
  const list = document.getElementById('saved-list');
  list.innerHTML = '';
  if (!savedGraphs.length) {
    list.innerHTML = '<div class="saved-empty">No saved graphs yet</div>';
    return;
  }
  savedGraphs.forEach(g => {
    const item = document.createElement('div');
    item.className = 'saved-item';
    item.innerHTML = `
      <div style="flex:1;min-width:0">
        <div class="saved-item-name">${g.name}</div>
        <div class="saved-item-meta">${g.nodes.length}N · ${g.conns.length}C</div>
      </div>
      <button class="saved-item-del" onclick="event.stopPropagation();deleteSavedGraph('${g.id}')">✕</button>
    `;
    item.addEventListener('click', () => loadGraph(g));
    list.appendChild(item);
  });
}

function deleteSavedGraph(id) {
  savedGraphs = savedGraphs.filter(g => g.id !== id);
  localStorage.setItem('ng-graphs', JSON.stringify(savedGraphs));
  // Also remove from effects DB
  const effects = JSON.parse(localStorage.getItem('resolve-effects')||'[]');
  localStorage.setItem('resolve-effects', JSON.stringify(effects.filter(e=>e.id!=='ng-'+id)));
  buildSavedList();
}

/* ════════════════════════════════════════════════════
   LINK TO EFFECT
════════════════════════════════════════════════════ */
function renderLinkedEffects() {
  const list = document.getElementById('effect-link-list');
  list.innerHTML = '';
  linkedEffects.forEach((eff,i) => {
    const item = document.createElement('div');
    item.className = 'eff-link-item';
    item.innerHTML = `<span class="eff-link-name">${eff.name}</span><button class="eff-link-del" onclick="unlinkEffect(${i})">✕</button>`;
    list.appendChild(item);
  });
}

function unlinkEffect(i) {
  linkedEffects.splice(i,1);
  renderLinkedEffects();
}

function effSearch() {
  const q = document.getElementById('eff-search').value.toLowerCase().trim();
  const dd = document.getElementById('eff-dropdown');
  const effects = JSON.parse(localStorage.getItem('resolve-effects')||'[]').filter(e=>!e._isNodeGraph);
  const matches = q ? effects.filter(e=>e.name.toLowerCase().includes(q)) : effects;
  dd.innerHTML = '';
  matches.slice(0,20).forEach(e => {
    const item = document.createElement('div');
    item.className = 'eff-dd-item';
    item.textContent = e.name;
    item.addEventListener('mousedown', () => {
      if (!linkedEffects.some(x=>x.id===e.id)) {
        linkedEffects.push({id:e.id, name:e.name});
        renderLinkedEffects();
      }
      document.getElementById('eff-search').value='';
      dd.classList.remove('open');
    });
    dd.appendChild(item);
  });
  if (matches.length) dd.classList.add('open');
  else dd.classList.remove('open');
}

function effDDOpen() { effSearch(); }
function effDDClose() { document.getElementById('eff-dropdown').classList.remove('open'); }

/* ════════════════════════════════════════════════════
   TOAST
════════════════════════════════════════════════════ */
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

/* ════════════════════════════════════════════════════
   KEYBOARD
════════════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  if (e.key==='Delete'||e.key==='Backspace') {
    if (selectedConn) deleteSelectedConn();
    else if (selectedNode) { removeNode(selectedNode); selectedNode=null; }
  }
  if (e.key==='Escape') { selectNode(null); if(selectedConn){selectedConn=null;renderAllConns();} }
});

/* ════════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════ */
buildSavedList();
applyVP();
</script>
</body>
</html>
