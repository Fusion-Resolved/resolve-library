  'EllipseMask':      { short:'Elliptical/circular mask shape.', detail:'Draw circles or ellipses. Full control over centre, radius, rotation, and soft edge. Good for isolating round elements, vignettes, and radial effects.', inputs:[], outputs:['Output (Mask)'], tags:['mask','ellipse'] },
  'PaintMask':        { short:'Allows freehand painting of a mask directly on the canvas.', detail:'Paint directly onto the image with brush strokes to define the matte. Supports multiple brush modes — solid, soft, erase. Good for organic or complex shapes that can\'t be defined with splines.', inputs:[['Input','Image to paint over']], outputs:['Output (Mask)'], tags:['mask','paint','freehand'] },
  'StencilMask':      { short:'Creates a mask by cutting out shapes defined by another image\'s luminance.', detail:'Uses one image\'s brightness to punch a hole through another. White areas in the stencil pass through, black areas block. Different from BitmapMask in that it applies a stencil operation rather than blending.', inputs:[['Input','Image to stencil through'],['Stencil','Stencil pattern image']], outputs:['Output (Mask)'], tags:['mask','stencil','cutout'] },
  'PolylineMask':     { short:'Straight-edged polygon matte.', detail:'Click to add vertices and close the shape. Use for buildings, signs, hard-edged props, and any area with straight boundaries.', inputs:[], outputs:['Output (Mask)'], tags:['mask','polygon','straight'] },
  'BSplineMask':      { short:'Smooth curved spline matte.', detail:'Click-drag to create curved control points. Right-click to add/remove points. Tension control per point. Best for curved organic shapes — hair, shoulders, faces.', inputs:[], outputs:['Output (Mask)'], tags:['mask','spline','smooth','organic'] },

  // ── Matte ────────────────────────────────────────────────────────────────
  'MatteControl':     { short:'Post-processes, cleans, and refines mattes.', detail:'After keying or masking, MatteControl is used to clean up the result. Erode inward for tight mattes, dilate outward to expand. Blur the edge for softness. Control garbage matte opacity. Essential in every keying workflow.', inputs:[['Input','Image with matte'],['Garbage','Optional garbage matte']], outputs:['Output'], tip:'View the matte in isolation while adjusting — toggle Channel → Alpha in the viewer.', tags:['matte','keying','clean','edge'] },
  'DepthBlur':        { short:'Blurs based on depth information for depth of field simulation.', detail:'Reads a depth channel and applies blur based on distance from the focal point. Set the focus plane depth and blur strength. Faster than true optical simulation.', inputs:[['Input','Image'],['Zbuffer','Depth pass']], outputs:['Output'], tags:['matte','depth','blur','dof'] },
  'Defocus':          { short:'Simulates lens defocus using bokeh kernel shapes.', detail:'Uses aperture shape simulation for realistic out-of-focus looks. Can use a Z-depth channel for per-pixel depth of field. The most optically accurate single-node defocus.', inputs:[['Input','Image'],['Zbuffer','Optional depth']], outputs:['Output'], tags:['matte','defocus','bokeh','lens'] },
  'LumaControl':      { short:'Selectively affects shadows, midtones, or highlights using luma isolation.', detail:'Like MatteControl but works on luminance ranges rather than a key. Isolate and modify only the darks, mids, or lights of an image. Useful for targeted grading without a full ColorCorrector setup.', inputs:[['Input','Image'],['Mask','Optional mask']], outputs:['Output'], tags:['matte','luminance','grade','selective'] },

  // ── Merge ────────────────────────────────────────────────────────────────
  'Merge':            { short:'The primary alpha compositing node — stacks layers using blend modes.', detail:'Connects two image layers and composites them. Normal mode uses alpha for transparency. All standard blend modes available. Supports per-pixel opacity and subtractive blending. The single most used node in any comp.', inputs:[['Foreground','Top layer'],['Background','Bottom layer'],['Mask','Optional mask'],['EffectMask','Effect isolation mask']], outputs:['Output'], tip:'Middle-click and drag to quickly repatch a merge connection.', supportsInstancing: true, tags:['merge','composite','blend','alpha'] },
  'AlphaMultiply':    { short:'Premultiplies RGB values by alpha — prepares straight alpha for compositing.', detail:'Multiplies each pixel\'s R, G, B by its alpha value. Required to convert from straight (unassociated) alpha to premultiplied (associated) alpha before Over compositing operations.', inputs:[['Input','Straight alpha image']], outputs:['Output'], tags:['merge','alpha','premultiply'] },
  'AlphaDivide':      { short:'Divides RGB by alpha — converts premultiplied to straight alpha.', detail:'Reverses premultiplication. Required after operations that assume straight alpha when your image is premultiplied. Use with caution near completely transparent areas (alpha = 0, division undefined).', inputs:[['Input','Premultiplied image']], outputs:['Output'], tags:['merge','alpha','straight'] },
  'MatteMultiply':    { short:'Multiplies two mattes together — AND operation on alpha channels.', detail:'The intersection of two mattes. Only areas that are white in both mattes will be white in the result. Equivalent to an AND boolean operation on the two alpha channels.', inputs:[['Foreground','First matte'],['Background','Second matte']], outputs:['Output'], tags:['merge','matte','multiply','alpha'] },
  'MultiMerge':       { short:'Merges multiple inputs in a single node.', detail:'Accepts up to any number of inputs. Each input has its own blend mode and opacity. Avoids long chains of single Merge nodes. Particularly useful for compositing many particle layers or effects.', inputs:[['Input1..N','Multiple layers']], outputs:['Output'], tags:['merge','multi','layers','composite'] },
  'MatteControl':     { short:'Matte processing and cleaning node.', detail:'See the full description under the Matte category.', inputs:[['Input','Image'],['Garbage','Optional mask']], outputs:['Output'], tags:['merge','matte','clean'] },

  // ── Misc ────────────────────────────────────────────────────────────────
  'Note':             { short:'A text annotation node — add notes and documentation to the node graph.', detail:'Purely informational. Displays a text comment on the node canvas. Use to label sections, explain complex setups, or leave instructions. Has no image input or output.', inputs:[], outputs:[], tags:['misc','annotation','note','documentation'] },
  'GroupOperator':    { short:'Groups multiple nodes into a single collapsed node for organisation.', detail:'Select nodes, right-click, and group them. The group appears as a single node with the same inputs/outputs as the grouped nodes. Click to expand and edit the internals. Essential for complex comps.', inputs:[], outputs:[], tip:'Group related functions (keyer chain, light wrap, etc.) to keep your main flow readable.', tags:['misc','group','organise','flow'] },
  'AudioOut':         { short:'Routes audio to output within the Fusion composition.', detail:'Connects audio sources to the composition output. Used in Fusion Standalone for adding audio to comp previews and renders. Less relevant inside DaVinci Resolve which handles audio separately.', inputs:[['Audio','Audio source']], outputs:[], tags:['misc','audio','output'] },
  'Comment':          { short:'Adds a floating text comment to the canvas.', detail:'Similar to Note but displays as a coloured background sticky-note rather than a node. Use to label major sections of a large comp, or to add brief workflow notes.', inputs:[], outputs:[], tags:['misc','comment','annotation','note'] },

  // ── Particle ─────────────────────────────────────────────────────────────
  'pRender':          { short:'Renders the particle system to a 2D image.', detail:'Required at the end of every particle chain. Takes particle data and renders it to an image. Set blend mode (Screen for fire/sparks, Over for solid particles), render quality, and motion blur. Connect to a Merge node to composite into your scene.', inputs:[['ParticleInput','Particle system from emitters/modifiers']], outputs:['Output'], tip:'Screen blend mode on pRender is perfect for fire, sparks, and magic effects.', tags:['particle','render','output'] },
  'pEmitter':         { short:'Basic particle emitter from a point or region.', detail:'Particles originate from a configurable point or region. Set emission rate, lifespan, velocity, spread angle, and initial colour. The starting point for any particle system.', inputs:[['Image','Optional image per-particle'],['RegionInput','Optional emission shape']], outputs:['Output (Particle)'], tags:['particle','emitter'] },
  'pDirectionalForce':{ short:'Applies a directional wind-like force to particles.', detail:'Pushes particles in a specified direction. Use for wind effects, gravity (pointing down), or horizontal forces. Control direction angle and force strength. Animate for gusting effects.', inputs:[['ParticleInput','Particle system']], outputs:['Output (Particle)'], tags:['particle','force','wind','gravity'] },
  'pGravity':         { short:'Applies gravity (acceleration downward) to particles.', detail:'Dedicated gravity node. Simpler than DirectionalForce for straight-down gravity. Control the strength (negative for upward lift/helium effects). Often combined with pTurbulence for natural motion.', inputs:[['ParticleInput','Particle system']], outputs:['Output (Particle)'], tags:['particle','gravity','force'] },
  'pTurbulence':      { short:'Adds 3D turbulent noise to particle motion for organic randomness.', detail:'Creates swirling, chaotic motion in particles using 3D noise. Control scale, strength, and animation speed. Essential for smoke, fire, and any particle effect that needs organic, non-linear motion.', inputs:[['ParticleInput','Particle system']], outputs:['Output (Particle)'], tip:'A small amount of turbulence prevents particles from looking mechanical.', tags:['particle','turbulence','noise','organic'] },
  'pSphere':          { short:'Particle sphere emitter — emits from a spherical volume or surface.', detail:'Particles emerge from a sphere shape. Choose emission from surface or volume. Good for explosions, magical orbs, and spherical particle effects. Control sphere radius and randomness.', inputs:[['Image','Particle texture']], outputs:['Output (Particle)'], tags:['particle','emitter','sphere'] },
  'pLine':            { short:'Particle line emitter — emits along a line or path.', detail:'Emits particles along a straight line between two points. Good for slashing effects, lightning, and linear trails. Can animate the line endpoints for moving emission sources.', inputs:[['Image','Particle texture']], outputs:['Output (Particle)'], tags:['particle','emitter','line'] },
  'pKill':            { short:'Removes particles when they enter a defined region.', detail:'Particles that enter the kill region are removed from the simulation. Use to prevent particles from going outside a specific area, or to remove them when they hit a surface.', inputs:[['ParticleInput','Particle system'],['RegionInput','Kill zone shape']], outputs:['Output (Particle)'], tags:['particle','kill','region','simulate'] },
  'pMerge':           { short:'Combines two particle systems into one.', detail:'Merges particles from two separate emitter chains into a single particle flow. Useful for having different types of particles (different sizes, speeds, textures) all rendered together.', inputs:[['ParticleInput1','First particle system'],['ParticleInput2','Second system']], outputs:['Output (Particle)'], tags:['particle','merge','combine'] },
  'pChangeStyle':     { short:'Changes particle appearance over their lifetime.', detail:'Modify particle size, colour, opacity, and style over time using gradient controls. Particles can grow and fade, change colour from orange to grey (like fire cooling), or shrink as they die.', inputs:[['ParticleInput','Particle system']], outputs:['Output (Particle)'], tip:'Fade opacity to 0 at end-of-life to prevent particles from popping out of existence.', tags:['particle','style','lifecycle','colour'] },
  'pRotate':          { short:'Rotates particles around their axis.', detail:'Adds rotation to individual particles. Set initial rotation angle and angular velocity. Rotation can be uniform, random, or driven by particle velocity. Good for spinning debris, leaves, or petals.', inputs:[['ParticleInput','Particle system']], outputs:['Output (Particle)'], tags:['particle','rotate','spin'] },
  'pSize':            { short:'Changes particle size over lifetime.', detail:'Dedicated size-over-lifetime control. Grow particles from nothing, maintain a size, then shrink them back. More precise than pChangeStyle for size-only control.', inputs:[['ParticleInput','Particle system']], outputs:['Output (Particle)'], tags:['particle','size','lifecycle'] },
  'pVortex':          { short:'Creates a rotational vortex force that spirals particles inward.', detail:'Applies a swirling force centered on a point. Particles spiral toward the centre. Excellent for tornado effects, drains, whirlpools, and magical gathering effects.', inputs:[['ParticleInput','Particle system']], outputs:['Output (Particle)'], tags:['particle','vortex','spin','force'] },
  'pCaustics':        { short:'Simulates underwater light caustics scattered through water particles.', detail:'A specialised particle modifier that creates the light-scattering pattern of caustics (the bright patterns seen when light passes through water). Used in underwater scene compositing.', inputs:[['ParticleInput','Particle system']], outputs:['Output (Particle)'], tags:['particle','caustics','water','light'] },
  'pBounce':          { short:'Causes particles to bounce off a defined surface or region.', detail:'Particles reflect off the bounce region based on an elasticity coefficient. Values near 1 = very bouncy; near 0 = dead stop. Essential for rain on surfaces, bouncing debris, and physical simulations.', inputs:[['ParticleInput','Particle system'],['RegionInput','Bounce surface']], outputs:['Output (Particle)'], tags:['particle','bounce','physics','collision'] },
  'pFlock':           { short:'Applies flocking/swarming behaviour to particles (boids algorithm).', detail:'Implements Craig Reynolds\' Boids algorithm for emergent flocking behaviour. Particles follow separation, alignment, and cohesion rules to create natural swarm dynamics. Use for birds, fish schools, or crowd simulations.', inputs:[['ParticleInput','Particle system']], outputs:['Output (Particle)'], tip:'Start with low values for all three rules and gradually increase to find convincing flock behaviour.', tags:['particle','flock','swarm','boids','simulate'] },
  'pFritzcorona':     { short:'Creates a particle corona/halo effect around a light source.', detail:'Specialized particle node for generating the glowing corona effect seen around bright light sources like the sun or lamp filaments. Creates radial particle distributions for light halo effects.', inputs:[['ParticleInput','Particle system']], outputs:['Output (Particle)'], tags:['particle','corona','halo','light'] },
  'pImageEmitter':    { short:'Emits particles from the bright or coloured areas of an image.', detail:'Rather than a geometric shape, particles emerge from image pixels. Bright pixels emit more particles. Image colour becomes particle colour. Good for logo/text particle effects, image-to-particle transitions.', inputs:[['Image','Source image for emission'],['ParticleInput','Particle chain']], outputs:['Output (Particle)'], tip:'Use a text or logo as the image source for a classic particle text dissolve effect.', tags:['particle','emitter','image','logo','text'] },
  'pSpawn':           { short:'Spawns child particles from existing particles.', detail:'When a particle reaches a certain age or condition, it spawns new particles. Use for explosion debris splitting, firework bursts, or branching effects like fire spreading.', inputs:[['ParticleInput','Parent particle system']], outputs:['Output (Particle)'], tags:['particle','spawn','child','burst'] },
  'pForce':           { short:'Applies arbitrary force vectors to particles from an image or channel.', detail:'Uses the colour channels of an input image as force vectors (R=X force, G=Y force, B=Z force). Create completely custom force fields — forces following a painted map, or driven by other render passes.', inputs:[['ParticleInput','Particle system'],['Image','Force field image']], outputs:['Output (Particle)'], tags:['particle','force','custom','advanced'] },
  'pPointForce':      { short:'Applies attraction or repulsion force from a single point.', detail:'Like a gravity point or magnetic source. Particles are pulled toward or pushed away from the defined point. Use for black holes, magnets, and gravitational lensing style effects.', inputs:[['ParticleInput','Particle system']], outputs:['Output (Particle)'], tags:['particle','force','gravity','attract','repel'] },

  // ── Stereo ───────────────────────────────────────────────────────────────
  'StereoAlign':      { short:'Aligns left and right eye images for stereo 3D compositing.', detail:'Corrects vertical misalignment, rotation disparity, and scale differences between stereo pairs. Required before any stereo compositing operation. View in anaglyph mode to check alignment.', inputs:[['LeftImage','Left eye'],['RightImage','Right eye']], outputs:['Output'], tags:['stereo','3d','align'] },
  'AnaglyphMerge':    { short:'Combines stereo left and right images into a red-cyan anaglyph image.', detail:'Creates the classic red-left, cyan-right anaglyph image for viewing with coloured glasses. A preview tool — not typically used in the final deliverable but useful for checking stereo depth.', inputs:[['LeftImage','Left eye'],['RightImage','Right eye']], outputs:['Output'], tags:['stereo','anaglyph','3d','preview'] },
  'StereoMix':        { short:'Controls the blend and convergence point between stereo eye views.', detail:'Adjusts the stereo window (convergence plane), inter-ocular distance, and blending between eyes. Fine-tunes the stereo "comfort zone" for viewer comfort.', inputs:[['LeftImage','Left eye'],['RightImage','Right eye']], outputs:['Output'], tags:['stereo','3d','convergence'] },

  // ── Tracking ─────────────────────────────────────────────────────────────
  'Tracker':          { short:'Tracks motion in footage and outputs transform data for stabilisation or match-moving.', detail:'Place tracking points on high-contrast features in the footage. Fusion analyses the frame range and outputs position, rotation, and scale data. Connect to Stabilize, Transform, or CornerPin nodes to apply the track.', inputs:[['Input','Footage to track']], outputs:['Output'], tip:'Avoid tracking areas that change — shadows, reflections, or moving elements near the track point.', tags:['tracking','motion','stabilize','matchmove'] },
  'PlanarTracker':    { short:'Tracks flat planar surfaces for accurate screen replacement and surface tracking.', detail:'Unlike point tracking, planar tracking analyses an entire rectangular region and tracks its perspective transformation. Essential for screen replacements, sign replacements, and tracking non-flat surfaces like flags.', inputs:[['Input','Footage with surface to track']], outputs:['Output'], tip:'Draw the region tightly around the surface, not a large area around it.', tags:['tracking','planar','screen-replacement','perspective'] },

  // ── Transform ───────────────────────────────────────────────────────────
  'Crop':             { short:'Crops or pads the image canvas.', detail:'Remove or add canvas space on any edge. Unlike masking, Crop actually changes the image dimensions. Use to reframe elements, create letterbox/pillarbox, or resize the working area.', inputs:[['Input','Image to crop']], outputs:['Output'], tags:['transform','crop','resize','canvas'] },
  'DVE':              { short:'Digital Video Effect — 2D transform: position, rotation, scale, perspective.', detail:'The Swiss Army knife of 2D positioning. Translate, rotate, scale, flip and add perspective distortion. Edge wrap modes for how to handle the image boundary. Supports motion blur.', inputs:[['Input','Image to transform']], outputs:['Output'], tags:['transform','2d','position','scale','rotation'] },
  'Flip':             { short:'Flips the image horizontally, vertically, or both.', detail:'Simple mirror operation. Horizontal flip mirrors left to right, vertical flip mirrors top to bottom. Faster than DVE for pure flip operations. Often used to create mirror images or correct camera orientation.', inputs:[['Input','Image to flip']], outputs:['Output'], tags:['transform','flip','mirror'] },
  'Scale':            { short:'Scales the image to a different size.', detail:'Simple scale node. Uniform scale or separate X/Y scale. Choose the interpolation quality. Faster to set up than DVE when you only need scaling.', inputs:[['Input','Image to scale']], outputs:['Output'], tags:['transform','scale','resize'] },
  'Transform':        { short:'Applies 2D translate, rotate, and scale in a single node.', detail:'The standard 2D transform node. Position (X/Y), rotation angle, scale, and flip toggles. Pivot point control for rotation and scale origin. The most commonly used positioning node.', inputs:[['Input','Image to transform'],['Mask','Optional mask']], outputs:['Output'], supportsInstancing: true, tags:['transform','2d','position','rotation','scale'] },
  'GridWarp':         { short:'Warps image using a moveable control point grid.', detail:'A deformable mesh of control points. Drag any point to distort the image in that area. Smooth interpolation between points. Use for body/face morphing, subtle corrections, and organic distortion.', inputs:[['Input','Image to warp']], outputs:['Output'], tags:['transform','warp','mesh','morph'] },
  'Perspective':      { short:'Applies a 4-corner perspective distortion.', detail:'Four-corner pin transform. Set position for each corner independently to create perspective transformations, simulate 3D plane projections in 2D, or correct perspective distortion.', inputs:[['Input','Image']], outputs:['Output'], tags:['transform','perspective','cornerpin','2d'] },

  // ── Warp ────────────────────────────────────────────────────────────────
  'Bender':           { short:'Bends the image around an axis.', detail:'Wraps the image as if bending it around a cylindrical axis. Control the axis direction, bend amount, and pivot. Use for flag waving, rolling paper effects, and curved surface projections.', inputs:[['Input','Image to bend']], outputs:['Output'], tags:['warp','bend','deform'] },
  'Compound':         { short:'Combines multiple warp operations in a single evaluation.', detail:'Applies several displacement-based warps together, which is more accurate than chaining individual warp nodes (since multiple resampling steps degrade quality). Groups distortion operations for better results.', inputs:[['Input','Image']], outputs:['Output'], tags:['warp','compound','distortion'] },
  'Coordinate':       { short:'Applies image coordinate mapping using another image as the displacement map.', detail:'Uses the RGB values of a displacement map image to move pixels. Red channel = X displacement, Green = Y. Creates ripple, distortion, and fluid warp effects driven by a procedural or painted map.', inputs:[['Input','Image to distort'],['DisplaceImage','Displacement map']], outputs:['Output'], tip:'A FastNoise node fed into Coordinate creates smooth animated warping.', tags:['warp','displacement','map','distortion'] },
  'Displace':         { short:'Displaces image pixels using a greyscale displacement map.', detail:'Simpler than Coordinate — uses a single channel (luminance) to move pixels in a fixed direction. White = maximum displacement, black = no displacement. Good for simple ripple and heat-haze effects.', inputs:[['Input','Image to displace'],['DisplaceImage','Greyscale displacement map']], outputs:['Output'], tags:['warp','displace','distortion'] },
  'GridWarp':         { short:'Mesh warp using a deformable grid of control points.', detail:'See the Transform category entry for full description.', inputs:[['Input','Image']], outputs:['Output'], tags:['warp','grid','mesh','deform'] },
  'LensDistortion':   { short:'Applies or corrects barrel/pincushion lens distortion.', detail:'See the Filter category entry for full description.', inputs:[['Input','Image']], outputs:['Output'], tags:['warp','lens','distortion'] },
  'MeshWarp':         { short:'Warps image using a triangulated mesh with more control points than GridWarp.', detail:'A higher-resolution warp using a triangulated mesh. More control points than GridWarp for finer detail. Used for detailed facial retouching, body morphing, and complex surface warps.', inputs:[['Input','Image']], outputs:['Output'], tags:['warp','mesh','triangle','deform','morph'] },
  'PerspectivePositioner':{ short:'Positions and distorts an image using 4-corner perspective mapping.', detail:'Places an image into perspective by setting four corner points. Unlike CornerPin, this node positions the foreground into a perspective rather than correcting distortion. Use for billboard placement and surface graphics.', inputs:[['Input','Image'],['Background','Optional background']], outputs:['Output'], tags:['warp','perspective','position','billboard'] },
  'Shader':           { short:'Applies a custom GLSL shader for GPU-based image effects.', detail:'Advanced. Write GLSL shader code to process images on the GPU. Full access to textures and uniforms. Extremely fast for complex effects. Requires graphics shader programming knowledge.', inputs:[['Input','Image to process']], outputs:['Output'], tags:['warp','shader','glsl','gpu','custom','advanced'] },
  'SphereMap':        { short:'Maps an image onto the inside of a sphere for panoramic effects.', detail:'Projects the image as if it were viewed from inside a sphere. Creates a fish-eye or 360° panoramic look. Used to simulate dome projections or create an immersive curved background effect.', inputs:[['Input','Image to sphere-map']], outputs:['Output'], tags:['warp','sphere','panorama','360'] },
  'Spherize':         { short:'Distorts the image into a spherical bulge effect.', detail:'Pushes the image outward from the centre as if inflating a sphere. The amount controls the bulge strength. Use for lens distortion simulation, holographic sphere effects, or fisheye correction.', inputs:[['Input','Image']], outputs:['Output'], tags:['warp','spherize','bulge','lens'] },
  'Swirl':            { short:'Creates a rotational swirl distortion from the centre outward.', detail:'Applies a spiral rotation distortion strongest at the centre and fading to the edges. Use for stylised transitions, portal effects, or hypnotic abstract visuals.', inputs:[['Input','Image']], outputs:['Output'], tags:['warp','swirl','spiral','distortion'] },
  'Vector Displacement':{ short:'Displaces pixels using a vector (RGB) displacement map.', detail:'Unlike greyscale Displace, this uses three channels for X, Y, Z displacement independently. Supports full 3D-style displacement in 2D. Useful for advanced displacement effects from rendered vector passes.', inputs:[['Input','Image'],['VectorMap','RGB vector displacement map']], outputs:['Output'], tags:['warp','vector','displacement','rgb'] },
  'XY Displace':      { short:'Displaces pixels independently in X and Y using separate channel maps.', detail:'Like Coordinate but with more direct control — specify separate images or channels for horizontal and vertical displacement. Good for custom water ripple, heat shimmer, and directional warp effects.', inputs:[['Input','Image'],['XDisplace','Horizontal displacement'],['YDisplace','Vertical displacement']], outputs:['Output'], tags:['warp','displace','xy','directional'] },
  'ZoomBlur':         { short:'Creates a radial zoom blur effect from a centre point.', detail:'Blurs pixels radially outward from a defined centre, simulating a fast zoom or explosion motion. Control blur amount, centre point, and quality. Classic use: zoom burst, impact hits, warp speed effects.', inputs:[['Input','Image']], outputs:['Output'], tip:'Combine with a fast cut and a brief ZoomBlur for an impact hit effect.', tags:['warp','zoom','blur','radial','motion'] },

  // ── Custom ───────────────────────────────────────────────────────────────
  'MacroOperator':    { short:'A saved group of nodes that can be reused as a single node.', detail:'When you save a group as a macro, it appears as a single custom node in the node browser. All inputs and outputs are published from the internals. The primary way to create reusable custom effects in Fusion.', inputs:[['Published inputs','Depends on macro contents']], outputs:['Published outputs'], tip:'Publish the parameters you want exposed using right-click → Publish on the node slider.', tags:['custom','macro','reusable','group'] },
  'ScriptOperator':   { short:'Runs a Lua script to generate or process images programmatically.', detail:'Full Lua scripting access to Fusion\'s API for image generation and processing. Can produce animated content, read external data, interface with other applications. Very powerful but requires scripting knowledge.', inputs:[['Input','Optional input image']], outputs:['Output'], tags:['custom','script','lua','advanced','code'] },
  'ThirdPartyPlugin': { short:'A third-party plugin node installed into Fusion or DaVinci Resolve.', detail:'Fusion supports OFX plugins (OpenFX) from third parties. Examples include Sapphire, Boris FX, RE:Vision Effects, etc. These appear in the node graph like any other node once installed.', inputs:[['Input','Depends on plugin']], outputs:['Output'], tags:['custom','plugin','ofx','third-party'] },
};

  'Merge':'#c8f060','Misc':'#888888','Particle':'#f0c040','Stereo':'#80c8f0',
  'Tracking':'#68f088','Transform':'#a8c8f8','Warp':'#d068f0',
};
function getCatColor(cat) {
  try { const s=JSON.parse(localStorage.getItem('rl-cat-colors')||'{}'); return s[cat]||CAT_COLORS[cat]||'#909090'; }
  catch(e) { return CAT_COLORS[cat]||'#909090'; }
}

// ── Port type classifier ──────────────────────────────────────────────────
function portClass(name) {
  const n = (name||'').toLowerCase();
  if (/foreground|fg\b/.test(n))                         return 'pt-fg';
  if (/background|bg\b/.test(n))                         return 'pt-bg';
  if (/\bmask\b|effect.?mask|garbage/.test(n))           return 'pt-mask';
  if (/zbuffer|depth|z.?depth/.test(n))                  return 'pt-depth';
  if (/scene.?input|3d|material.?input/.test(n))         return 'pt-3d';
  if (/material/.test(n))                                return 'pt-mat';
  if (/particle/.test(n))                                return 'pt-part';
  return 'pt-def';
}
function portClassOut(name) {
  return 'pt-out';
}

// ── State ─────────────────────────────────────────────────────────────────
let activeCat = 'all';
let searchQ   = '';
let currentLevel = 'standard';

const LEVEL_DESCS = {
  beginner: 'Plain-language overview of what each node does',
  standard: 'Practical explanations with parameters and connections',
  advanced:  'Technical depth — populated from the Fusion manual',
};

function setLevel(level) {
  currentLevel = level;
  document.querySelectorAll('.level-pill, .nm-level-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.level === level));
  const desc = document.getElementById('level-bar-desc');
  if (desc) desc.textContent = LEVEL_DESCS[level] || '';
  // If modal is open, refresh its body
  if (document.getElementById('node-modal-overlay').classList.contains('open') && _openNodeName) {
    openNodeModal(_openNodeName);
  }
}

// ── Filter & render grid ──────────────────────────────────────────────────
function filterNodes() { searchQ = document.getElementById('search').value.toLowerCase(); render(); }
function setCat(cat) {
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  render();
}

function render() {
  const allNodes = FUSION_NODES.map(n => ({ ...n, info: NODE_INFO[n.n] || null }));
  const catOrder = ['3D','3D Light','3D Material','3D Texture','Blur','Color','Composite',
    'Creator','Custom','Effect','Filter','Flow','I/O','Keyer','Mask','Matte','Merge',
    'Misc','Particle','Stereo','Tracking','Transform','Warp'];

  const filtered = allNodes.filter(n => {
    const matchCat = activeCat === 'all' || n.c === activeCat;
    if (!searchQ) return matchCat;
    const info = n.info;
    const hay = [n.n, n.c, info?.short||'', info?.detail||'', ...(info?.tags||[])].join(' ').toLowerCase();
    return matchCat && hay.includes(searchQ);
  });

  document.getElementById('stat-shown').textContent = filtered.length;
  if (!filtered.length) {
    document.getElementById('ref-body').innerHTML = '<div class="empty">No nodes match.</div>';
    return;
  }

  const byCat = {};
  filtered.forEach(n => { (byCat[n.c] = byCat[n.c]||[]).push(n); });

  const html = catOrder.filter(c => byCat[c]).map(c => {
    const color = getCatColor(c);
    const icon  = CAT_ICONS[c] || CAT_ICONS['Misc'];
    const cards = byCat[c].map(n => {
      const info = n.info;
      const idx  = n.n.replace(/[^a-zA-Z0-9]/g,'_');
      const instBadge = info?.supportsInstancing ? '<span class="instance-badge">↺ Instanceable</span>' : '';
      const tags = (info?.tags||[]).slice(0,4).map(t => '<span class="node-tag">'+t+'</span>').join('');

      // Port preview chips
      const inputs  = info?.inputs  || [];
      const outputs = info?.outputs || ['Output'];
      const inChips = inputs.length
        ? inputs.slice(0,3).map(i => '<span class="port-chip '+portClass(i[0])+'">'+i[0]+'</span>').join('')
          + (inputs.length>3 ? '<span class="port-chip pt-def" style="opacity:.5">+'+( inputs.length-3)+'</span>' : '')
        : '<span style="font-size:9px;color:var(--muted);font-family:var(--font-mono)">none</span>';
      const outChips = outputs.slice(0,2).map(o => '<span class="port-chip pt-out">'+o+'</span>').join('');

      return '<div class="node-card" id="nc-'+idx+'" onclick="openNodeModal(\''+escJ(n.n)+'\')">'
        +'<div class="node-card-strip" style="background:'+color+'"></div>'
        +'<div class="node-card-inner">'
          +'<div class="node-header-row">'
            +'<div class="node-icon-box" style="background:'+color+'18;color:'+color+'">'+icon+'</div>'
            +'<div class="node-header-text">'
              +'<div class="node-name">'+escH(n.n)+instBadge+'</div>'
              +(info?.short ? '<div class="node-short">'+escH(info.short)+'</div>'
                            : '<div class="node-short" style="color:var(--muted);font-style:italic">No description yet.</div>')
            +'</div>'
          +'</div>'
          +'<div class="card-ports-row">'
            +'<div class="card-ports-side"><div class="card-ports-lbl">In</div><div class="card-ports-chips">'+inChips+'</div></div>'
            +'<div style="color:var(--border3);font-size:11px;flex-shrink:0">→</div>'
            +'<div class="card-ports-side" style="align-items:flex-end"><div class="card-ports-lbl">Out</div><div class="card-ports-chips">'+outChips+'</div></div>'
          +'</div>'
          +(tags ? '<div class="node-tags">'+tags+'</div>' : '')
        +'</div>'
      +'</div>';
    }).join('');

    return '<div class="cat-section">'
      +'<div class="cat-heading">'
        +'<div class="cat-dot" style="background:'+color+'"></div>'
        +'<div class="cat-icon-sm" style="background:'+color+'18;color:'+color+'">'+icon+'</div>'
        +'<div class="cat-name">'+c+'</div>'
        +'<div class="cat-count">'+byCat[c].length+' node'+(byCat[c].length!==1?'s':'')+'</div>'
      +'</div>'
      +'<div class="node-grid">'+cards+'</div>'
    +'</div>';
  }).join('');

  document.getElementById('ref-body').innerHTML = html;
}

// ── Node detail modal ─────────────────────────────────────────────────────
let _openNodeName = null;

function openNodeModal(nodeName) {
  _openNodeName = nodeName;
  const nodeData = FUSION_NODES.find(n => n.n === nodeName);
  const info     = NODE_INFO[nodeName] || null;
  const cat      = nodeData ? nodeData.c : '';
  const color    = getCatColor(cat);
  const icon     = CAT_ICONS[cat] || CAT_ICONS['Misc'];

  // Header
  document.getElementById('nm-strip').style.background = color;
  document.getElementById('nm-icon').style.background  = color+'18';
  document.getElementById('nm-icon').style.color       = color;
  document.getElementById('nm-icon').innerHTML         = icon;
  document.getElementById('nm-title').textContent      = nodeName;
  document.getElementById('nm-cat').textContent        = cat;

  // Build body
  document.getElementById('nm-body').innerHTML = buildModalBody(nodeName, info, cat, color);

  document.getElementById('node-modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeNodeModal() {
  document.getElementById('node-modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
  _openNodeName = null;
}

function handleModalOverlayClick(e) {
  if (e.target === document.getElementById('node-modal-overlay')) closeNodeModal();
}

function buildModalBody(nodeName, info, cat, color) {
  if (!info) {
    return '<p class="nm-text" style="color:var(--muted);font-style:italic">No documentation yet for '+escH(nodeName)+'.</p>';
  }

  const inputs  = info.inputs  || [];
  const outputs = info.outputs || ['Output'];
  const level   = currentLevel;

  let html = '';

  // Level switcher
  html += '<div class="nm-level-row">'
    +['beginner','standard','advanced'].map(l =>
      '<button class="nm-level-btn'+(level===l?' active':'')+'" data-level="'+l+'" onclick="setLevel(\''+l+'\')">'
      +l.charAt(0).toUpperCase()+l.slice(1)+'</button>'
    ).join('')
  +'</div>';

  // ── BEGINNER ──────────────────────────────────────────────────────────────
  if (level === 'beginner') {
    html += '<div>';
    html += '<div class="nm-section-label">What it does</div>';
    html += '<div class="nm-text">'+escH(info.short)+'</div>';
    // Simple port list — just names + types
    if (inputs.length || outputs.length) {
      html += '<div class="nm-divider" style="margin:1rem 0"></div>';
      html += '<div class="nm-io-grid">';
      html += '<div class="nm-io-col"><div class="nm-io-col-lbl">Inputs</div>';
      if (inputs.length) {
        inputs.forEach(inp => {
          html += '<div class="nm-port-row">'
            +'<span class="nm-port-chip '+portClass(inp[0])+'">'+escH(inp[0])+'</span>'
            +'<span class="nm-port-desc">'+escH(inp[1]||'')+'</span>'
          +'</div>';
        });
      } else {
        html += '<div style="font-size:11px;color:var(--muted);font-family:var(--font-mono)">None</div>';
      }
      html += '</div>';
      html += '<div class="nm-io-col"><div class="nm-io-col-lbl">Outputs</div>';
      outputs.forEach(o => {
        html += '<div class="nm-port-row"><span class="nm-port-chip pt-out">'+escH(o)+'</span></div>';
      });
      html += '</div></div>';
    }
    if (info.tip) html += '<div class="nm-tip"><span class="nm-tip-icon">💡</span><span>'+escH(info.tip)+'</span></div>';
    html += '</div>';

  // ── STANDARD ──────────────────────────────────────────────────────────────
  } else if (level === 'standard') {
    html += '<div class="nm-section-label">Overview</div>';
    html += '<div class="nm-text">'+escH(info.detail||info.short)+'</div>';

    html += '<div class="nm-divider" style="margin:1rem 0"></div>';

    // Full IO with port type badges + descriptions
    html += '<div class="nm-section-label">Inputs &amp; Outputs</div>';
    html += '<div class="nm-io-grid">';
    html += '<div class="nm-io-col"><div class="nm-io-col-lbl">Inputs</div>';
    if (inputs.length) {
      inputs.forEach(inp => {
        html += '<div class="nm-port-row">'
          +'<span class="nm-port-chip '+portClass(inp[0])+'">'+escH(inp[0])+'</span>'
          +'<span class="nm-port-desc">'+escH(inp[1]||'')+'</span>'
        +'</div>';
      });
    } else {
      html += '<div style="font-size:11px;color:var(--muted);font-family:var(--font-mono);padding:4px 0">None — generator node</div>';
    }
    html += '</div>';
    html += '<div class="nm-io-col"><div class="nm-io-col-lbl">Outputs</div>';
    outputs.forEach(o => {
      html += '<div class="nm-port-row"><span class="nm-port-chip pt-out">'+escH(o)+'</span></div>';
    });
    html += '</div></div>';

    // Key parameters — derive from info.detail context hints
    const params = getNodeParams(nodeName, info, cat);
    if (params.length) {
      html += '<div class="nm-divider" style="margin:1rem 0"></div>';
      html += '<div class="nm-section-label">Key Parameters</div>';
      html += '<table class="nm-params-table"><thead><tr><th>Parameter</th><th>What it does</th></tr></thead><tbody>';
      params.forEach(p => {
        html += '<tr><td>'+escH(p[0])+'</td><td>'+escH(p[1])+'</td></tr>';
      });
      html += '</tbody></table>';
    }

    // Typical use-with chain
    const chain = getNodeChain(nodeName, cat);
    if (chain.length > 1) {
      html += '<div class="nm-divider" style="margin:1rem 0"></div>';
      html += '<div class="nm-section-label">Typical node chain</div>';
      html += '<div class="nm-chain">';
      chain.forEach((item, i) => {
        if (i > 0) html += '<span class="nm-chain-arrow">→</span>';
        html += '<span class="nm-chain-node'+(item.current?' nm-chain-this':'')+'">'+(item.label)+'</span>';
      });
      html += '</div>';
    }

    if (info.tip) html += '<div class="nm-tip" style="margin-top:.75rem"><span class="nm-tip-icon">💡</span><span>'+escH(info.tip)+'</span></div>';

  // ── ADVANCED ──────────────────────────────────────────────────────────────
  } else {
    html += '<div class="nm-advanced-placeholder">'
      +'<div style="font-size:16px;margin-bottom:.5rem">📖</div>'
      +'<div style="color:var(--text2);font-size:13px;margin-bottom:.35rem">Advanced documentation</div>'
      +'Refer to the <strong>DaVinci Resolve / Fusion Manual</strong>, '
      +'section for <strong>'+escH(nodeName)+'</strong>, for technical parameter reference, '
      +'mathematical detail, and edge-case behaviour.'
    +'</div>';

    // Still show full IO for reference
    html += '<div class="nm-divider" style="margin:1rem 0"></div>';
    html += '<div class="nm-section-label">Inputs &amp; Outputs</div>';
    html += '<div class="nm-io-grid">';
    html += '<div class="nm-io-col"><div class="nm-io-col-lbl">Inputs</div>';
    if (inputs.length) {
      inputs.forEach(inp => {
        html += '<div class="nm-port-row">'
          +'<span class="nm-port-chip '+portClass(inp[0])+'">'+escH(inp[0])+'</span>'
          +'<span class="nm-port-desc">'+escH(inp[1]||'')+'</span>'
        +'</div>';
      });
    } else {
      html += '<div style="font-size:11px;color:var(--muted);font-family:var(--font-mono);padding:4px 0">None — generator node</div>';
    }
    html += '</div>';
    html += '<div class="nm-io-col"><div class="nm-io-col-lbl">Outputs</div>';
    outputs.forEach(o => {
      html += '<div class="nm-port-row"><span class="nm-port-chip pt-out">'+escH(o)+'</span></div>';
    });
    html += '</div></div>';
    if (info.tip) html += '<div class="nm-tip" style="margin-top:.75rem"><span class="nm-tip-icon">💡</span><span>'+escH(info.tip)+'</span></div>';
  }

  return html;
}

function getNodeParams(name, info, cat) {
  const params = {

    'Sharpen':           [['XBlurSize / YBlurSize','Reference blur radius — smaller catches finer detail'],['Sharpen Strength','Amount of edge enhancement (0.5–2 typical)']],
    'Merge':             [['Blend Mode','Over, Screen, Add, Multiply, Overlay etc.'],['FG Opacity','Foreground layer transparency (0–1)'],['Apply Mask','Restricts the composite to a masked area']],
    'ColorCorrector':    [['Lift/Gamma/Gain','Shadow / Midtone / Highlight correction per channel'],['Saturation','Global colour intensity'],['Qualifier','Restrict correction to a sampled colour range']],
    'BrightnessContrast':[['Brightness','Additive tonal shift for the whole image'],['Contrast','Tonal spread (>1 expands, <1 compresses)'],['Pivot','Midpoint around which contrast is applied']],
    'ColorSpace':        [['From Colour Space','Source encoding (sRGB, Log-C, DaVinci Wide Gamut etc.)'],['To Colour Space','Target encoding for downstream compositing']],
    'LUTLoader':         [['LUT File','Path to .cube, .3dl, or .mga file'],['Opacity','Blend between graded and ungraded (0=off, 1=full LUT)']],
    'HueCurves':         [['Hue ranges','Six colour band controls: R, Y, G, C, B, M'],['HSL mode','Shift Hue, pull Saturation, or adjust Luminance per band']],
    'DeltaKeyer':        [['Screen Colour','Sampled green/blue background colour to remove'],['Threshold','Tolerance before a pixel is considered background'],['Matte Finesse','Erosion, blur, spill suppression, fringe controls']],
    'MatteControl':      [['Erode/Dilate','Shrink or expand the matte edge'],['Blur','Soften the matte boundary for natural integration'],['Spill Factor','Reduce screen colour contamination at edge pixels']],
    'Transform':         [['Center','XY position in normalised image coordinates (0.5,0.5=centre)'],['Size','Uniform scale'],['Angle','Rotation in degrees'],['Pivot','Anchor point for rotation and scale']],
    'DVE':               [['Center','Position'],['Rotation','Angle in degrees'],['Scale','Zoom factor'],['Crop','Clip each edge independently'],['Edge','Boundary behaviour: black, reflect, wrap, duplicate']],
    'CornerPin':         [['Top Left/Right, Bottom Left/Right','Four corner positions to match the perspective surface']],
    'Text+':             [['Styled Text','The text content and font styling'],['Size','Text size in normalised units'],['Layout','Single line, paragraph, path-based'],['Tracking / Leading','Character and line spacing']],
    'FastNoise':         [['Type','Noise algorithm: Fast, Turbulent, Wispy etc.'],['Scale','Spatial frequency — smaller = larger patterns'],['Detail','Octave count — higher = more fine detail'],['Seethe Rate','Animation speed through the 4D noise space']],
    'Tracker':           [['Pattern Size','Template region around the track point'],['Search Size','How far to look each frame for the pattern'],['Channel','Which image channel to track on (luminance is default)']],
    'PlanarTracker':     [['Reference Frame','The frame to use as the template for planar analysis'],['Track Region','The rectangular area that defines the tracked surface']],
    'Renderer3D':        [['Renderer','OpenGL (fast/approximate) vs Software (slow/accurate)'],['Lighting','Enable/disable scene lighting'],['Anti-aliasing','Sample count for edge smoothing (Software renderer)']],
    'Loader':            [['File','Path to image sequence or video with frame number tokens'],['In/Out','Trim range of frames to use'],['Colour Space','Override the footage encoding interpretation']],
    'Saver':             [['File','Output path with frame number token (e.g. name_0001.exr)'],['Format','File type and compression settings'],['Channels','Which RGBA channels to write']],
  };
  if (params[name]) return params[name];
  // Category fallbacks
  const catParams = {
    'Blur':      [['Size','Blur radius in pixels'],['Quality','Sample count for accuracy']],
    'Color':     [['Master controls','Affect all channels at once'],['Per-channel','R/G/B individual correction'],['Mask','Restrict effect to a selected area']],
    'Warp':      [['Amount','Warp strength or displacement magnitude'],['Centre','Origin point of the distortion'],['Quality','Sample count for resampling accuracy']],
    'Transform': [['Center / Position','XY placement in normalised coordinates'],['Size / Scale','Zoom amount'],['Angle','Rotation in degrees']],
    'Keyer':     [['Screen Colour','The colour to be removed (green or blue)'],['Threshold','Tolerance for the key'],['Spill Suppression','Remove background colour contamination from edges']],
    'Filter':    [['Strength / Amount','Intensity of the filter effect'],['Quality','Sample count where applicable']],
    'Particle':  [['Number','Peak particle count simultaneously in flight'],['Life','Duration each particle exists before dying'],['Velocity','Initial speed on emission']],
  };
  return catParams[cat] || [];
}

// ── Helpers ───────────────────────────────────────────────────────────────
function escH(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escJ(s) { return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

// ── Category buttons ──────────────────────────────────────────────────────
function buildCatButtons() {
  const cats = ['3D','3D Light','3D Material','3D Texture','Blur','Color','Composite',
    'Creator','Custom','Effect','Filter','Flow','I/O','Keyer','Mask','Matte','Merge',
    'Misc','Particle','Stereo','Tracking','Transform','Warp'];
  const container = document.getElementById('cat-btns');
  const allBtn = '<button class="cat-btn active" data-cat="all" onclick="setCat(\'all\')">All ('+FUSION_NODES.length+')</button>';
  const btns = cats.map(c => {
    const count = FUSION_NODES.filter(n => n.c === c).length;
    return '<button class="cat-btn" data-cat="'+c+'" onclick="setCat(\''+c+'\')" style="--cat-c:'+getCatColor(c)+'">'+c+' ('+count+')</button>';
  }).join('');
  container.innerHTML = allBtn + btns;
}

// Keyboard shortcut: / to focus search
document.addEventListener('keydown', e => {
  if (e.key === '/' && e.target.tagName !== 'INPUT') { e.preventDefault(); document.getElementById('search').focus(); }
  if (e.key === 'Escape') closeNodeModal();
});

buildCatButtons();
render();
</script>
