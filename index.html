<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resolve Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0b;
    --surface: #111113;
    --surface2: #18181c;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e8e6e0;
    --muted: #6b6966;
    --accent: #c8f060;
    --accent2: #60b8f0;
    --tag-bg: rgba(200,240,96,0.08);
    --tag-color: #a8cc40;
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-weight: 300;
    min-height: 100vh;
    line-height: 1.6;
  }

  /* Header */
  header {
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
    backdrop-filter: blur(8px);
  }
  .logo {
    font-family: var(--font-head);
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: -0.02em;
    color: var(--text);
    text-decoration: none;
  }
  .logo span { color: var(--accent); }
  .header-actions { display: flex; gap: 10px; align-items: center; }
  .btn {
    font-family: var(--font-body);
    font-size: 13px;
    padding: 7px 16px;
    border-radius: 6px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    text-decoration: none;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .btn-accent {
    background: var(--accent);
    color: #0a0a0b;
    border-color: transparent;
    font-weight: 500;
  }
  .btn-accent:hover { background: #d4f570; color: #0a0a0b; }

  /* Layout */
  .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }

  /* Hero */
  .hero { padding: 4rem 0 2.5rem; }
  .hero h1 {
    font-family: var(--font-head);
    font-size: clamp(2rem, 4vw, 3.2rem);
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin-bottom: 0.75rem;
  }
  .hero h1 em { color: var(--accent); font-style: normal; }
  .hero p { color: var(--muted); font-size: 0.95rem; max-width: 420px; }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 2rem;
    padding: 1.5rem 0;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    margin-bottom: 2rem;
  }
  .stat-item { display: flex; flex-direction: column; gap: 2px; }
  .stat-num {
    font-family: var(--font-mono);
    font-size: 1.4rem;
    font-weight: 500;
    color: var(--accent);
  }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }

  /* Controls */
  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .search-wrap {
    flex: 1;
    min-width: 220px;
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.3;
  }
  .search-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px 9px 36px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--border2); }
  .search-input::placeholder { color: var(--muted); }

  .filter-chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip {
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    font-family: var(--font-body);
  }
  .chip:hover { border-color: var(--border2); color: var(--text); }
  .chip.active { background: var(--accent); color: #0a0a0b; border-color: transparent; font-weight: 500; }

  /* Sort */
  .sort-select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--muted);
    font-family: var(--font-body);
    font-size: 13px;
    outline: none;
    cursor: pointer;
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 4rem;
  }
  .card {
    background: var(--surface);
    padding: 1.5rem;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    flex-direction: column;
    gap: 10px;
    text-decoration: none;
    color: inherit;
  }
  .card:hover { background: var(--surface2); }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .card-title {
    font-family: var(--font-head);
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }
  .cat-badge {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
    font-family: var(--font-mono);
    letter-spacing: 0.02em;
  }
  .cat-3d-space   { background: rgba(96,184,240,0.12); color: #60b8f0; }
  .cat-3d-model   { background: rgba(200,240,96,0.12); color: #a8cc40; }
  .cat-text       { background: rgba(240,160,96,0.12); color: #f0a060; }
  .cat-background { background: rgba(200,96,240,0.12); color: #c060f0; }
  .cat-shape      { background: rgba(240,96,160,0.12); color: #f060a0; }
  .cat-light      { background: rgba(255,220,80,0.12); color: #e0b840; }
  .cat-ui         { background: rgba(96,240,200,0.12); color: #60f0c8; }
  .cat-camera     { background: rgba(160,120,240,0.12); color: #a078f0; }

  .diff-badge {
    font-size: 10px;
    font-family: var(--font-mono);
    color: var(--muted);
  }
  .diff-beginner     { color: #60f0c8; }
  .diff-intermediate { color: #f0a060; }
  .diff-advanced     { color: #f06060; }

  .card-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 11px;
    color: var(--muted);
    font-family: var(--font-mono);
  }
  .card-meta-dot { opacity: 0.3; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }
  .tag {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 3px;
    background: var(--tag-bg);
    color: var(--tag-color);
    font-family: var(--font-mono);
  }
  .card-thumb {
    width: 100%;
    aspect-ratio: 16/7;
    border-radius: 6px;
    overflow: hidden;
    background: var(--surface2);
    border: 1px solid var(--border);
  }
  .card-thumb iframe {
    width: 100%; height: 100%;
    border: none; pointer-events: none;
  }
  .card-thumb .thumb-placeholder {
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 11px;
    font-family: var(--font-mono);
  }

  .empty-state {
    grid-column: 1/-1;
    padding: 5rem 2rem;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
  }
  .empty-state strong { display: block; font-size: 1.1rem; color: var(--text); margin-bottom: 0.5rem; font-family: var(--font-head); }

  /* Modal / detail panel */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 50;
    backdrop-filter: blur(4px);
    overflow-y: auto;
    padding: 2rem 1rem;
  }
  .overlay.open { display: flex; justify-content: center; align-items: flex-start; }
  .panel {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 14px;
    width: 100%;
    max-width: 720px;
    overflow: hidden;
  }
  .panel-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 1.5rem 1.75rem 0;
    gap: 1rem;
  }
  .panel-title {
    font-family: var(--font-head);
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1.2;
  }
  .panel-badges { display: flex; gap: 8px; align-items: center; margin-top: 8px; flex-wrap: wrap; }
  .close-btn {
    background: none; border: none; cursor: pointer; color: var(--muted);
    font-size: 20px; line-height: 1; padding: 0; flex-shrink: 0; margin-top: 2px;
    transition: color 0.15s;
  }
  .close-btn:hover { color: var(--text); }
  .panel-video {
    margin: 1.25rem 1.75rem 0;
    border-radius: 8px;
    overflow: hidden;
    background: var(--surface2);
    border: 1px solid var(--border);
    aspect-ratio: 16/9;
  }
  .panel-video iframe { width: 100%; height: 100%; border: none; }
  .panel-video .no-video {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 12px; font-family: var(--font-mono);
    min-height: 160px;
  }
  .panel-body { padding: 1.25rem 1.75rem 1.75rem; display: flex; flex-direction: column; gap: 1.25rem; }
  .panel-section {}
  .section-label {
    font-size: 10px;
    font-family: var(--font-mono);
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }
  .section-text { font-size: 13px; color: var(--text); line-height: 1.7; }
  .steps-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
  .steps-list li {
    display: flex; gap: 10px; align-items: flex-start;
    font-size: 13px; color: var(--text); line-height: 1.6;
  }
  .step-num {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent);
    min-width: 20px;
    margin-top: 2px;
  }
  .code-block {
    background: #0d0d10;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
    font-family: var(--font-mono);
    font-size: 11px;
    color: #a8cc40;
    overflow-x: auto;
    white-space: pre;
    position: relative;
    max-height: 220px;
    overflow-y: auto;
  }
  .copy-btn {
    position: absolute;
    top: 8px; right: 8px;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--muted);
    cursor: pointer;
    font-family: var(--font-mono);
    transition: all 0.15s;
  }
  .copy-btn:hover { color: var(--text); }
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .info-item { background: var(--surface2); border-radius: 8px; padding: 10px 12px; }
  .info-item .section-label { margin-bottom: 3px; }
  .info-item .section-text { font-size: 12px; }
  .nodes-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .node-pill {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 4px;
    background: rgba(96,184,240,0.08);
    color: #60b8f0;
    font-family: var(--font-mono);
    border: 1px solid rgba(96,184,240,0.15);
  }
  .panel-tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .panel-divider { height: 1px; background: var(--border); }
  .related-effects { display: flex; flex-wrap: wrap; gap: 6px; }
  .related-chip {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--border2);
    color: var(--muted);
    cursor: pointer;
    font-family: var(--font-body);
    background: transparent;
    transition: all 0.15s;
  }
  .related-chip:hover { color: var(--text); border-color: var(--border2); }
  .panel-actions {
    display: flex; gap: 10px;
    padding: 1rem 1.75rem 1.5rem;
    border-top: 1px solid var(--border);
  }
  .btn-edit {
    font-size: 13px; padding: 8px 20px; border-radius: 6px;
    border: 1px solid var(--border2); background: transparent;
    color: var(--text); cursor: pointer; font-family: var(--font-body); transition: all 0.15s;
  }
  .btn-edit:hover { background: var(--surface2); }
  .btn-delete {
    font-size: 13px; padding: 8px 20px; border-radius: 6px;
    border: 1px solid rgba(240,96,96,0.3); background: transparent;
    color: #f06060; cursor: pointer; font-family: var(--font-body); transition: all 0.15s; margin-left: auto;
  }
  .btn-delete:hover { background: rgba(240,96,96,0.08); }
  .edit-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
    z-index: 60; backdrop-filter: blur(4px); overflow-y: auto; padding: 2rem 1rem;
  }
  .edit-overlay.open { display: flex; justify-content: center; align-items: flex-start; }
  .edit-panel {
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 14px; width: 100%; max-width: 720px; padding: 1.75rem;
  }
  .edit-panel h3 {
    font-family: var(--font-head); font-size: 1.2rem; font-weight: 700;
    letter-spacing: -0.02em; margin-bottom: 1.5rem; color: var(--text);
  }
  .edit-field { margin-bottom: 1rem; }
  .edit-field label {
    display: block; font-size: 10px; font-family: var(--font-mono);
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px;
  }
  .edit-field input, .edit-field select, .edit-field textarea {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 12px; color: var(--text);
    font-family: var(--font-body); font-size: 13px; outline: none; transition: border-color 0.15s;
  }
  .edit-field input:focus, .edit-field select:focus, .edit-field textarea:focus { border-color: var(--border2); }
  .edit-field textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
  .edit-field textarea.mono { font-family: var(--font-mono); font-size: 11px; color: #a8cc40; background: #0d0d10; min-height: 120px; }
  .edit-field select option { background: #1a1a1e; }
  .edit-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .edit-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border); }
  .confirm-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
    z-index: 70; backdrop-filter: blur(4px); align-items: center; justify-content: center;
  }
  .confirm-overlay.open { display: flex; }
  .confirm-box {
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 12px; padding: 2rem; max-width: 360px; width: 100%; margin: 1rem; text-align: center;
  }
  .confirm-box h4 { font-family: var(--font-head); font-size: 1.1rem; margin-bottom: 0.5rem; color: var(--text); }
  .confirm-box p { font-size: 13px; color: var(--muted); margin-bottom: 1.5rem; line-height: 1.5; }
  .confirm-actions { display: flex; gap: 10px; justify-content: center; }
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html">Resolve<span>.</span>Library</a>
  <div class="header-actions">
    <a class="btn" href="add.html">+ Add effect</a>
  </div>
</header>

<div class="container">
  <div class="hero">
    <h1>DaVinci Resolve<br><em>Effect Library</em></h1>
    <p>A personal reference of effects, grades, and Fusion setups — built to be shared.</p>
  </div>

  <div class="stats-bar" id="stats-bar">
    <div class="stat-item"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Effects</div></div>
    <div class="stat-item"><div class="stat-num" id="stat-cats">0</div><div class="stat-label">Categories</div></div>
    <div class="stat-item"><div class="stat-num" id="stat-tools">0</div><div class="stat-label">Node setups</div></div>
  </div>

  <div class="controls">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="5" stroke="white" stroke-width="1.5"/><path d="M10.5 10.5L14 14" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>
      <input class="search-input" type="text" id="search" placeholder="Search effects, tools, tags…" oninput="render()">
    </div>
    <div class="filter-chips" id="filter-chips"></div>
    <select class="sort-select" id="sort" onchange="render()">
      <option value="newest">Newest first</option>
      <option value="oldest">Oldest first</option>
      <option value="name">A–Z</option>
      <option value="difficulty">Difficulty</option>
    </select>
  </div>

  <div class="grid" id="grid"></div>
</div>

<!-- Detail overlay -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="panel" id="panel"></div>
</div>

<!-- Edit overlay -->
<div class="edit-overlay" id="edit-overlay" onclick="handleEditOverlayClick(event)">
  <div class="edit-panel" id="edit-panel"></div>
</div>

<!-- Delete confirm -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <h4>Delete this effect?</h4>
    <p>This can't be undone. The effect and all its data will be permanently removed.</p>
    <div class="confirm-actions">
      <button class="btn-edit" onclick="closeConfirm()">Cancel</button>
      <button class="btn-delete" id="confirm-delete-btn">Delete</button>
    </div>
  </div>
</div>

<script>
const CATS = {
  '3d-space':    { label: '3D space',    cls: 'cat-3d-space' },
  '3d-model':    { label: '3D model',    cls: 'cat-3d-model' },
  'text':        { label: 'Text',        cls: 'cat-text' },
  'background':  { label: 'Background',  cls: 'cat-background' },
  'shape':       { label: 'Shape',       cls: 'cat-shape' },
  'light':       { label: 'Light',       cls: 'cat-light' },
  'ui':          { label: 'UI',          cls: 'cat-ui' },
  'camera':      { label: 'Camera',      cls: 'cat-camera' },
};
const DIFF = {
  'beginner':     { label: 'Beginner',     cls: 'diff-beginner' },
  'intermediate': { label: 'Intermediate', cls: 'diff-intermediate' },
  'advanced':     { label: 'Advanced',     cls: 'diff-advanced' }
};

let effects = JSON.parse(localStorage.getItem('resolve-effects') || '[]');
let activeFilter = 'all';
let activeDetail = null;

function youtubeEmbed(url) {
  if (!url) return null;
  const m = url.match(/(?:youtu\.be\/|v=|shorts\/)([A-Za-z0-9_-]{11})/);
  return m ? `https://www.youtube.com/embed/${m[1]}?autoplay=0` : null;
}
function vimeoEmbed(url) {
  if (!url) return null;
  const m = url.match(/vimeo\.com\/(\d+)/);
  return m ? `https://player.vimeo.com/video/${m[1]}` : null;
}
function getEmbed(url) {
  if (!url) return null;
  return youtubeEmbed(url) || vimeoEmbed(url) || null;
}

function diffOrder(d) { return { beginner:0, intermediate:1, advanced:2 }[d] ?? 1; }

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const sort = document.getElementById('sort').value;
  let list = effects.filter(e => {
    const matchF = activeFilter === 'all' || e.cat === activeFilter;
    const searchFields = [e.name, e.desc, e.how, e.explanation, e.tool, e.version, ...(e.tags||[]), ...(e.nodes||[])];
    const matchQ = !q || searchFields.some(f => f && f.toLowerCase().includes(q));
    return matchF && matchQ;
  });
  list = [...list].sort((a,b) => {
    if (sort === 'newest') return new Date(b.date||0) - new Date(a.date||0);
    if (sort === 'oldest') return new Date(a.date||0) - new Date(b.date||0);
    if (sort === 'name') return a.name.localeCompare(b.name);
    if (sort === 'difficulty') return diffOrder(a.difficulty) - diffOrder(b.difficulty);
    return 0;
  });

  // Stats
  const cats = [...new Set(effects.map(e => e.cat))].length;
  const withNodes = effects.filter(e => e.nodeCode && e.nodeCode.trim()).length;
  document.getElementById('stat-total').textContent = effects.length;
  document.getElementById('stat-cats').textContent = cats;
  document.getElementById('stat-tools').textContent = withNodes;

  // Filter chips
  const counts = {};
  effects.forEach(e => counts[e.cat] = (counts[e.cat]||0)+1);
  const chips = [['all','All'],...Object.keys(CATS).filter(k=>counts[k]).map(k=>[k,CATS[k].label])];
  document.getElementById('filter-chips').innerHTML = chips.map(([k,l]) =>
    `<button class="chip ${activeFilter===k?'active':''}" onclick="setFilter('${k}')">${l}${k!=='all'&&counts[k]?' ('+counts[k]+')':''}</button>`
  ).join('');

  const grid = document.getElementById('grid');
  if (!list.length) {
    grid.innerHTML = `<div class="empty-state"><strong>${effects.length ? 'No results found' : 'No effects yet'}</strong>${effects.length ? 'Try adjusting your search or filter.' : 'Click "+ Add effect" to log your first one.'}</div>`;
    return;
  }

  grid.innerHTML = list.map(e => {
    const cat = CATS[e.cat] || CATS['fusion-effect'];
    const diff = DIFF[e.difficulty];
    const embed = getEmbed(e.videoUrl);
    const dateStr = e.date ? new Date(e.date).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : '';
    const tags = (e.tags||[]).slice(0,4).map(t=>`<span class="tag">${t}</span>`).join('');
    const extra = (e.tags||[]).length > 4 ? `<span class="tag">+${e.tags.length-4}</span>` : '';
    return `<div class="card" onclick="openDetail('${e.id}')">
      ${embed ? `<div class="card-thumb"><iframe src="${embed}" loading="lazy" allow="autoplay"></iframe></div>` : ''}
      <div class="card-top">
        <div class="card-title">${e.name}</div>
        <span class="cat-badge ${cat.cls}">${cat.label}</span>
      </div>
      ${diff ? `<div class="diff-badge ${diff.cls}">● ${diff.label}</div>` : ''}
      ${e.desc ? `<div class="card-desc">${e.desc}</div>` : ''}
      <div class="card-meta">
        ${e.version ? `<span>DR ${e.version}</span><span class="card-meta-dot">·</span>` : ''}
        ${dateStr ? `<span>${dateStr}</span>` : ''}
        ${e.renderWeight ? `<span class="card-meta-dot">·</span><span>${e.renderWeight}</span>` : ''}
      </div>
      ${tags || extra ? `<div class="card-tags">${tags}${extra}</div>` : ''}
    </div>`;
  }).join('');
}

function setFilter(k) { activeFilter = k; render(); }

function openDetail(id) {
  const e = effects.find(x => x.id === id);
  if (!e) return;
  activeDetail = id;
  const cat = CATS[e.cat] || CATS['fusion-effect'];
  const diff = DIFF[e.difficulty];
  const embed = getEmbed(e.videoUrl);
  const dateStr = e.date ? new Date(e.date).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : '';
  const steps = (e.steps||'').split('\n').filter(s=>s.trim());

  document.getElementById('panel').innerHTML = `
    <div class="panel-header">
      <div>
        <div class="panel-title">${e.name}</div>
        <div class="panel-badges">
          <span class="cat-badge ${cat.cls}">${cat.label}</span>
          ${diff ? `<span class="diff-badge ${diff.cls}">● ${diff.label}</span>` : ''}
          ${e.version ? `<span style="font-size:11px;color:var(--muted);font-family:var(--font-mono)">DR ${e.version}</span>` : ''}
          ${dateStr ? `<span style="font-size:11px;color:var(--muted);font-family:var(--font-mono)">${dateStr}</span>` : ''}
        </div>
      </div>
      <button class="close-btn" onclick="closeDetail()">&#x2715;</button>
    </div>

    ${embed ? `<div class="panel-video"><iframe src="${embed}" allow="autoplay; fullscreen"></iframe></div>` : `<div class="panel-video"><div class="no-video">no showcase video</div></div>`}

    <div class="panel-body">
      ${e.desc ? `<div class="panel-section"><div class="section-label">What it is</div><div class="section-text">${e.desc}</div></div>` : ''}
      ${e.explanation ? `<div class="panel-section"><div class="section-label">How & why it works</div><div class="section-text">${e.explanation}</div></div>` : ''}

      ${steps.length ? `<div class="panel-section">
        <div class="section-label">Step-by-step</div>
        <ol class="steps-list">${steps.map((s,i)=>`<li><span class="step-num">${String(i+1).padStart(2,'0')}</span><span>${s.replace(/^\d+[\.\)]\s*/,'')}</span></li>`).join('')}</ol>
      </div>` : ''}

      ${e.nodeCode ? `<div class="panel-section">
        <div class="section-label">Node tree code</div>
        <div class="code-block" id="nc-${e.id}">${escHtml(e.nodeCode)}<button class="copy-btn" onclick="copyCode('${e.id}')">copy</button></div>
      </div>` : ''}

      ${(e.nodes||[]).length ? `<div class="panel-section"><div class="section-label">Nodes / tools used</div><div class="nodes-list">${e.nodes.map(n=>`<span class="node-pill">${n}</span>`).join('')}</div></div>` : ''}

      <div class="info-grid">
        ${e.settingFile ? `<div class="info-item" style="grid-column:1/-1"><div class="section-label">.setting file name</div><div class="section-text" style="font-family:var(--font-mono);font-size:12px;color:#a8cc40">${e.settingFile}</div></div>` : ''}
        ${e.tool ? `<div class="info-item"><div class="section-label">Software</div><div class="section-text">${e.tool}</div></div>` : ''}
        ${e.renderWeight ? `<div class="info-item"><div class="section-label">Render weight</div><div class="section-text">${e.renderWeight}</div></div>` : ''}
        ${e.selfContained !== undefined ? `<div class="info-item"><div class="section-label">Self-contained?</div><div class="section-text">${e.selfContained ? 'Yes — no media needed' : 'Needs media input'}</div></div>` : ''}
        ${e.dependencies ? `<div class="info-item"><div class="section-label">Dependencies</div><div class="section-text">${e.dependencies}</div></div>` : ''}
        ${e.lightingSetup ? `<div class="info-item"><div class="section-label">Lighting setup</div><div class="section-text">${e.lightingSetup}</div></div>` : ''}
        ${e.materialSettings ? `<div class="info-item"><div class="section-label">Material settings</div><div class="section-text">${e.materialSettings}</div></div>` : ''}
        ${e.expressions ? `<div class="info-item" style="grid-column:1/-1"><div class="section-label">Expressions / scripts</div><div class="section-text">${e.expressions}</div></div>` : ''}
      </div>

      ${e.mistakes ? `<div class="panel-section"><div class="section-label">Common mistakes to avoid</div><div class="section-text">${e.mistakes}</div></div>` : ''}
      ${e.variations ? `<div class="panel-section"><div class="section-label">Variations & extensions</div><div class="section-text">${e.variations}</div></div>` : ''}
      ${e.notes ? `<div class="panel-section"><div class="section-label">Reuse notes</div><div class="section-text">${e.notes}</div></div>` : ''}

      ${(e.tags||[]).length ? `<div class="panel-section"><div class="section-label">Tags</div><div class="panel-tags">${e.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div></div>` : ''}

      ${e.related ? `<div class="panel-section">
        <div class="section-label">Related effects</div>
        <div class="related-effects">${e.related.split(',').map(r=>r.trim()).filter(Boolean).map(r=>`<button class="related-chip" onclick="searchFor('${r}')">${r}</button>`).join('')}</div>
      </div>` : ''}
    </div>
    <div class="panel-actions">
      <button class="btn-edit" onclick="openEdit('${e.id}')">Edit effect</button>
      <button class="btn-delete" onclick="promptDelete('${e.id}')">Delete</button>
    </div>
  `;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
  activeDetail = null;
}
function handleOverlayClick(e) { if (e.target === document.getElementById('overlay')) closeDetail(); }
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function copyCode(id) {
  const e = effects.find(x=>x.id===id);
  if (!e) return;
  navigator.clipboard.writeText(e.nodeCode).then(()=>{
    const btn = document.querySelector(`#nc-${id} .copy-btn`);
    if(btn){btn.textContent='copied!';setTimeout(()=>btn.textContent='copy',1500);}
  });
}
function searchFor(term) {
  closeDetail();
  document.getElementById('search').value = term;
  render();
}

// ---- Edit ----
function openEdit(id) {
  const e = effects.find(x => x.id === id);
  if (!e) return;
  closeDetail();
  document.getElementById('edit-panel').innerHTML = `
    <h3>Edit effect</h3>
    <div class="edit-row">
      <div class="edit-field"><label>Effect name</label><input id="e-name" type="text" value="${escAttr(e.name)}"/></div>
      <div class="edit-field"><label>Category</label>
        <select id="e-cat">
          ${Object.entries(CATS).map(([k,v])=>`<option value="${k}" ${e.cat===k?'selected':''}>${v.label}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="edit-row">
      <div class="edit-field"><label>DaVinci Resolve version</label><input id="e-version" type="text" value="${escAttr(e.version||'')}"/></div>
      <div class="edit-field"><label>Difficulty</label>
        <select id="e-difficulty">
          <option value="">— select —</option>
          ${Object.entries(DIFF).map(([k,v])=>`<option value="${k}" ${e.difficulty===k?'selected':''}>${v.label}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="edit-field"><label>Short description</label><textarea id="e-desc">${escHtml(e.desc||'')}</textarea></div>
    <div class="edit-field"><label>YouTube / Vimeo URL</label><input id="e-video" type="text" value="${escAttr(e.videoUrl||'')}"/></div>
    <div class="edit-field"><label>Full explanation</label><textarea id="e-explanation">${escHtml(e.explanation||'')}</textarea></div>
    <div class="edit-field"><label>Step-by-step (one per line)</label><textarea id="e-steps">${escHtml(e.steps||'')}</textarea></div>
    <div class="edit-field"><label>.setting file name</label><input id="e-settingFile" type="text" value="${escAttr(e.settingFile||'')}"/></div>
    <div class="edit-field"><label>Node tree code</label><textarea class="mono" id="e-nodeCode">${escHtml(e.nodeCode||'')}</textarea></div>
    <div class="edit-field"><label>Nodes / tools used (comma separated)</label><input id="e-nodes" type="text" value="${escAttr((e.nodes||[]).join(', '))}"/></div>
    <div class="edit-row">
      <div class="edit-field"><label>Render weight</label>
        <select id="e-render">
          <option value="">— select —</option>
          ${['Light','Medium','Heavy'].map(w=>`<option value="${w}" ${e.renderWeight===w?'selected':''}>${w}</option>`).join('')}
        </select>
      </div>
      <div class="edit-field"><label>Self-contained?</label>
        <select id="e-self">
          <option value="">— select —</option>
          <option value="true" ${e.selfContained===true?'selected':''}>Yes — no media needed</option>
          <option value="false" ${e.selfContained===false?'selected':''}>No — needs media input</option>
        </select>
      </div>
    </div>
    <div class="edit-field"><label>Dependencies</label><input id="e-deps" type="text" value="${escAttr(e.dependencies||'')}"/></div>
    <div class="edit-field"><label>Lighting setup</label><input id="e-lighting" type="text" value="${escAttr(e.lightingSetup||'')}"/></div>
    <div class="edit-field"><label>Material settings</label><input id="e-material" type="text" value="${escAttr(e.materialSettings||'')}"/></div>
    <div class="edit-field"><label>Expressions / scripts</label><textarea id="e-expressions">${escHtml(e.expressions||'')}</textarea></div>
    <div class="edit-field"><label>Common mistakes</label><textarea id="e-mistakes">${escHtml(e.mistakes||'')}</textarea></div>
    <div class="edit-field"><label>Variations & extensions</label><textarea id="e-variations">${escHtml(e.variations||'')}</textarea></div>
    <div class="edit-field"><label>Reuse notes</label><textarea id="e-notes">${escHtml(e.notes||'')}</textarea></div>
    <div class="edit-field"><label>Related effects (comma separated)</label><input id="e-related" type="text" value="${escAttr(e.related||'')}"/></div>
    <div class="edit-field"><label>Tags (comma separated)</label><input id="e-tags" type="text" value="${escAttr((e.tags||[]).join(', '))}"/></div>
    <div class="edit-field"><label>Software / tool</label><input id="e-tool" type="text" value="${escAttr(e.tool||'')}"/></div>
    <div class="edit-actions">
      <button class="btn-edit" onclick="closeEdit()">Cancel</button>
      <button class="btn-edit" style="background:var(--accent);color:#0a0a0b;border-color:transparent;font-weight:500" onclick="saveEdit('${e.id}')">Save changes</button>
    </div>
  `;
  document.getElementById('edit-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeEdit() {
  document.getElementById('edit-overlay').classList.remove('open');
  document.body.style.overflow = '';
}
function handleEditOverlayClick(e) { if (e.target === document.getElementById('edit-overlay')) closeEdit(); }

function escAttr(s) { return (s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function saveEdit(id) {
  const idx = effects.findIndex(x => x.id === id);
  if (idx === -1) return;
  const selfVal = document.getElementById('e-self').value;
  effects[idx] = {
    ...effects[idx],
    name:            document.getElementById('e-name').value.trim(),
    cat:             document.getElementById('e-cat').value,
    version:         document.getElementById('e-version').value.trim(),
    difficulty:      document.getElementById('e-difficulty').value,
    desc:            document.getElementById('e-desc').value.trim(),
    videoUrl:        document.getElementById('e-video').value.trim(),
    explanation:     document.getElementById('e-explanation').value.trim(),
    steps:           document.getElementById('e-steps').value.trim(),
    settingFile:     document.getElementById('e-settingFile').value.trim(),
    nodeCode:        document.getElementById('e-nodeCode').value.trim(),
    nodes:           document.getElementById('e-nodes').value.split(',').map(s=>s.trim()).filter(Boolean),
    renderWeight:    document.getElementById('e-render').value,
    selfContained:   selfVal === 'true' ? true : selfVal === 'false' ? false : undefined,
    dependencies:    document.getElementById('e-deps').value.trim(),
    lightingSetup:   document.getElementById('e-lighting').value.trim(),
    materialSettings:document.getElementById('e-material').value.trim(),
    expressions:     document.getElementById('e-expressions').value.trim(),
    mistakes:        document.getElementById('e-mistakes').value.trim(),
    variations:      document.getElementById('e-variations').value.trim(),
    notes:           document.getElementById('e-notes').value.trim(),
    related:         document.getElementById('e-related').value.trim(),
    tags:            document.getElementById('e-tags').value.split(',').map(s=>s.trim()).filter(Boolean),
    tool:            document.getElementById('e-tool').value.trim(),
  };
  localStorage.setItem('resolve-effects', JSON.stringify(effects));
  closeEdit();
  render();
}

// ---- Delete ----
function promptDelete(id) {
  document.getElementById('confirm-overlay').classList.add('open');
  document.getElementById('confirm-delete-btn').onclick = () => confirmDelete(id);
}
function closeConfirm() { document.getElementById('confirm-overlay').classList.remove('open'); }
function confirmDelete(id) {
  effects = effects.filter(x => x.id !== id);
  localStorage.setItem('resolve-effects', JSON.stringify(effects));
  closeConfirm();
  closeDetail();
  render();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeDetail(); closeEdit(); closeConfirm(); }
});
render();
</script>
</body>
</html>
