<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#09090e">
  <title>Notes</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='38' cy='50' r='22' fill='%236c7bff'/><circle cx='62' cy='50' r='22' fill='%239ca8ff'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:#09090e; --ink-soft:#0f0f16; --ink-mute:#16161f; --ink-lift:#1e1e2a;
      --violet:#6c7bff; --violet-light:#9ca8ff; --violet-dark:#4451d4;
      --teal:#0fa888; --coral:#c95238; --amber:#b07118;
      --white:#f4f4fb; --gray-4:#8f8fa8; --gray-6:#585870;
      --fd:'Syne',sans-serif; --fb:'DM Sans',sans-serif; --fm:'DM Mono',monospace;
      --r:7px; --rl:14px; --rll:18px; --rp:999px;
      --gb:rgba(14,14,20,0.88); --gb2:rgba(22,22,31,0.92); --ga:rgba(108,123,255,0.16);
      --blur:blur(18px) saturate(180%);
      --bd:rgba(255,255,255,0.07); --bd2:rgba(255,255,255,0.13);
      --shine:inset 0 1px 0 rgba(255,255,255,0.055);
      --ease:cubic-bezier(0.16,1,0.3,1); --dur:150ms;
      --danger:#f06060;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;font-family:var(--fb);background:var(--ink);color:var(--white);-webkit-font-smoothing:antialiased;overflow:hidden}
    button{font-family:var(--fb);cursor:pointer;border:none;background:none;color:inherit}
    input,textarea{font-family:var(--fb);color:var(--white);background:none;border:none;outline:none;resize:none}
    input::placeholder,textarea::placeholder{color:var(--gray-6)}

    /* ── BG ── */
    .orb{position:fixed;border-radius:50%;pointer-events:none;filter:blur(90px);opacity:0.07;z-index:0}
    .orb1{width:560px;height:560px;top:-120px;left:-120px;background:var(--violet)}
    .orb2{width:440px;height:440px;bottom:-100px;right:-80px;background:var(--teal)}

    /* ── APP SHELL ── */
    #app{display:flex;flex-direction:column;height:100vh;position:relative;z-index:1}

    /* ── HEADER ── */
    header{display:flex;align-items:center;height:56px;padding:0 16px;gap:10px;border-bottom:1px solid var(--bd);background:var(--gb);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);flex-shrink:0;z-index:10;position:relative}
    .logo{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .logo-dots{display:flex;align-items:center}
    .ld{width:8px;height:8px;border-radius:50%;background:var(--violet)}
    .ld2{background:var(--violet-light);margin-left:-3px}
    .brand{font-family:var(--fd);font-weight:800;font-size:.95rem;letter-spacing:-.03em}
    .brand em{color:var(--violet);font-style:normal}
    .search-wrap{flex:1;max-width:360px;margin:0 auto;position:relative;display:flex;align-items:center}
    .si{position:absolute;left:10px;font-family:var(--fm);font-size:12px;color:var(--gray-6);pointer-events:none}
    .search{width:100%;height:32px;background:var(--ink-lift);border:1px solid var(--bd);border-radius:var(--r);padding:0 10px 0 28px;font-size:12.5px;transition:border-color var(--dur)}
    .search:focus{border-color:rgba(108,123,255,.5)}
    .hdr-r{display:flex;align-items:center;gap:6px;flex-shrink:0}
    .ibtn{width:32px;height:32px;border-radius:var(--r);border:1px solid var(--bd);background:var(--gb);color:var(--gray-4);display:flex;align-items:center;justify-content:center;transition:all var(--dur);font-size:14px;flex-shrink:0}
    .ibtn:hover{color:var(--white);background:var(--gb2);border-color:var(--bd2)}
    .new-btn{height:32px;padding:0 13px;border-radius:var(--r);border:1px solid rgba(108,123,255,.4);background:rgba(108,123,255,.14);color:var(--violet-light);font-size:12.5px;font-weight:500;display:flex;align-items:center;gap:5px;transition:all var(--dur);white-space:nowrap}
    .new-btn:hover{background:rgba(108,123,255,.26);border-color:var(--violet);color:#fff}

    /* ── MAIN ── */
    .main{display:flex;flex:1;overflow:hidden}

    /* ── SIDEBAR ── */
    aside{width:252px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--bd);background:rgba(9,9,14,.65);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);overflow:hidden;transition:width .28s var(--ease)}
    aside.closed{width:0;border-right:none}

    /* ── SUBJECTS PANEL ── */
    .subj-panel{flex-shrink:0;border-bottom:1px solid var(--bd);overflow:hidden;transition:all .28s var(--ease)}
    .subj-hdr{display:flex;align-items:center;padding:10px 10px 10px 14px;gap:6px;cursor:pointer}
    .subj-hdr-label{font-family:var(--fm);font-size:9.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--gray-6);flex:1}
    .subj-hdr-hint{font-family:var(--fm);font-size:8.5px;color:var(--gray-6);opacity:.6;margin-right:4px}
    .subj-toggle{width:22px;height:22px;border-radius:5px;background:var(--ink-lift);border:1px solid var(--bd);color:var(--gray-4);display:flex;align-items:center;justify-content:center;font-size:10px;transition:all var(--dur);flex-shrink:0}
    .subj-toggle:hover{color:var(--white);background:var(--ink-mute)}
    .add-subj-btn{width:22px;height:22px;border-radius:5px;background:rgba(108,123,255,.1);border:1px solid rgba(108,123,255,.25);color:var(--violet-light);display:flex;align-items:center;justify-content:center;font-size:13px;transition:all var(--dur);flex-shrink:0}
    .add-subj-btn:hover{background:rgba(108,123,255,.22);border-color:var(--violet)}
    .subj-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;padding:0 8px 10px}
    .subj-chip{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:var(--rl);border:1px solid var(--bd);background:var(--ink-mute);cursor:grab;transition:all var(--dur);position:relative;overflow:hidden;user-select:none;-webkit-user-select:none}
    .subj-chip::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--sc,var(--violet));border-radius:2px 0 0 2px}
    .subj-chip:hover{border-color:var(--bd2);background:var(--ink-lift);transform:translateY(-1px)}
    .subj-chip.dragging{opacity:.4;cursor:grabbing}
    .subj-chip.selected{border-color:var(--sc,var(--violet));background:rgba(var(--sc-rgb,108,123,255),.12);box-shadow:0 0 0 1px var(--sc,var(--violet)) inset}
    .chip-icon{font-size:14px;flex-shrink:0;line-height:1}
    .chip-name{font-family:var(--fm);font-size:9.5px;color:var(--gray-4);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color var(--dur)}
    .subj-chip:hover .chip-name{color:var(--white)}
    .chip-del{position:absolute;top:3px;right:4px;width:14px;height:14px;border-radius:3px;background:rgba(240,96,96,.12);color:var(--danger);font-size:9px;display:none;align-items:center;justify-content:center;border:none;cursor:pointer}
    .subj-chip:hover .chip-del{display:flex}

    /* ── SIDEBAR FILTERS ── */
    .sb-filters{padding:10px 8px 4px;flex-shrink:0}
    .sb-sec{font-family:var(--fm);font-size:9.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--gray-6);padding:0 4px 6px;display:flex;align-items:center;justify-content:space-between}
    .tag-pills{display:flex;gap:4px;flex-wrap:wrap;padding:0 4px 8px}
    .tp{font-family:var(--fm);font-size:9px;padding:3px 9px;border-radius:var(--rp);background:var(--ink-lift);color:var(--gray-4);border:1px solid var(--bd);cursor:pointer;transition:all var(--dur)}
    .tp:hover,.tp.on{background:rgba(108,123,255,.14);color:var(--violet-light);border-color:rgba(108,123,255,.3)}

    /* ── NOTE LIST ── */
    .note-list{flex:1;overflow-y:auto;padding:0 6px 12px;scrollbar-width:thin;scrollbar-color:var(--ink-lift) transparent}
    .note-item{padding:9px 10px;border-radius:var(--r);border:1px solid transparent;cursor:pointer;transition:all var(--dur);margin-bottom:2px;position:relative;overflow:hidden}
    .note-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:0;background:var(--ni-accent,transparent);border-radius:2px 0 0 2px;transition:width .2s var(--ease)}
    .note-item.has-subject::before{width:3px}
    .note-item:hover{background:var(--ink-lift);border-color:var(--bd)}
    .note-item.active{background:var(--ga);border-color:rgba(108,123,255,.28)}
    .note-item.drop-over{border-color:var(--drop-accent,var(--violet)) !important;background:var(--drop-bg,rgba(108,123,255,.1)) !important;transform:scale(1.01)}
    .ni-title{font-size:12.5px;font-weight:500;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;padding-left:0;transition:padding-left .2s var(--ease)}
    .note-item.has-subject .ni-title{padding-left:6px}
    .ni-preview{font-size:11px;color:var(--gray-4);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
    .ni-meta{display:flex;align-items:center;gap:5px;margin-top:4px}
    .ni-date{font-family:var(--fm);font-size:9.5px;color:var(--gray-6)}
    .ni-tag{font-family:var(--fm);font-size:9px;padding:1px 6px;border-radius:var(--rp);background:rgba(108,123,255,.1);color:var(--violet-light);border:1px solid rgba(108,123,255,.18)}
    .ni-tag.teal{background:rgba(15,168,136,.1);color:#5bd4bc;border-color:rgba(15,168,136,.2)}
    .ni-tag.coral{background:rgba(201,82,56,.1);color:#e8856b;border-color:rgba(201,82,56,.2)}
    .ni-tag.amber{background:rgba(176,113,24,.1);color:#d4a64a;border-color:rgba(176,113,24,.2)}
    .ni-subj{font-family:var(--fm);font-size:9px;padding:1px 6px;border-radius:var(--rp);border:1px solid;display:flex;align-items:center;gap:3px}
    .no-notes{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 16px;gap:8px}
    .no-notes-icon{width:38px;height:38px;border-radius:var(--rl);background:rgba(108,123,255,.1);border:1px solid rgba(108,123,255,.2);display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:4px}
    .no-notes p{font-family:var(--fm);font-size:9.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--gray-6);text-align:center}

    /* ── EDITOR ── */
    .editor{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
    .ed-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--gray-6)}
    .ed-empty-icon{font-size:34px;opacity:.25}
    .ed-empty p{font-family:var(--fm);font-size:11px;letter-spacing:.08em;text-transform:uppercase}
    #ed-wrap{display:none;flex:1;flex-direction:column;overflow:hidden;position:relative}
    /* subject accent bar */
    #ed-wrap::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--ed-accent,transparent);z-index:5;transition:background .3s var(--ease)}
    /* subject glow */
    #ed-wrap::after{content:'';position:absolute;top:0;left:0;right:0;height:180px;background:radial-gradient(ellipse 70% 100% at 50% 0%,rgba(var(--ed-rgb,0,0,0),.07) 0%,transparent 100%);pointer-events:none;z-index:0;transition:all .4s var(--ease)}
    .ed-hdr{display:flex;align-items:flex-start;gap:8px;padding:16px 18px 0;flex-shrink:0;position:relative;z-index:1}
    .ed-title{flex:1;font-family:var(--fd);font-weight:700;font-size:1.4rem;letter-spacing:-.03em;color:var(--white);padding:4px 0;line-height:1.2}
    .ed-title::placeholder{color:var(--ink-lift)}
    .ed-actions{display:flex;align-items:center;gap:5px;flex-shrink:0;padding-top:6px}
    .ed-meta{display:flex;align-items:center;gap:7px;padding:6px 18px;flex-shrink:0;flex-wrap:wrap;position:relative;z-index:1}
    .ed-date{font-family:var(--fm);font-size:9.5px;color:var(--gray-6)}
    .ed-sep{color:var(--ink-lift)}
    .subj-badge{display:inline-flex;align-items:center;gap:4px;font-family:var(--fm);font-size:9px;padding:2px 8px;border-radius:var(--rp);border:1px solid;cursor:pointer;transition:all var(--dur)}
    .subj-badge:hover{filter:brightness(1.2)}
    .color-badge{font-family:var(--fm);font-size:9px;padding:2px 8px;border-radius:var(--rp);background:rgba(108,123,255,.1);color:var(--violet-light);border:1px solid rgba(108,123,255,.2);cursor:pointer;transition:all var(--dur)}
    .color-badge:hover{background:rgba(108,123,255,.2)}
    .color-badge.teal{background:rgba(15,168,136,.1);color:#5bd4bc;border-color:rgba(15,168,136,.2)}
    .color-badge.coral{background:rgba(201,82,56,.1);color:#e8856b;border-color:rgba(201,82,56,.2)}
    .color-badge.amber{background:rgba(176,113,24,.1);color:#d4a64a;border-color:rgba(176,113,24,.2)}
    .add-tag-btn{font-family:var(--fm);font-size:9px;padding:2px 8px;border-radius:var(--rp);background:var(--ink-lift);color:var(--gray-4);border:1px solid var(--bd);cursor:pointer;transition:all var(--dur)}
    .add-tag-btn:hover{color:var(--white);border-color:var(--bd2)}
    .ed-divider{height:1px;background:var(--bd);margin:6px 0;flex-shrink:0;position:relative;z-index:1}
    .ed-body{flex:1;overflow-y:auto;padding:2px 18px 24px;scrollbar-width:thin;scrollbar-color:var(--ink-lift) transparent;position:relative;z-index:1}
    .ed-content{width:100%;min-height:280px;font-size:14px;line-height:1.8;color:var(--gray-4);font-weight:300}
    .ed-content:focus{color:rgba(244,244,251,.85)}
    .ed-footer{font-family:var(--fm);font-size:9px;color:var(--gray-6);text-align:right;padding:4px 18px;flex-shrink:0;position:relative;z-index:1}

    /* ── DRAG GHOST ── */
    .drag-ghost{position:fixed;pointer-events:none;z-index:9999;padding:6px 12px;border-radius:var(--rl);border:1px solid;font-family:var(--fm);font-size:11px;display:flex;align-items:center;gap:6px;opacity:.9;transform:translate(-50%,-50%);backdrop-filter:var(--blur);display:none}

    /* ── POPOVERS ── */
    .pop{position:fixed;background:var(--gb2);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--bd2);border-radius:var(--rl);box-shadow:0 8px 32px rgba(0,0,0,.6),var(--shine);z-index:200;display:none;overflow:hidden;min-width:160px}
    .pop.show{display:block;animation:popIn .18s var(--ease) both}
    @keyframes popIn{from{opacity:0;transform:scale(.94) translateY(-4px)}to{opacity:1;transform:none}}
    .pi{display:flex;align-items:center;gap:9px;padding:9px 12px;font-size:12.5px;color:var(--gray-4);cursor:pointer;transition:background var(--dur)}
    .pi:hover{background:rgba(255,255,255,.05);color:var(--white)}
    .pi.danger{color:var(--danger)}
    .pi.danger:hover{background:rgba(240,96,96,.08)}
    .pi .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .pdiv{height:1px;background:var(--bd);margin:3px 0}

    /* ── CREATE SUBJECT MODAL ── */
    .modal-overlay{position:fixed;inset:0;background:rgba(9,9,14,.7);backdrop-filter:blur(8px);z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s var(--ease)}
    .modal-overlay.show{opacity:1;pointer-events:all}
    .modal{background:var(--ink-mute);border:1px solid var(--bd2);border-radius:var(--rll);box-shadow:0 24px 64px rgba(0,0,0,.7);padding:0;width:360px;max-width:calc(100vw - 32px);transform:translateY(16px) scale(.97);transition:transform .25s var(--ease);overflow:hidden}
    .modal-overlay.show .modal{transform:none}
    .modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 14px;border-bottom:1px solid var(--bd)}
    .modal-title{font-family:var(--fd);font-weight:700;font-size:1rem;letter-spacing:-.02em}
    .modal-close{width:28px;height:28px;border-radius:6px;background:var(--ink-lift);border:1px solid var(--bd);color:var(--gray-4);display:flex;align-items:center;justify-content:center;font-size:13px;transition:all var(--dur)}
    .modal-close:hover{color:var(--white);background:var(--ink-mute)}
    .modal-body{padding:18px}
    .field{margin-bottom:16px}
    .field-label{font-family:var(--fm);font-size:9.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--gray-6);display:block;margin-bottom:6px}
    .field-row{display:flex;gap:8px}
    .emoji-input{width:52px;height:40px;background:var(--ink-lift);border:1px solid var(--bd);border-radius:var(--r);text-align:center;font-size:20px;transition:border-color var(--dur);flex-shrink:0}
    .emoji-input:focus{border-color:rgba(108,123,255,.5)}
    .text-input{flex:1;height:40px;background:var(--ink-lift);border:1px solid var(--bd);border-radius:var(--r);padding:0 12px;font-size:13px;color:var(--white);transition:border-color var(--dur)}
    .text-input:focus{border-color:rgba(108,123,255,.5)}
    .color-swatches{display:flex;gap:7px;flex-wrap:wrap}
    .swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;transition:transform .15s,box-shadow .15s;border:2px solid transparent;flex-shrink:0}
    .swatch:hover{transform:scale(1.15)}
    .swatch.on{border-color:rgba(255,255,255,.5);box-shadow:0 0 0 2px var(--sw-c)}
    .swatch-custom{width:28px;height:28px;border-radius:50%;overflow:hidden;cursor:pointer;flex-shrink:0;border:2px solid var(--bd)}
    .swatch-custom input{width:200%;height:200%;transform:translate(-25%,-25%);cursor:pointer;border:none;padding:0;background:none}
    .modal-preview{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:var(--rl);background:var(--ink-lift);margin-bottom:16px;border:1px solid var(--bd)}
    .preview-chip{display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:var(--rl);border:1px solid var(--bd);background:var(--ink-mute);position:relative;overflow:hidden}
    .preview-chip::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:2px 0 0 2px}
    .preview-label{font-family:var(--fm);font-size:9.5px;color:var(--gray-4)}
    .modal-ft{display:flex;gap:8px;padding:0 18px 18px}
    .btn-create{flex:1;height:38px;border-radius:var(--r);background:rgba(108,123,255,.18);border:1px solid rgba(108,123,255,.4);color:var(--violet-light);font-size:13px;font-weight:500;transition:all var(--dur)}
    .btn-create:hover{background:rgba(108,123,255,.3);border-color:var(--violet);color:#fff}
    .btn-cancel{height:38px;padding:0 16px;border-radius:var(--r);background:var(--ink-lift);border:1px solid var(--bd);color:var(--gray-4);font-size:13px;transition:all var(--dur)}
    .btn-cancel:hover{color:var(--white);border-color:var(--bd2)}

    /* ── TOAST ── */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--gb2);backdrop-filter:var(--blur);border:1px solid var(--bd2);border-radius:var(--rl);padding:9px 18px;font-size:12.5px;color:var(--white);display:flex;align-items:center;gap:7px;opacity:0;pointer-events:none;z-index:400;transition:all .3s var(--ease)}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .tdot{width:6px;height:6px;border-radius:50%;background:var(--teal);flex-shrink:0}

    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--ink-lift);border-radius:2px}
    @media(max-width:600px){aside{width:200px}.search-wrap{max-width:150px}}
  </style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div id="app">
  <header>
    <div class="logo">
      <div class="logo-dots"><div class="ld"></div><div class="ld ld2"></div></div>
      <span class="brand">notes<em>.</em></span>
    </div>
    <div class="search-wrap">
      <span class="si">⌕</span>
      <input class="search" id="search" placeholder="Search notes…" oninput="renderList()">
    </div>
    <div class="hdr-r">
      <button class="ibtn" title="Toggle sidebar" onclick="toggleSidebar()">☰</button>
      <button class="new-btn" onclick="newNote()">+ New note</button>
    </div>
  </header>

  <div class="main">
    <aside id="sidebar">
      <!-- SUBJECTS PANEL -->
      <div class="subj-panel" id="subj-panel">
        <div class="subj-hdr" onclick="toggleSubjectsPanel()">
          <span class="subj-hdr-label">Subject feels</span>
          <span class="subj-hdr-hint" id="subj-hint">drag to apply</span>
          <button class="add-subj-btn" onclick="openCreateModal(event)" title="Create subject">+</button>
          <button class="subj-toggle" id="subj-toggle">⌃</button>
        </div>
        <div class="subj-grid" id="subj-grid"></div>
      </div>

      <!-- FILTERS -->
      <div class="sb-filters">
        <div class="tag-pills" id="tag-pills"></div>
        <div class="sb-sec">Notes <span id="note-count" style="font-size:9px;color:var(--violet-light)">0</span></div>
      </div>

      <!-- NOTE LIST -->
      <div class="note-list" id="note-list"
        ondragover="onListDragOver(event)"
        ondragleave="onListDragLeave(event)"
        ondrop="onListDrop(event)">
      </div>
    </aside>

    <div class="editor" id="editor">
      <div class="ed-empty" id="ed-empty">
        <div class="ed-empty-icon">✦</div>
        <p>Select a note or create one</p>
      </div>
      <div id="ed-wrap">
        <div class="ed-hdr">
          <input class="ed-title" id="ed-title" placeholder="Untitled note" oninput="saveActive()">
          <div class="ed-actions">
            <button class="ibtn" id="menu-btn" onclick="toggleMenu(event)" style="font-size:16px;letter-spacing:1px">⋯</button>
          </div>
        </div>
        <div class="ed-meta">
          <span class="ed-date" id="ed-date"></span>
          <span class="ed-sep">·</span>
          <div id="ed-badges"></div>
          <button class="add-tag-btn" onclick="toggleTagMenu(event)">+ colour</button>
        </div>
        <div class="ed-divider"></div>
        <div class="ed-body">
          <textarea class="ed-content" id="ed-content" placeholder="Start writing…" oninput="saveActive()"></textarea>
        </div>
        <div class="ed-footer" id="ed-footer"></div>
      </div>
    </div>
  </div>
</div>

<!-- Drag ghost -->
<div class="drag-ghost" id="drag-ghost"></div>

<!-- Note menu -->
<div class="pop" id="note-menu">
  <div class="pi" onclick="pinNote()"><span>📌</span><span id="pin-lbl">Pin note</span></div>
  <div class="pi" onclick="duplicateNote()"><span>⎘</span> Duplicate</div>
  <div class="pi" onclick="clearSubject()"><span>✦</span> Remove subject</div>
  <div class="pdiv"></div>
  <div class="pi danger" onclick="deleteNote()"><span>✕</span> Delete note</div>
</div>

<!-- Tag/colour menu -->
<div class="pop" id="tag-menu">
  <div class="pi" onclick="setTag('')"><span class="dot" style="background:var(--gray-4)"></span> None</div>
  <div class="pi" onclick="setTag('violet')"><span class="dot" style="background:var(--violet)"></span> Violet</div>
  <div class="pi" onclick="setTag('teal')"><span class="dot" style="background:var(--teal)"></span> Teal</div>
  <div class="pi" onclick="setTag('coral')"><span class="dot" style="background:var(--coral)"></span> Coral</div>
  <div class="pi" onclick="setTag('amber')"><span class="dot" style="background:var(--amber)"></span> Amber</div>
</div>

<!-- Create subject modal -->
<div class="modal-overlay" id="create-modal" onclick="closeCreateModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-hdr">
      <span class="modal-title">New Subject</span>
      <button class="modal-close" onclick="closeCreateModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label class="field-label">Icon &amp; Name</label>
        <div class="field-row">
          <input class="emoji-input" id="cs-icon" type="text" maxlength="2" placeholder="✦" oninput="updatePreview()">
          <input class="text-input" id="cs-name" type="text" placeholder="Subject name…" oninput="updatePreview()" maxlength="24">
        </div>
      </div>
      <div class="field">
        <label class="field-label">Colour</label>
        <div class="color-swatches" id="cs-swatches"></div>
      </div>
      <div class="field" style="margin-bottom:0">
        <label class="field-label">Preview</label>
        <div class="modal-preview">
          <div class="preview-chip" id="cs-preview">
            <span id="cs-prev-icon" style="font-size:14px;line-height:1">✦</span>
            <span class="chip-name" id="cs-prev-name">Subject name</span>
          </div>
          <span style="font-family:var(--fm);font-size:10px;color:var(--gray-6)">drag onto any note →</span>
        </div>
      </div>
    </div>
    <div class="modal-ft">
      <button class="btn-cancel" onclick="closeCreateModal()">Cancel</button>
      <button class="btn-create" onclick="createSubject()">Create subject</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"><div class="tdot"></div><span id="toast-msg"></span></div>

<script>
/* ═══════════════════════════════════════════
   DATA
═══════════════════════════════════════════ */
let notes = [], subjects = [], activeId = null, sidebarOpen = true;
let activeTagFilter = '', activeSubjFilter = '';
let draggedSubject = null, selectedSubject = null;
let subjPanelOpen = true;

const PRESET_SUBJECTS = [
  { id:'science',    name:'Science',     icon:'⚗',  color:'#0fa888', rgb:'15,168,136' },
  { id:'literature', name:'Literature',  icon:'📖', color:'#c9922a', rgb:'201,146,42' },
  { id:'design',     name:'Design',      icon:'✦',  color:'#6c7bff', rgb:'108,123,255' },
  { id:'code',       name:'Code',        icon:'⌨',  color:'#3db550', rgb:'61,181,80' },
  { id:'philosophy', name:'Philosophy',  icon:'∞',  color:'#a78bfa', rgb:'167,139,250' },
  { id:'music',      name:'Music',       icon:'♩',  color:'#c95238', rgb:'201,82,56' },
  { id:'history',    name:'History',     icon:'📜', color:'#c0784a', rgb:'192,120,74' },
  { id:'maths',      name:'Maths',       icon:'Σ',  color:'#4e9af1', rgb:'78,154,241' },
];

const SWATCH_COLORS = [
  { hex:'#6c7bff', rgb:'108,123,255' },
  { hex:'#0fa888', rgb:'15,168,136' },
  { hex:'#c95238', rgb:'201,82,56' },
  { hex:'#b07118', rgb:'176,113,24' },
  { hex:'#a78bfa', rgb:'167,139,250' },
  { hex:'#3db550', rgb:'61,181,80' },
  { hex:'#4e9af1', rgb:'78,154,241' },
  { hex:'#d966a0', rgb:'217,102,160' },
  { hex:'#c9922a', rgb:'201,146,42' },
  { hex:'#e55b5b', rgb:'229,91,91' },
];

/* ═══════════════════════════════════════════
   STORAGE
═══════════════════════════════════════════ */
function loadAll() {
  try { notes    = JSON.parse(localStorage.getItem('noding-notes-v2'))    || []; } catch { notes = []; }
  try { subjects = JSON.parse(localStorage.getItem('noding-subjects-v1')) || []; } catch { subjects = []; }
  if (!subjects.length) subjects = PRESET_SUBJECTS.map(s => ({ ...s }));
  if (!notes.length) {
    notes = [{
      id: uid(), title: 'Welcome to Notes', pinned: false, tag: 'teal', subject: 'design', ts: Date.now(),
      content: 'Welcome! This is your note space.\n\nTry dragging a Subject feel from the panel above onto any note in the sidebar.\n\nEach subject gives a note its own visual identity — colour accent, top glow, and badge.\n\nYou can also create custom subjects with your own icon and colour.',
    }];
  }
  saveAll();
}
function saveAll() {
  localStorage.setItem('noding-notes-v2', JSON.stringify(notes));
  localStorage.setItem('noding-subjects-v1', JSON.stringify(subjects));
}

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function getSubj(id) { return subjects.find(s => s.id === id); }

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function fmt(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) + ' · ' +
         d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}
function fmtShort(ts) {
  const d = new Date(ts), diff = Date.now() - ts;
  if (diff < 86400000)  return d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  if (diff < 604800000) return d.toLocaleDateString('en-GB',{weekday:'short'});
  return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
}

/* ═══════════════════════════════════════════
   SUBJECTS PANEL
═══════════════════════════════════════════ */
function renderSubjects() {
  const grid = document.getElementById('subj-grid');
  grid.innerHTML = subjects.map(s => `
    <div class="subj-chip" id="sc-${s.id}"
      style="--sc:${s.color};--sc-rgb:${s.rgb}"
      draggable="true"
      ondragstart="onSubjDragStart(event,'${s.id}')"
      ondragend="onSubjDragEnd(event)"
      onclick="selectSubject('${s.id}',event)"
      title="Drag onto a note to apply"
    >
      <span class="chip-icon">${s.icon}</span>
      <span class="chip-name">${esc(s.name)}</span>
      ${s.custom ? `<button class="chip-del" onclick="deleteSubject('${s.id}',event)" title="Delete">✕</button>` : ''}
    </div>`).join('');
}

function toggleSubjectsPanel() {
  subjPanelOpen = !subjPanelOpen;
  const grid = document.getElementById('subj-grid');
  const toggle = document.getElementById('subj-toggle');
  const hint = document.getElementById('subj-hint');
  grid.style.display = subjPanelOpen ? '' : 'none';
  toggle.textContent = subjPanelOpen ? '⌃' : '⌄';
  hint.style.opacity = subjPanelOpen ? '' : '0';
}

function selectSubject(id, e) {
  e.stopPropagation();
  if (selectedSubject === id) {
    selectedSubject = null;
    document.querySelectorAll('.subj-chip').forEach(el => el.classList.remove('selected'));
    showToast('Subject deselected');
  } else {
    selectedSubject = id;
    document.querySelectorAll('.subj-chip').forEach(el => el.classList.remove('selected'));
    document.getElementById('sc-' + id)?.classList.add('selected');
    showToast('Click a note to apply "' + (getSubj(id)?.name || '') + '"');
  }
}

function deleteSubject(id, e) {
  e.stopPropagation();
  subjects = subjects.filter(s => s.id !== id);
  notes.forEach(n => { if (n.subject === id) n.subject = ''; });
  saveAll();
  renderSubjects();
  renderList();
  if (activeId) {
    const n = notes.find(x => x.id === activeId);
    if (n) applyEditorFeel(n);
  }
  showToast('Subject deleted');
}

/* ═══════════════════════════════════════════
   DRAG & DROP
═══════════════════════════════════════════ */
function onSubjDragStart(e, id) {
  draggedSubject = getSubj(id);
  if (!draggedSubject) return;
  e.dataTransfer.effectAllowed = 'copy';
  e.dataTransfer.setData('text/plain', id);
  setTimeout(() => document.getElementById('sc-' + id)?.classList.add('dragging'), 0);
  // Show ghost
  const ghost = document.getElementById('drag-ghost');
  ghost.style.display = 'flex';
  ghost.style.background = `rgba(${draggedSubject.rgb},.15)`;
  ghost.style.borderColor = draggedSubject.color;
  ghost.style.color = draggedSubject.color;
  ghost.innerHTML = `<span>${draggedSubject.icon}</span><span style="font-family:var(--fm);font-size:10px">${draggedSubject.name}</span>`;
  try { e.dataTransfer.setDragImage(ghost, 60, 18); } catch {}
}

function onSubjDragEnd(e) {
  draggedSubject = null;
  document.querySelectorAll('.subj-chip').forEach(el => el.classList.remove('dragging'));
  document.getElementById('drag-ghost').style.display = 'none';
  clearDropHighlights();
}

function onListDragOver(e) {
  if (!draggedSubject) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'copy';
  const item = e.target.closest('.note-item');
  clearDropHighlights();
  if (item) {
    const id = item.dataset.id;
    item.classList.add('drop-over');
    item.style.setProperty('--drop-accent', draggedSubject.color);
    item.style.setProperty('--drop-bg', `rgba(${draggedSubject.rgb},.12)`);
  }
}

function onListDragLeave(e) {
  if (!e.relatedTarget || !e.currentTarget.contains(e.relatedTarget)) {
    clearDropHighlights();
  }
}

function onListDrop(e) {
  e.preventDefault();
  if (!draggedSubject) return;
  const item = e.target.closest('.note-item');
  if (item) applySubjectToNote(item.dataset.id, draggedSubject.id);
  clearDropHighlights();
  draggedSubject = null;
}

function clearDropHighlights() {
  document.querySelectorAll('.note-item.drop-over').forEach(el => {
    el.classList.remove('drop-over');
    el.style.removeProperty('--drop-accent');
    el.style.removeProperty('--drop-bg');
  });
}

function applySubjectToNote(noteId, subjId) {
  const n = notes.find(x => x.id === noteId);
  const s = getSubj(subjId);
  if (!n || !s) return;
  n.subject = subjId;
  saveAll();
  renderList();
  if (activeId === noteId) applyEditorFeel(n);
  showToast(`Applied "${s.name}" to note`);
}

/* ═══════════════════════════════════════════
   NOTE LIST RENDER
═══════════════════════════════════════════ */
function renderList() {
  const q = document.getElementById('search').value.toLowerCase();
  const list = document.getElementById('note-list');

  let filtered = notes.filter(n => {
    if (activeTagFilter  && n.tag     !== activeTagFilter)  return false;
    if (activeSubjFilter && n.subject !== activeSubjFilter) return false;
    if (!q) return true;
    return (n.title||'').toLowerCase().includes(q) || (n.content||'').toLowerCase().includes(q);
  }).sort((a,b) => (b.pinned - a.pinned) || (b.ts - a.ts));

  document.getElementById('note-count').textContent = filtered.length;

  if (!filtered.length) {
    list.innerHTML = `<div class="no-notes">
      <div class="no-notes-icon">✦</div>
      <p>No notes found</p>
    </div>`; return;
  }

  list.innerHTML = filtered.map(n => {
    const s = n.subject ? getSubj(n.subject) : null;
    const niSubj = s ? `<span class="ni-subj" style="background:rgba(${s.rgb},.1);color:${s.color};border-color:rgba(${s.rgb},.25)">${s.icon} ${esc(s.name)}</span>` : '';
    const niTag  = n.tag ? `<span class="ni-tag ${n.tag}">${n.tag}</span>` : '';
    return `<div class="note-item${n.id===activeId?' active':''}${s?' has-subject':''}"
      data-id="${n.id}"
      style="${s ? `--ni-accent:${s.color}` : ''}"
      onclick="onNoteClick(event,'${n.id}')">
      ${n.pinned ? '<span style="position:absolute;top:6px;right:8px;font-size:9px;opacity:.35">📌</span>' : ''}
      <div class="ni-title">${esc(n.title||'Untitled')}</div>
      <div class="ni-preview">${esc((n.content||'').replace(/\n/g,' ').slice(0,55) || 'No content…')}</div>
      <div class="ni-meta">
        <span class="ni-date">${fmtShort(n.ts)}</span>
        ${niTag}${niSubj}
      </div>
    </div>`;
  }).join('');
}

function onNoteClick(e, id) {
  if (selectedSubject) {
    applySubjectToNote(id, selectedSubject);
    selectedSubject = null;
    document.querySelectorAll('.subj-chip').forEach(el => el.classList.remove('selected'));
  } else {
    openNote(id);
  }
}

/* ═══════════════════════════════════════════
   TAG FILTER PILLS
═══════════════════════════════════════════ */
function renderTagPills() {
  const pills = document.getElementById('tag-pills');
  pills.innerHTML = `<span class="tp${!activeTagFilter&&!activeSubjFilter?' on':''}" onclick="filterClear()">All</span>
    <span class="tp${activeTagFilter==='teal'?' on':''}"   onclick="filterTag('teal')">Teal</span>
    <span class="tp${activeTagFilter==='violet'?' on':''}" onclick="filterTag('violet')">Violet</span>
    <span class="tp${activeTagFilter==='coral'?' on':''}"  onclick="filterTag('coral')">Coral</span>
    <span class="tp${activeTagFilter==='amber'?' on':''}"  onclick="filterTag('amber')">Amber</span>`;
}
function filterTag(t)  { activeTagFilter = t; activeSubjFilter = ''; renderTagPills(); renderList(); }
function filterClear() { activeTagFilter = ''; activeSubjFilter = ''; renderTagPills(); renderList(); }

/* ═══════════════════════════════════════════
   EDITOR
═══════════════════════════════════════════ */
function openNote(id) {
  activeId = id;
  const n = notes.find(x => x.id === id);
  if (!n) return;
  document.getElementById('ed-empty').style.display = 'none';
  const ew = document.getElementById('ed-wrap');
  ew.style.display = 'flex'; ew.style.flexDirection = 'column'; ew.style.flex = '1'; ew.style.overflow = 'hidden';
  document.getElementById('ed-title').value   = n.title   || '';
  document.getElementById('ed-content').value = n.content || '';
  document.getElementById('ed-date').textContent = fmt(n.ts);
  document.getElementById('pin-lbl').textContent = n.pinned ? 'Unpin note' : 'Pin note';
  applyEditorFeel(n);
  updateFooter();
  renderList();
}

function applyEditorFeel(n) {
  const ew = document.getElementById('ed-wrap');
  const s = n.subject ? getSubj(n.subject) : null;
  if (s) {
    ew.style.setProperty('--ed-accent', s.color);
    ew.style.setProperty('--ed-rgb', s.rgb);
  } else {
    ew.style.removeProperty('--ed-accent');
    ew.style.setProperty('--ed-rgb', '0,0,0');
  }
  renderEditorBadges(n);
}

function renderEditorBadges(n) {
  const el = document.getElementById('ed-badges');
  const parts = [];
  const s = n.subject ? getSubj(n.subject) : null;
  if (s) parts.push(`<span class="subj-badge" style="background:rgba(${s.rgb},.12);color:${s.color};border-color:rgba(${s.rgb},.28)" onclick="clearSubject()" title="Remove subject">${s.icon} ${esc(s.name)} ✕</span>`);
  if (n.tag) parts.push(`<span class="color-badge ${n.tag}" onclick="toggleTagMenu(event)">${n.tag} ✕</span>`);
  el.innerHTML = parts.join('');
}

function saveActive() {
  const n = notes.find(x => x.id === activeId); if (!n) return;
  n.title   = document.getElementById('ed-title').value;
  n.content = document.getElementById('ed-content').value;
  n.ts = Date.now();
  document.getElementById('ed-date').textContent = fmt(n.ts);
  updateFooter(); renderList(); saveAll();
}

function updateFooter() {
  const c = (document.getElementById('ed-content').value||'').length;
  document.getElementById('ed-footer').textContent = c ? `${c} chars` : '';
}

/* ═══════════════════════════════════════════
   NOTE CRUD
═══════════════════════════════════════════ */
function newNote() {
  const n = { id: uid(), title:'', content:'', tag:'', subject:'', ts: Date.now(), pinned: false };
  notes.unshift(n); saveAll(); renderList(); openNote(n.id);
  setTimeout(() => document.getElementById('ed-title').focus(), 50);
}

function deleteNote() {
  closeMenus();
  notes = notes.filter(x => x.id !== activeId); activeId = null; saveAll(); renderList();
  document.getElementById('ed-wrap').style.display = 'none';
  document.getElementById('ed-empty').style.display = '';
  showToast('Note deleted');
}

function pinNote() {
  closeMenus();
  const n = notes.find(x => x.id === activeId); if (!n) return;
  n.pinned = !n.pinned; saveAll(); renderList();
  document.getElementById('pin-lbl').textContent = n.pinned ? 'Unpin note' : 'Pin note';
  showToast(n.pinned ? 'Note pinned' : 'Note unpinned');
}

function duplicateNote() {
  closeMenus();
  const n = notes.find(x => x.id === activeId); if (!n) return;
  const copy = { ...n, id: uid(), title: (n.title||'Untitled') + ' (copy)', ts: Date.now(), pinned: false };
  notes.unshift(copy); saveAll(); renderList(); openNote(copy.id);
  showToast('Note duplicated');
}

function setTag(tag) {
  closeMenus();
  const n = notes.find(x => x.id === activeId); if (!n) return;
  n.tag = tag; saveAll(); renderEditorBadges(n); renderList();
  showToast(tag ? `Colour set to ${tag}` : 'Colour removed');
}

function clearSubject() {
  closeMenus();
  const n = notes.find(x => x.id === activeId); if (!n) return;
  n.subject = ''; saveAll(); applyEditorFeel(n); renderList();
  showToast('Subject removed');
}

/* ═══════════════════════════════════════════
   MENUS
═══════════════════════════════════════════ */
let menuOpen = false, tagMenuOpen = false;

function toggleMenu(e) {
  e.stopPropagation();
  if (menuOpen) { closeMenus(); return; }
  closeMenus();
  const r = document.getElementById('menu-btn').getBoundingClientRect();
  const m = document.getElementById('note-menu');
  m.style.top = r.bottom + 6 + 'px'; m.style.right = (window.innerWidth - r.right) + 'px';
  m.classList.add('show'); menuOpen = true;
}
function toggleTagMenu(e) {
  e.stopPropagation();
  if (tagMenuOpen) { closeMenus(); return; }
  closeMenus();
  const r = e.target.getBoundingClientRect();
  const m = document.getElementById('tag-menu');
  m.style.top = r.bottom + 6 + 'px'; m.style.left = r.left + 'px';
  m.classList.add('show'); tagMenuOpen = true;
}
function closeMenus() {
  document.getElementById('note-menu').classList.remove('show');
  document.getElementById('tag-menu').classList.remove('show');
  menuOpen = false; tagMenuOpen = false;
}
document.addEventListener('click', () => {
  closeMenus();
  if (selectedSubject) {
    selectedSubject = null;
    document.querySelectorAll('.subj-chip').forEach(el => el.classList.remove('selected'));
  }
});

/* ═══════════════════════════════════════════
   CREATE SUBJECT MODAL
═══════════════════════════════════════════ */
let csColor = SWATCH_COLORS[0].hex;
let csRgb   = SWATCH_COLORS[0].rgb;

function renderSwatches() {
  const el = document.getElementById('cs-swatches');
  el.innerHTML = SWATCH_COLORS.map(c => `
    <div class="swatch${c.hex===csColor?' on':''}" style="background:${c.hex};--sw-c:${c.hex}" onclick="pickSwatch('${c.hex}','${c.rgb}')"></div>
  `).join('') + `
    <div class="swatch-custom" title="Custom colour">
      <input type="color" value="${csColor}" oninput="pickCustomColor(this.value)">
    </div>`;
}

function pickSwatch(hex, rgb) {
  csColor = hex; csRgb = rgb; renderSwatches(); updatePreview();
}
function pickCustomColor(hex) {
  csColor = hex; csRgb = hexToRgb(hex); renderSwatches(); updatePreview();
}

function updatePreview() {
  const icon = document.getElementById('cs-icon').value || '✦';
  const name = document.getElementById('cs-name').value || 'Subject name';
  document.getElementById('cs-prev-icon').textContent = icon;
  document.getElementById('cs-prev-name').textContent = name;
  document.getElementById('cs-prev-name').style.color = csColor;
  const chip = document.getElementById('cs-preview');
  chip.style.setProperty('--sc', csColor);
  chip.style.background = `rgba(${csRgb},.06)`;
  chip.style.borderColor = `rgba(${csRgb},.2)`;
  chip.querySelector('::before'); // trigger
  chip.style.setProperty('background-image', 'none');
  // update ::before via a CSS var trick
  const before = chip;
  before.style.boxShadow = `inset 3px 0 0 ${csColor}`;
  before.style.borderRadius = 'var(--rl)';
}

function openCreateModal(e) {
  e.stopPropagation();
  document.getElementById('cs-icon').value = '';
  document.getElementById('cs-name').value = '';
  csColor = SWATCH_COLORS[Math.floor(Math.random()*SWATCH_COLORS.length)].hex;
  csRgb   = hexToRgb(csColor);
  renderSwatches(); updatePreview();
  document.getElementById('create-modal').classList.add('show');
  setTimeout(() => document.getElementById('cs-name').focus(), 200);
}

function closeCreateModal(e) {
  if (e && e.target !== document.getElementById('create-modal')) return;
  document.getElementById('create-modal').classList.remove('show');
}

function createSubject() {
  const icon = document.getElementById('cs-icon').value.trim() || '✦';
  const name = document.getElementById('cs-name').value.trim();
  if (!name) { document.getElementById('cs-name').focus(); return; }
  const id = 'custom_' + uid();
  subjects.push({ id, name, icon, color: csColor, rgb: csRgb, custom: true });
  saveAll(); renderSubjects();
  document.getElementById('create-modal').classList.remove('show');
  showToast(`"${name}" subject created`);
}

/* ═══════════════════════════════════════════
   MISC
═══════════════════════════════════════════ */
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('closed', !sidebarOpen);
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.classList.add('show'); clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

document.addEventListener('keydown', e => {
  if ((e.metaKey||e.ctrlKey) && e.key==='n') { e.preventDefault(); newNote(); }
  if (e.key==='Escape') {
    closeMenus();
    document.getElementById('create-modal').classList.remove('show');
    if (selectedSubject) {
      selectedSubject = null;
      document.querySelectorAll('.subj-chip').forEach(el => el.classList.remove('selected'));
    }
  }
});

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
loadAll();
renderSubjects();
renderTagPills();
renderList();
</script>
</body>
</html>
