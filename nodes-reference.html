<html lang="en">
<head>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080809;--surface:#101013;--surface2:#18181d;--surface3:#202027;
  --border:rgba(255,255,255,0.055);--border2:rgba(255,255,255,0.10);--border3:rgba(255,255,255,0.16);
  --text:#f0ede6;--text2:#a09d97;--muted:#58544f;
  --accent:#c8f060;--accent2:#60b8f0;
  --accent-dim:rgba(200,240,96,0.08);--accent2-dim:rgba(96,184,240,0.08);
  --danger:#f06060;
  --radius-xs:5px;--radius-sm:7px;--radius:10px;--radius-lg:13px;--radius-xl:18px;--radius-pill:999px;
  --font-head:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;--font-mono:'DM Mono',monospace;
  --shadow:0 4px 16px rgba(0,0,0,0.5);--shadow-lg:0 8px 32px rgba(0,0,0,0.65);
  --transition:all 0.18s ease;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-weight:300;min-height:100vh;line-height:1.6;-webkit-font-smoothing:antialiased}
header{border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;background:rgba(8,8,9,0.82);z-index:50;backdrop-filter:blur(20px) saturate(180%)}
.logo{font-family:var(--font-head);font-weight:700;font-size:0.95rem;letter-spacing:-0.02em;color:var(--text);text-decoration:none}
.logo span{color:var(--accent)}
.header-actions{display:flex;gap:2px;align-items:center}
.btn{font-family:var(--font-body);font-size:13px;font-weight:400;padding:6px 13px;border-radius:var(--radius-sm);border:none;background:transparent;color:var(--text2);cursor:pointer;text-decoration:none;transition:var(--transition);display:inline-flex;align-items:center;gap:5px;white-space:nowrap;line-height:1}
.btn:hover{color:var(--text);background:rgba(255,255,255,0.06)}
.btn.active{color:var(--text);background:rgba(255,255,255,0.08);font-weight:500}

.container{max-width:1100px;margin:0 auto;padding:3rem 2rem 5rem}
.page-header{margin-bottom:2.5rem}
.page-header h1{font-family:var(--font-head);font-size:2rem;font-weight:700;letter-spacing:-0.03em;margin-bottom:.4rem}
.page-header p{color:var(--text2);font-size:13px;line-height:1.65}

/* Controls */
.controls-bar{display:flex;gap:10px;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap}
.search-wrap{flex:1;min-width:220px;position:relative}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.25;pointer-events:none}
.search-input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-pill);padding:9px 14px 9px 37px;color:var(--text);font-family:var(--font-body);font-size:13px;outline:none;transition:border-color .18s}
.search-input:focus{border-color:var(--border3)}
.search-input::placeholder{color:var(--muted)}
.cat-filter-btns{display:flex;gap:5px;flex-wrap:wrap}
.cat-btn{font-size:11px;padding:4px 12px;border-radius:var(--radius-pill);border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:var(--transition);font-family:var(--font-body);white-space:nowrap}
.cat-btn:hover{border-color:var(--border3);color:var(--text)}
.cat-btn.active{background:var(--accent);color:#080809;border-color:transparent;font-weight:600}

/* Level bar */
.level-bar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);margin-bottom:1.5rem;flex-wrap:wrap}
.level-bar-label{font-size:10px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.08em;color:var(--muted);white-space:nowrap}
.level-pills{display:flex;gap:4px}
.level-pill{font-size:12px;padding:5px 16px;border-radius:var(--radius-pill);border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:var(--transition);font-family:var(--font-body);white-space:nowrap}
.level-pill:hover{border-color:var(--border3);color:var(--text)}
.level-pill.active[data-level="beginner"]{background:rgba(96,240,176,.12);border-color:rgba(96,240,176,.35);color:#60f0b0}
.level-pill.active[data-level="standard"]{background:var(--accent2-dim);border-color:rgba(96,184,240,.35);color:var(--accent2)}
.level-pill.active[data-level="advanced"]{background:rgba(200,240,96,.1);border-color:rgba(200,240,96,.3);color:var(--accent)}
.level-bar-desc{font-size:11px;color:var(--muted);margin-left:auto;font-style:italic}

/* Category sections */
.cat-section{margin-bottom:2.5rem}
.cat-heading{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cat-icon-sm{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:.85}
.cat-name{font-family:var(--font-head);font-size:1rem;font-weight:700;letter-spacing:-0.01em}
.cat-count{font-size:11px;font-family:var(--font-mono);color:var(--muted)}

/* Node grid */
.node-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:6px}
.node-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.node-card:hover{border-color:var(--border2);box-shadow:var(--shadow)}
.node-card-strip{height:3px;width:100%}
.node-card-inner{padding:.8rem .95rem .85rem}
.node-header-row{display:flex;align-items:flex-start;gap:9px;margin-bottom:5px}
.node-icon-box{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.node-header-text{flex:1;min-width:0}
.node-name{font-family:var(--font-mono);font-size:12px;font-weight:500;color:var(--text);margin-bottom:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.node-short{font-size:11.5px;color:var(--text2);line-height:1.5}
.node-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.node-tag{font-size:9px;font-family:var(--font-mono);padding:2px 6px;border-radius:var(--radius-xs);background:var(--surface2);border:1px solid var(--border2);color:var(--muted)}
.instance-badge{font-size:9px;font-family:var(--font-mono);color:var(--accent);background:var(--accent-dim);border:1px solid rgba(200,240,96,.2);border-radius:3px;padding:1px 6px}

/* Port preview chips on card */
.card-ports-row{display:flex;align-items:center;justify-content:space-between;gap:5px;margin-top:8px;padding:5px 7px;background:var(--surface2);border-radius:var(--radius-sm);border:1px solid var(--border)}
.card-ports-side{display:flex;flex-direction:column;gap:2px;min-width:0}
.card-ports-lbl{font-size:8px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:1px}
.card-ports-chips{display:flex;gap:3px;flex-wrap:wrap}
.port-chip{font-size:9px;font-family:var(--font-mono);padding:1px 6px;border-radius:3px;border:1px solid;white-space:nowrap}
/* port type colours */
.pt-fg   {color:#f06090;border-color:rgba(240,96,144,.3);background:rgba(240,96,144,.08)}
.pt-bg   {color:#60b8f0;border-color:rgba(96,184,240,.3);background:rgba(96,184,240,.08)}
.pt-mask {color:#f0c060;border-color:rgba(240,192,96,.3);background:rgba(240,192,96,.08)}
.pt-depth{color:#60f0d0;border-color:rgba(96,240,208,.3);background:rgba(96,240,208,.08)}
.pt-3d   {color:#a868f0;border-color:rgba(168,104,240,.3);background:rgba(168,104,240,.08)}
.pt-mat  {color:#c8a868;border-color:rgba(200,168,104,.3);background:rgba(200,168,104,.08)}
.pt-part {color:#f0c040;border-color:rgba(240,192,64,.3);background:rgba(240,192,64,.08)}
.pt-out  {color:#c8f060;border-color:rgba(200,240,96,.2);background:rgba(200,240,96,.06)}
.pt-def  {color:var(--text2);border-color:var(--border2);background:transparent}

/* ── Node Detail Modal ── */
#node-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;backdrop-filter:blur(6px);overflow-y:auto;padding:2rem 1.5rem}
#node-modal-overlay.open{display:flex;align-items:flex-start;justify-content:center}
#node-modal{width:100%;max-width:820px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-xl);box-shadow:var(--shadow-lg);animation:modalIn .2s ease;flex-shrink:0;overflow:hidden}
@keyframes modalIn{from{transform:scale(0.97) translateY(8px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.nm-strip{height:4px;width:100%}
.nm-header{padding:1.25rem 1.5rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:14px}
.nm-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nm-title-block{flex:1;min-width:0}
.nm-title{font-family:var(--font-head);font-size:1.2rem;font-weight:700;letter-spacing:-0.02em;margin-bottom:2px}
.nm-cat{font-size:10px;font-family:var(--font-mono);color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.nm-close{background:var(--surface2);border:1px solid var(--border2);border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;color:var(--text2);transition:var(--transition);flex-shrink:0}
.nm-close:hover{color:var(--text);border-color:var(--border3)}
.nm-body{padding:1.25rem 1.5rem;display:flex;flex-direction:column;gap:1.25rem}
.nm-level-row{display:flex;gap:4px}
.nm-level-btn{font-size:11px;padding:4px 14px;border-radius:var(--radius-pill);border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:var(--transition);font-family:var(--font-body)}
.nm-level-btn:hover{border-color:var(--border3);color:var(--text)}
.nm-level-btn.active[data-level="beginner"]{background:rgba(96,240,176,.12);border-color:rgba(96,240,176,.35);color:#60f0b0}
.nm-level-btn.active[data-level="standard"]{background:var(--accent2-dim);border-color:rgba(96,184,240,.35);color:var(--accent2)}
.nm-level-btn.active[data-level="advanced"]{background:rgba(200,240,96,.1);border-color:rgba(200,240,96,.3);color:var(--accent)}

.nm-section-label{font-size:10px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:7px}
.nm-text{font-size:13px;color:var(--text2);line-height:1.7}
.nm-divider{height:1px;background:var(--border)}

/* IO section in modal */
.nm-io-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.nm-io-col{}
.nm-io-col-lbl{font-size:9px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:6px}
.nm-port-row{display:flex;align-items:baseline;gap:8px;padding:4px 0;border-bottom:1px solid var(--border)}
.nm-port-row:last-child{border-bottom:none}
.nm-port-chip{font-size:10px;font-family:var(--font-mono);padding:2px 8px;border-radius:3px;border:1px solid;white-space:nowrap;flex-shrink:0;min-width:80px;text-align:center}
.nm-port-desc{font-size:11.5px;color:var(--text2);line-height:1.5}

/* Parameters table */
.nm-params-table{width:100%;border-collapse:collapse}
.nm-params-table th{font-size:9px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.07em;color:var(--muted);text-align:left;padding:0 0 6px;border-bottom:1px solid var(--border)}
.nm-params-table td{font-size:12px;padding:5px 0;vertical-align:top;border-bottom:1px solid var(--border)}
.nm-params-table tr:last-child td{border-bottom:none}
.nm-params-table td:first-child{font-family:var(--font-mono);color:var(--accent2);padding-right:14px;white-space:nowrap;font-size:11px;width:140px}
.nm-params-table td:last-child{color:var(--text2);line-height:1.6}

/* Use-with chain */
.nm-chain{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.nm-chain-node{font-size:10px;font-family:var(--font-mono);padding:3px 10px;border-radius:4px;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);white-space:nowrap}
.nm-chain-node.nm-chain-this{border-color:var(--border3);color:var(--text);background:var(--surface3);font-weight:600}
.nm-chain-arrow{color:var(--border3);font-size:12px}

/* Tip */
.nm-tip{font-size:12px;color:var(--accent);background:var(--accent-dim);border:1px solid rgba(200,240,96,.2);border-radius:var(--radius-sm);padding:8px 12px;line-height:1.6;display:flex;gap:8px}
.nm-tip-icon{flex-shrink:0}

/* Advanced placeholder */
.nm-advanced-placeholder{padding:1.5rem;text-align:center;color:var(--muted);font-size:12px;font-family:var(--font-mono);border:1px dashed var(--border2);border-radius:var(--radius);line-height:1.6}

/* Empty state */
.empty{padding:3rem;text-align:center;color:var(--muted);font-size:13px;font-family:var(--font-mono)}
/* Stats bar */
.stats-bar{display:flex;gap:2.5rem;padding:1.25rem 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:2rem}
.stat-item{display:flex;flex-direction:column;gap:1px}
.stat-num{font-family:var(--font-mono);font-size:1.35rem;font-weight:500;color:var(--accent);letter-spacing:-0.02em}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
</style>
</head>

    <h1>Node Reference</h1>

    <div class="stat-item"><div class="stat-num" id="stat-total">223</div><div class="stat-label">Nodes</div></div>

      <div class="nm-icon" id="nm-icon"></div>

<script src="nodes-data.js"></script>
<script>
// ── Node knowledge base ────────────────────────────────────────────────────
// Each entry: { short, detail, inputs, outputs, tip, supportsInstancing, tags }
const NODE_INFO = {

  // ── 3D ──────────────────────────────────────────────────────────────────
  'AlembicMesh3D':    { short:'Imports Alembic (.abc) animated geometry sequences into the 3D scene.', detail:'Alembic is an open geometry exchange format. Use it to bring in animated meshes from Maya, Houdini, or Blender without losing motion data. Each frame reads from the .abc file.', inputs:[['Filename','Path to the .abc file'],['MaterialInput','Optional material to apply']], outputs:['Output'], tip:'Pre-cache your Alembic sequence for smoother playback in Fusion.', tags:['3d','mesh','animation','import'] },
  'Camera3D':         { short:'Places a virtual camera in the 3D scene that Renderer3D renders from.', detail:'Without a Camera3D, Renderer3D uses a default perspective. Use Camera3D to control FOV, focal length, near/far clip planes, and camera animation. Critical for any 3D composite work.', inputs:[['Transform','Camera position and orientation']], outputs:['Output'], tip:'Parent your Camera3D to a Shape3D or Locator3D to create rig-style camera moves.', tags:['3d','camera','render'] },
  'CubeMap':          { short:'Creates a 6-faced environment cube map for 3D reflections and backgrounds.', detail:'Feeds six image planes (Top, Bottom, Left, Right, Front, Back) into a seamless environment map. Used with Reflect material or as a 3D background.', inputs:[['Top','Top face'],['Bottom','Bottom face'],['Left','Left face'],['Right','Right face'],['Front','Front face'],['Back','Back face']], outputs:['Output'], tags:['3d','environment','reflection'] },
  'Displace3D':       { short:'Displaces 3D mesh vertices along their normals based on a texture.', detail:'Reads luminance values from an input image and pushes mesh vertices outward or inward. Higher tessellation on the mesh gives finer displacement detail. Good for organic surface deformation.', inputs:[['SceneInput','3D scene to displace'],['Input','Displacement texture']], outputs:['Output'], tags:['3d','deform','texture'] },
  'Duplicate3D':      { short:'Duplicates objects in 3D space in grids, rings, or along paths.', detail:'A powerful procedural cloning node. Set count, spacing, jitter, rotation and scale randomness to create arrays of 3D objects without manually placing each one.', inputs:[['SceneInput','Object to duplicate'],['Path','Optional path to clone along']], outputs:['Output'], tip:'Combine with pRender for huge particle-style 3D arrays.', tags:['3d','clone','array','procedural'] },
  'FBXMesh3D':        { short:'Imports FBX format 3D meshes, rigs, and animations.', detail:'FBX is the standard interchange format for rigged character and prop animation from most 3D applications. Supports skeletal animation, morph targets, and embedded textures.', inputs:[['Filename','Path to .fbx file'],['MaterialInput','Override material']], outputs:['Output'], tags:['3d','mesh','animation','import'] },
  'ImagePlane3D':     { short:'Maps a 2D image onto a flat plane positioned in 3D space.', detail:'The most common way to composite 2D footage into a 3D scene. Position and orient the plane to match your camera. Use Renderer3D to merge it with true 3D elements.', inputs:[['Input','Image to place in 3D'],['MaterialInput','Optional material']], outputs:['Output'], tip:'Set the plane size to match your footage aspect ratio for no distortion.', tags:['3d','plane','composite'] },
  'Locator3D':        { short:'An invisible 3D null object — use as a parent for transforms.', detail:'Locator3D has no visible output but can be used as a parenting target, a reference point, or a constraint target. Essential for building animation rigs in Fusion.', inputs:[['SceneInput','Scene to parent to']], outputs:['Output'], tags:['3d','null','rig','parent'] },
  'Merge3D':          { short:'Combines multiple 3D scenes into a single scene for rendering.', detail:'The 3D equivalent of Merge. Connect multiple 3D nodes (Camera3D, lights, geometry, Image planes) into one Merge3D, then feed into Renderer3D. Supports unlimited inputs.', inputs:[['SceneInput1','First 3D scene'],['SceneInput2','Second 3D scene']], outputs:['Output'], tip:'Group related elements into separate Merge3D nodes before a master merge for cleaner flow.', tags:['3d','combine','composite'] },
  'OpenVDBMesh':      { short:'Imports OpenVDB volumetric data (smoke, fire, clouds) into the 3D scene.', detail:'OpenVDB is the standard for volumetric simulation data exported from Houdini, Blender, or Maya. Renders as volumes through Renderer3D with appropriate lighting.', inputs:[['Filename','Path to .vdb file']], outputs:['Output'], tags:['3d','volume','vfx','smoke','fire'] },
  'Particles3D':      { short:'Renders 3D particle systems (pRender output) into the 3D scene.', detail:'Bridges the 2D Particle system into the 3D pipeline. Connect a pRender node here to place particle systems accurately in 3D space with proper depth and lighting.', inputs:[['ParticleInput','pRender output']], outputs:['Output'], tags:['3d','particles'] },
  'PointCloud3D':     { short:'Creates a 3D point cloud from tracked or manually placed points.', detail:'Used in match-move workflows. Import point cloud data from tracking software or generate manually. Points can be used as parenting targets or reference markers.', inputs:[['Input','Point data']], outputs:['Output'], tags:['3d','tracking','matchmove'] },
  'Projector3D':      { short:'Projects an image onto 3D geometry like a slide projector.', detail:'Place a Projector3D in your scene and assign it as a projector in your material. The image follows the projector\'s position and angle. Essential for camera-projection mapping techniques.', inputs:[['Input','Image to project'],['SceneInput','3D scene']], outputs:['Output'], tip:'Match Projector3D FOV to your camera FOV for perfect camera projection.', tags:['3d','projection','texturing'] },
  'Renderer3D':       { short:'Renders the 3D scene to a 2D image for compositing.', detail:'The output node of any 3D pipeline in Fusion. Choose between OpenGL (fast, approximate) and Software (slow, accurate) renderers. Set resolution, anti-aliasing, and lighting. Always required to bring 3D back into the 2D pipeline.', inputs:[['SceneInput','3D scene to render']], outputs:['Output','DepthChannel'], tip:'Use the Software renderer for final quality. OpenGL for proxy previews.', tags:['3d','render','output'] },
  'Replace3D':        { short:'Replaces geometry in a 3D scene with different geometry.', detail:'Swaps one mesh for another while preserving transforms and animation. Useful for LOD (level of detail) swaps or changing props between shots.', inputs:[['SceneInput','Scene with source geometry'],['NewObject','Replacement geometry']], outputs:['Output'], tags:['3d','swap','geometry'] },
  'Shape3D':          { short:'Creates basic primitive 3D geometry: cube, sphere, cylinder, cone, torus, plane.', detail:'The starting point for most 3D work in Fusion when you don\'t have external meshes. Each shape has parameters for size, segments (tessellation), and UV mapping. Combine with materials and lights.', inputs:[['MaterialInput','Surface material']], outputs:['Output'], tip:'Increase subdivisions only when needed for displacement — more segments = slower render.', tags:['3d','primitive','geometry'] },
  'SoftClip3D':       { short:'Clips 3D scene elements that pass behind the camera or clip planes.', detail:'Prevents geometry popping through the camera near plane. Apply between your scene and Renderer3D to prevent artifacts from objects intersecting the camera.', inputs:[['SceneInput','3D scene']], outputs:['Output'], tags:['3d','clip','camera'] },
  'Text3D':           { short:'Creates 3D extruded text geometry in the 3D scene.', detail:'Generates true 3D text with controllable extrusion depth, bevel, and per-face materials. Unlike Text+, Text3D lives in 3D space and responds to 3D lighting.', inputs:[['MaterialInput','Material for the text faces']], outputs:['Output'], tip:'Combine with Phong or Blinn material for convincing metallic text.', tags:['3d','text','typography'] },
  'Transform3D':      { short:'Applies translation, rotation and scale transforms to 3D scene elements.', detail:'The primary way to position, rotate, and scale 3D objects. Supports pivot points, expressions, and parenting. Apply between any 3D node and Merge3D.', inputs:[['SceneInput','3D scene to transform']], outputs:['Output'], tags:['3d','transform','position','rotation'] },
  'Volume3D':         { short:'Renders volumetric primitives (sphere, cube) as density clouds.', detail:'Creates soft volumetric fog, glow, or cloud-like shapes without OpenVDB. Simpler than importing VDB files, good for atmospheric effects and stylised volumes.', inputs:[['SceneInput','3D scene']], outputs:['Output'], tags:['3d','volume','atmosphere','fog'] },
  'WarpTransform3D':  { short:'Warps 3D geometry with procedural noise-based displacement.', detail:'Adds procedural mesh deformation in 3D space. Useful for organic animated deformation, melting effects, or adding subtle noise to rigid geometry.', inputs:[['SceneInput','3D scene to warp']], outputs:['Output'], tags:['3d','warp','deform','procedural'] },

  // ── 3D Light ────────────────────────────────────────────────────────────
  'AmbientLight':     { short:'A non-directional light that illuminates all surfaces equally from all angles.', detail:'Adds a base level of illumination to prevent completely unlit shadow areas. Keep it very low (0.1–0.2) to avoid flattening your scene. Acts as a fill light substitute.', inputs:[['SceneInput','3D scene']], outputs:['Output'], tip:'Avoid over-relying on ambient — it kills depth. Use instead as a subtle fill.', tags:['light','3d','ambient'] },
  'DirectionalLight': { short:'An infinitely distant light source that casts parallel rays — like sunlight.', detail:'All surfaces hit by a DirectionalLight receive the same angle of light regardless of their position. Ideal for simulating sun, moon, or any far-off light source. Position doesn\'t matter, only rotation.', inputs:[['SceneInput','3D scene']], outputs:['Output'], tip:'Use soft shadows and a slightly warm colour to simulate golden-hour sun.', tags:['light','3d','sun','directional'] },
  'PointLight':       { short:'A light that radiates equally in all directions from a single point in 3D space.', detail:'Like a light bulb. Illumination falls off with distance (inverse square by default). Useful for practical light sources — lamps, fire, LEDs, explosions. Position in 3D matters.', inputs:[['SceneInput','3D scene']], outputs:['Output'], tags:['light','3d','omnidirectional'] },
  'SpotLight':        { short:'A cone-shaped light source with controllable angle and falloff.', detail:'Combines position, direction, and cone angle for focused illumination. Supports soft penumbra (cone angle vs penumbra angle). Good for stage-style lighting and practical spotlight effects.', inputs:[['SceneInput','3D scene']], outputs:['Output'], tip:'Use two SpotLights at different angles and colours for a classic two-tone lighting look.', tags:['light','3d','spotlight','cone'] },

  // ── 3D Material ─────────────────────────────────────────────────────────
  'Blinn':            { short:'A standard shading model with soft highlights — good for organic surfaces.', detail:'The Blinn-Phong model produces softer, more diffuse highlights than Phong. Use for skin, fabric, matte plastic, and organic materials. Supports diffuse, specular, ambient, and emission channels.', inputs:[['Diffuse','Base colour or texture'],['Specular','Highlight colour and texture'],['Bump','Normal/bump map']], outputs:['MaterialOutput'], tags:['material','shading','3d'] },
  'CookTorrance':     { short:'A physically-based shading model for realistic metal and dielectric surfaces.', detail:'More accurate than Blinn/Phong for materials like metal, glass, and polished surfaces. Uses roughness and Fresnel parameters. Slower to render but more convincing for product-style work.', inputs:[['Diffuse','Base albedo'],['Specular','Reflectivity'],['Roughness','Surface micro-roughness map']], outputs:['MaterialOutput'], tags:['material','pbr','physically-based','metal','3d'] },
  'Phong':            { short:'The classic shading model with sharp, clear specular highlights.', detail:'Phong gives sharper highlights than Blinn. Good for plastics, ceramics, wet surfaces, and anything with a defined glossy sheen. Simpler computation than PBR models.', inputs:[['Diffuse','Base colour'],['Specular','Specular colour'],['Bump','Bump map']], outputs:['MaterialOutput'], tags:['material','shading','specular','3d'] },
  'Reflect':          { short:'A material that simulates reflective surfaces using environment mapping.', detail:'Reflects the surrounding environment using a CubeMap or sphere map. Works in combination with other material nodes via multiply/blend. Adjust reflectivity to control the reflection intensity.', inputs:[['Background','Material underneath'],['Reflectivity','Reflection strength map']], outputs:['MaterialOutput'], tags:['material','reflection','3d','environment'] },
  'Ward':             { short:'An anisotropic shading model for brushed metal and fibrous surfaces.', detail:'Ward shading supports directional highlight stretching — ideal for brushed aluminium, satin, hair, and any surface with a directional sheen. Has separate U and V roughness controls.', inputs:[['Diffuse','Base colour'],['Specular','Highlight colour'],['U/V Roughness','Anisotropy controls']], outputs:['MaterialOutput'], tags:['material','anisotropic','metal','3d'] },

  // ── 3D Texture ──────────────────────────────────────────────────────────
  'BumpMap':          { short:'Applies a bump or normal map to a material to simulate surface detail.', detail:'Does not change geometry — perturbs surface normals at render time to fake micro-detail. Connect a greyscale height map for bump, or an RGB normal map for normal mapping. Much faster than geometry displacement.', inputs:[['Input','Bump/normal map texture'],['MaterialInput','Base material']], outputs:['MaterialOutput'], tags:['texture','bump','normal','3d'] },
  'Catcher':          { short:'Captures lighting and shadows onto a transparent surface for shadow-catcher compositing.', detail:'Apply to a Shape3D plane to create an invisible surface that receives shadows and reflections from 3D objects. Blends them into a live-action background without showing the geometry itself.', inputs:[['MaterialInput','Optional base material']], outputs:['MaterialOutput'], tip:'Use with Renderer3D in software mode for accurate shadow catching.', tags:['texture','shadow','composite','3d'] },
  'Falloff':          { short:'Creates a gradient texture based on the angle between surface normals and the camera.', detail:'Fresnel-style effect — surfaces facing the camera are one colour, surfaces at 90° to camera are another. Essential for rim lighting effects, atmospheric haze, and x-ray style looks.', inputs:[['Facing Color','Colour when facing camera'],['Perpendicular Color','Colour at edges']], outputs:['MaterialOutput'], tip:'Classic use: white centre to transparent edge for a hologram or atmospheric effect.', tags:['texture','fresnel','rim','3d'] },
  'FastNoiseTexture': { short:'Generates procedural noise as a 3D texture (world-space).', detail:'Similar to FastNoise but evaluated in 3D space, so it moves correctly with the geometry rather than sliding. Use as bump map input, displacement input, or opacity modulator.', inputs:[['Input','Optional base texture to modulate']], outputs:['MaterialOutput'], tags:['texture','noise','procedural','3d'] },
  'Gradient3D':       { short:'Creates a gradient texture evaluated in 3D world space.', detail:'Projects a colour gradient through 3D space — gradient follows object position rather than UV coordinates. Good for height-based colouring, depth fades, and colour tints on 3D objects.', inputs:[], outputs:['MaterialOutput'], tags:['texture','gradient','3d'] },
  'SphereMap':        { short:'Uses a spherical environment map image for reflections and lighting.', detail:'Older alternative to CubeMap. Projects a spherical (360°) panoramic image as the environment. Simpler to set up but more distortion at the poles. Good for quick HDRI-style environment lighting.', inputs:[['Input','Spherical panorama image']], outputs:['MaterialOutput'], tags:['texture','environment','reflection','hdri','3d'] },
  'Texture2D':        { short:'Applies a 2D image as a texture to a 3D surface using UV mapping.', detail:'The standard way to put a 2D image onto 3D geometry. Requires the geometry to have proper UV coordinates. Supports tiling, offset, and wrapping modes. Connect to material diffuse, specular, or bump inputs.', inputs:[['Input','2D texture image']], outputs:['MaterialOutput'], tags:['texture','uv','3d'] },
  'TextureTransform': { short:'Transforms UV coordinates — translate, rotate, scale textures on a surface.', detail:'Rather than modifying the material or geometry, TextureTransform adjusts how the texture is placed on the surface. Chain between Texture2D and material to animate texture position.', inputs:[['Input','Texture to transform']], outputs:['MaterialOutput'], tags:['texture','uv','transform','3d'] },

  // ── Blur ────────────────────────────────────────────────────────────────
  'BilateralBlur':    { short:'Edge-preserving blur that smooths surfaces while keeping hard edges sharp.', detail:'Unlike Gaussian blur which blurs everything uniformly, bilateral blur respects luminance differences. Great for skin smoothing, noise reduction while preserving detail, and stylised painterly looks.', inputs:[['Input','Image to blur'],['Mask','Optional mask']], outputs:['Output'], tip:'Use for subtle skin retouching without destroying the look of the footage.', tags:['blur','smooth','edge-preserving'] },
  'Blur':             { short:'Classic Gaussian blur — a soft, even blur across the entire image.', detail:'The fundamental blur node. Adjust X/Y size separately for directional blur. Blurs the entire image uniformly. Supports blurring individual channels. The starting point for glow, depth of field fakes, and soft light effects.', inputs:[['Input','Image to blur'],['Mask','Optional mask']], outputs:['Output'], tags:['blur','gaussian','soft'] },
  'DefocusBlur':      { short:'Simulates optical lens defocus with realistic bokeh shapes.', detail:'Unlike Gaussian blur, DefocusBlur uses actual lens aperture shapes (circular, hexagonal, custom) to create realistic out-of-focus looks. Use with a Z-depth pass for per-pixel depth of field.', inputs:[['Input','Image'],['Zbuffer','Depth channel for per-pixel DOF']], outputs:['Output'], tip:'A subtle DefocusBlur on background elements dramatically improves perceived depth.', tags:['blur','bokeh','depth-of-field','lens'] },
  'Defocus':          { short:'Simulates lens defocus with a simpler model than DefocusBlur.', detail:'A lighter version of DefocusBlur. Faster render but less physically accurate. Good for fast previews or subtle defocus where perfect bokeh shape doesn\'t matter.', inputs:[['Input','Image to defocus'],['Mask','Optional mask']], outputs:['Output'], tags:['blur','defocus','lens'] },
  'DepthBlur':        { short:'Blurs based on a depth map — sharp at one depth, blurred at others.', detail:'Reads a Z-depth image and blurs pixels based on their depth value. Simulates depth of field without true optical simulation. Faster than DefocusBlur. Control the focus point and falloff curve.', inputs:[['Input','Image to blur'],['Zbuffer','Depth channel']], outputs:['Output'], tags:['blur','depth','depth-of-field'] },
  'GaussianBlur':     { short:'A mathematically precise Gaussian blur with separate H and V passes.', detail:'More controllable than the standard Blur node. Gaussian shape ensures no ringing or hard edges in the blur falloff. Often used for glow base layers and soft light effects.', inputs:[['Input','Image'],['Mask','Optional mask']], outputs:['Output'], tags:['blur','gaussian'] },
  'GlowBlur':         { short:'Softens an image with a wide, weighted blur — the basis for glow effects.', detail:'Uses a combination of blur passes to create the characteristic soft glow halo around bright areas. Adjust threshold to control which parts of the image contribute to the glow.', inputs:[['Input','Image'],['Mask','Optional mask']], outputs:['Output'], tags:['blur','glow','light'] },
  'Glow':             { short:'Adds a classic glow/bloom effect by brightening and blurring highlights.', detail:'All-in-one glow node. Set a luminance threshold, glow size, and colour. The glow is generated from bright areas of the image and composited back on top. Much faster than building a manual glow setup.', inputs:[['Input','Image to glow'],['Mask','Optional mask']], outputs:['Output'], tip:'A small amount of glow (0.1–0.2) on light sources dramatically improves realism.', tags:['blur','glow','bloom','light'] },
  'MotionBlur':       { short:'Adds directional motion blur to simulate camera or subject movement.', detail:'Smears pixels in a direction and distance you set manually. Does not use actual motion vectors. Good for adding motion blur to still or slow-motion elements, or for stylistic streak effects.', inputs:[['Input','Image'],['Mask','Optional mask']], outputs:['Output'], tags:['blur','motion','movement'] },
  'RackDefocus':      { short:'Simulates the effect of changing focus mid-shot (rack focus), creating bokeh transitions.', detail:'Creates an animated depth-of-field transition. Keyframe the focus distance to simulate pulling focus between two subjects. Uses lens aperture simulation for realistic bokeh.', inputs:[['Input','Image'],['Zbuffer','Optional depth channel']], outputs:['Output'], tags:['blur','focus','rack-focus','lens','animation'] },
  'Sharpen':          { short:'Increases image sharpness and edge contrast.', detail:'Applies unsharp masking to boost high-frequency detail. Be careful with compression artefacts — sharpening makes them worse. Use subtly for final finishing or to compensate for upstream softening.', inputs:[['Input','Image to sharpen'],['Mask','Optional mask']], outputs:['Output'], tags:['blur','sharpen','detail'] },
  'SoftGlow':         { short:'A smooth, wide glow with a softer falloff than the standard Glow node.', detail:'Produces a more diffuse, filmic glow look compared to the standard Glow node. Useful for dreamy or period-style looks, or simulating large light sources like windows and practicals.', inputs:[['Input','Image'],['Mask','Optional mask']], outputs:['Output'], tags:['blur','glow','soft','filmic'] },
  'UnsharpMask':      { short:'Classic photographic sharpening technique using a blurred version of the image.', detail:'Creates a blurred copy of the image, subtracts it from the original to get edges, then adds those edges back. More controllable than Sharpen. Threshold prevents sharpening noise.', inputs:[['Input','Image'],['Mask','Optional mask']], outputs:['Output'], tags:['blur','sharpen','unsharp'] },
  'VariableBlur':     { short:'Blurs with variable amounts driven by a map image.', detail:'Each pixel\'s blur amount is controlled by the luminance of a separate map input. White = maximum blur, black = no blur. Useful for custom depth-of-field, gradient blurs, and selective softening.', inputs:[['Input','Image to blur'],['BlurMap','Map controlling blur amount']], outputs:['Output'], tip:'Draw a custom blur map to get precise control over which areas are sharp.', tags:['blur','map-controlled','variable'] },
  'VectorMotionBlur': { short:'Applies motion blur using actual motion vectors for accurate per-pixel blur.', detail:'When you have rendered motion vector passes (U/V velocity) from a 3D renderer or motion estimation, this node uses them to create accurate per-pixel directional blur. Far more realistic than MotionBlur node.', inputs:[['Input','Image'],['Vectors','Motion vector pass (UV)']], outputs:['Output'], tags:['blur','motion','vectors','vfx'] },

  // ── Color ────────────────────────────────────────────────────────────────
  'AutoGain':         { short:'Automatically normalises the image to use the full tonal range.', detail:'Analyses the image and sets black and white points so the darkest pixel becomes black and brightest becomes white. Quick fix for low-contrast footage. Can be applied per-channel.', inputs:[['Input','Image to normalise']], outputs:['Output'], tags:['color','levels','auto'] },
  'BrightnessContrast':{ short:'Adjusts overall luminance (brightness) and tonal separation (contrast).', detail:'Simple and fast. Brightness shifts the entire tonal range up or down. Contrast expands or compresses tones around the midpoint. Often the first correction node in a grade chain.', inputs:[['Input','Image'],['Mask','Optional mask']], outputs:['Output'], tags:['color','grade','brightness','contrast'] },
  'ChannelBooleans':  { short:'Performs logical and mathematical operations between individual RGBA channels.', detail:'Combines two images at the channel level using operations like AND, OR, XOR, add, subtract. Useful for channel surgery — using alpha from one image with colour from another, or creating custom mattes.', inputs:[['Foreground','First image'],['Background','Second image']], outputs:['Output'], tags:['color','channels','composite','matte'] },
  'ClipToColorRange': { short:'Clamps or clips image values to the legal 0–1 range.', detail:'Prevents values above white or below black from causing issues in downstream nodes. Use before any node that expects legal values. Option to softclip (gradual rolloff) or hardclip.', inputs:[['Input','Image']], outputs:['Output'], tags:['color','legal','clamp'] },
  'ColorCorrectorMask':{ short:'ColorCorrector with a built-in qualifiable colour selection mask.', detail:'Like ColorCorrector but with an integrated HSL qualifier built in. Select a colour range by sampling the image, then apply corrections only to that colour. Avoids needing a separate node chain for qualified corrections.', inputs:[['Input','Image']], outputs:['Output'], tags:['color','grade','mask','qualifier'] },
  'ColorCorrector':   { short:'A professional multi-tonal colour corrector with lift, gamma, gain, and curves.', detail:'The main colour grading node in Fusion. Separate controls for shadows (lift), midtones (gamma), and highlights (gain) on each RGB channel. Includes saturation, hue rotation, luminance contrast and curves. Supports qualification by colour range, luminance, or matte.', inputs:[['Input','Image to grade'],['Mask','Optional correction mask']], outputs:['Output'], tip:'Double-click the wheels for numeric entry. Middle-click resets any control to default.', tags:['color','grade','lgg','curves','professional'] },
  'ColorCurves':      { short:'Adjusts image tonality using a free-draw spline curve per channel.', detail:'Draw custom tone curves for R, G, B, and composite luminance. More flexible than Lift/Gamma/Gain for unusual grade shapes. Useful for creative looks and precise tonal control.', inputs:[['Input','Image'],['Mask','Optional mask']], outputs:['Output'], tags:['color','curves','grade','creative'] },
  'ColorGain':        { short:'Simple multiplicative colour scaling per RGB channel and master gain.', detail:'Multiplies image values by a gain factor. Unlike BrightnessContrast, gain is multiplicative so it preserves relative tonality. Use for quick exposure adjustments or channel balancing.', inputs:[['Input','Image'],['Mask','Optional mask']], outputs:['Output'], tags:['color','gain','exposure'] },
  'ColorMatrix':      { short:'Applies a custom 3×3 or 4×4 colour transformation matrix.', detail:'For technical colour space transformations, creative matrix grades, or cross-talk between channels. Advanced use — most artists don\'t need this. Used in colour science workflows and custom LUT approximation.', inputs:[['Input','Image']], outputs:['Output'], tags:['color','matrix','technical','colorspace'] },
  'ColorSpace':       { short:'Converts between colour spaces (sRGB, Linear, Log, etc.).', detail:'Essential in HDR and VFX workflows where you need to move between gamma-corrected and linear light. Apply at the beginning and end of composite chains to work in linear space.', inputs:[['Input','Image']], outputs:['Output'], tip:'Always composite in linear light — convert from log/gamma at the start, convert back at the end.', tags:['color','colorspace','linear','log','gamma'] },
  'Copy':             { short:'Copies channels from one image into another image\'s channels.', detail:'Surgical channel transplant — take the red channel from one image and put it in the alpha of another, for example. Supports any to any channel routing. Essential for building custom mattes and multi-pass compositing.', inputs:[['Foreground','Source of channels to copy'],['Background','Destination image']], outputs:['Output'], tags:['color','channels','copy','composite'] },
  'Gamma':            { short:'Applies a gamma correction curve to the image.', detail:'Raises or lowers the gamma exponent. Values above 1 brighten midtones; below 1 darken them. Pure mathematical gamma — no S-curve, no highlight rolloff. Use for precise technical gamma correction.', inputs:[['Input','Image'],['Mask','Optional mask']], outputs:['Output'], tags:['color','gamma','grade'] },
  'HueCurves':        { short:'Adjusts hue, saturation, and luminance as a function of hue angle.', detail:'Six controls corresponding to six colour ranges (red, yellow, green, cyan, blue, magenta). For each range you can shift hue, pull saturation, or adjust luminance. The cleanest way to do targeted colour shifts.', inputs:[['Input','Image'],['Mask','Optional mask']], outputs:['Output'], tip:'Use to desaturate specific colours without touching others — great for selective teal-and-orange looks.', tags:['color','hue','saturation','selective'] },
  'LUTLoader':        { short:'Loads and applies a 1D or 3D LUT (look-up table) file to the image.', detail:'Supports .cube, .3dl, .mga and other LUT formats. Apply CDN-style looks, camera manufacturer LUTs, or custom look LUTs. 3D LUTs are applied in full 3D colour space, 1D LUTs per-channel only.', inputs:[['Input','Image']], outputs:['Output'], tip:'Apply LUTs at the end of your grade chain, after all other corrections.', tags:['color','lut','look','grade'] },
  'Ocio':             { short:'Applies OpenColorIO colour transforms for facility-standard colour management.', detail:'OCIO is the VFX industry standard colour management system used by all major compositing and rendering tools. Requires an OCIO config file. Used in high-end VFX pipelines for accurate colour consistency.', inputs:[['Input','Image']], outputs:['Output'], tags:['color','ocio','colormanagement','vfx','technical'] },
  'PseudoColor':      { short:'Maps luminance values to a false-colour gradient for visualisation.', detail:'Converts greyscale into a heatmap-style colour display. Essential for checking depth maps, motion vectors, and normal passes. Choose from presets (heat, rainbow, greyscale) or define a custom gradient.', inputs:[['Input','Greyscale or depth image']], outputs:['Output'], tip:'Use PseudoColor to visually inspect Z-depth passes — it\'s much clearer than greyscale.', tags:['color','false-color','visualise','technical'] },
  'RGBtoHSV':         { short:'Converts image from RGB colour space to Hue/Saturation/Value.', detail:'Splits the image into H, S, V components. After processing, convert back with HSVtoRGB. Useful for selective saturation control, hue rotation, or building custom colour effects.', inputs:[['Input','RGB image']], outputs:['Output'], tags:['color','hsv','colorspace','convert'] },
  'HSVtoRGB':         { short:'Converts image from HSV colour space back to RGB.', detail:'The counterpart to RGBtoHSV. Always use this after working in HSV space to return to RGB for downstream processing.', inputs:[['Input','HSV image']], outputs:['Output'], tags:['color','hsv','colorspace','convert'] },
  'SetAlpha':         { short:'Sets, replaces, or derives the alpha channel of an image.', detail:'Takes a separate image or channel and applies it as the alpha of the output. Use to apply a rendered matte to a beauty pass, or to create a premultiplied image from separate RGB and alpha renders.', inputs:[['Image','Image to set alpha on'],['Alpha','Alpha source image']], outputs:['Output'], tags:['color','alpha','matte','composite'] },
  'Threshold':        { short:'Converts the image to binary black/white based on a luminance threshold.', detail:'Everything above the threshold becomes white, everything below becomes black. Creates hard-edged mattes from greyscale images. Useful as a starting point for spill mattes or simple garbage mattes.', inputs:[['Input','Image'],['Mask','Optional mask']], outputs:['Output'], tags:['color','threshold','matte','binary'] },
  'WhiteBalance':     { short:'Adjusts colour temperature and tint to correct or set the white balance.', detail:'Corrects casts from tungsten, fluorescent, or mixed light sources. Set the target neutral and Fusion calculates the correction. Also useful for creative colour temperature effects.', inputs:[['Input','Image to balance'],['Mask','Optional mask']], outputs:['Output'], tags:['color','whitebalance','temperature','grade'] },
  'Highlight':        { short:'Isolates and processes bright highlights in the image independently.', detail:'Allows you to modify only the highlight areas with separate blend mode and opacity. Good for taming overexposed areas, adding bloom selectively, or creating highlight-only colour shifts.', inputs:[['Input','Image'],['Mask','Optional mask']], outputs:['Output'], tags:['color','highlights','grade'] },
  'HueSaturation':    { short:'Adjusts overall or per-channel hue rotation and saturation.', detail:'Simple but effective. Rotate all hues, boost or pull saturation for the whole image, or adjust luminance. Faster and simpler than ColorCorrector for quick saturation or hue-shift adjustments.', inputs:[['Input','Image'],['Mask','Optional mask']], outputs:['Output'], tags:['color','hue','saturation','grade'] },

  // ── Composite ───────────────────────────────────────────────────────────
  'Dissolve':         { short:'Cross-fades between two images based on a blend factor or mask.', detail:'A simple linear mix between foreground and background. The most straightforward blend operation. Use for transitions, fades between layers, or combining two images at varying opacity.', inputs:[['Foreground','First image'],['Background','Second image'],['Mask','Optional mask']], outputs:['Output'], tags:['composite','blend','transition'] },
  'Merge':            { short:'The primary compositing node — combines two layers using a blend mode.', detail:'The workhorse of compositing. Stacks foreground over background using normal (alpha over) by default. Supports all standard blend modes: Screen, Multiply, Add, Overlay, etc. Control opacity, apply per-pixel alpha, and gain.', inputs:[['Foreground','Layer on top'],['Background','Layer beneath'],['Mask','Optional mask']], outputs:['Output'], tip:'Ctrl+click a Merge node to quickly swap foreground and background.', supportsInstancing: true, tags:['composite','blend','alpha','over'] },
  'MatteControl':     { short:'Controls, modifies, and cleans up matte channels.', detail:'The post-processing node for keyed mattes. Erode/dilate the matte edge, blur the edge for softness, adjust garbage matte, boost contrast in the matte, and view the matte in isolation. Always use after a Keyer node.', inputs:[['Input','Image with matte'],['Garbage','Optional garbage matte to cut hole']], outputs:['Output'], tip:'Always view your matte in isolation (Channel → Alpha) when cleaning it up.', tags:['composite','matte','keying','edge'] },
  'MultiMerge':       { short:'Merges up to unlimited inputs in a single node — avoids long merge chains.', detail:'Drag multiple layers into MultiMerge instead of chaining many Merge nodes. Supports individual opacity and blend mode per input. Cleaner flow when stacking many elements.', inputs:[['Input1..N','Multiple layers to merge']], outputs:['Output'], tags:['composite','merge','layers'] },
  'Over':             { short:'Composite foreground over background using the foreground\'s alpha channel.', detail:'The standard alpha-over compositing operation. Requires a clean, premultiplied alpha on the foreground. Mathematically identical to Merge in Normal mode but labelled more explicitly.', inputs:[['Foreground','Layer with alpha'],['Background','Background plate']], outputs:['Output'], tags:['composite','alpha','over'] },
  'Gain':             { short:'Multiplies the image\'s RGBA values by a gain factor.', detail:'A simple multiplier on all channels. Use to quickly scale down an element before compositing, or to match brightness between layers. Different from BrightnessContrast in that it scales multiplicatively.', inputs:[['Input','Image'],['Mask','Optional mask']], outputs:['Output'], tags:['composite','gain','blend'] },
  'Screen':           { short:'Composites two images using the Screen blend mode — brightens without clipping.', detail:'Screen inverts both images, multiplies them, then inverts again. The result is always brighter than either input. Perfect for adding fire, sparks, lens flares, light leaks, and smoke over footage.', inputs:[['Foreground','Element to screen'],['Background','Plate']], outputs:['Output'], tip:'Screen is the go-to blend mode for any additive VFX element like fire or sparks.', tags:['composite','screen','blend','additive'] },
  'Soft':             { short:'A soft light blend mode composite — enhances contrast while maintaining colour.', detail:'Combines two images using the soft-light blend mode. Brightens the background where the foreground is bright, darkens where foreground is dark. Creates a contrast-enhancing, colour-preserving look.', inputs:[['Foreground','Blend source'],['Background','Base image']], outputs:['Output'], tags:['composite','blend','soft-light'] },
  'Under':            { short:'Places the foreground behind the background using its alpha.', detail:'The reverse of Over. Foreground is composited beneath the background. Useful for building up layers from back to front, or when the new element should appear behind existing ones.', inputs:[['Foreground','Layer to go behind'],['Background','Existing layers']], outputs:['Output'], tags:['composite','alpha','under'] },
  'UseMatte':         { short:'Applies a matte from one input to control the transparency of another image.', detail:'Takes the alpha/matte from the FG input and uses it to define transparency on the BG input image. Useful when your matte and image are coming from different sources and need to be combined.', inputs:[['Foreground','Source of the matte'],['Background','Image to apply matte to']], outputs:['Output'], tags:['composite','matte','alpha'] },
  'AlphaMaskReplace': { short:'Replaces alpha channel in one image with the alpha from another.', detail:'Specifically transplants the alpha channel. Unlike Copy node, this is a dedicated shortcut for alpha replacement with optional invert. Common in multi-pass rendering workflows.', inputs:[['Image','Image receiving the new alpha'],['Alpha Source','Image providing the alpha']], outputs:['Output'], tags:['composite','alpha','matte','channels'] },
  'LayerMerge':       { short:'Merges a stack of layers as a flat composition in a single node.', detail:'Like a layer stack in After Effects — each input has its own blend mode, opacity, and order. More intuitive than chaining Merge nodes for multi-layer work.', inputs:[['Inputs','Multiple layers']], outputs:['Output'], tags:['composite','layers','blend','stack'] },
  'PremultiplyAlpha': { short:'Pre-multiplies the RGB channels by the alpha to prepare for compositing.', detail:'Straight alpha (un-premultiplied) RGB has full values everywhere even in transparent areas. Pre-multiplied alpha scales RGB by alpha, preventing fringing on edges. Required for correct alpha-over operations.', inputs:[['Input','Straight alpha image']], outputs:['Output'], tags:['composite','alpha','premultiply'] },

  // ── Creator ─────────────────────────────────────────────────────────────
  'Background':       { short:'Creates a solid colour, gradient, or noise fill image.', detail:'The simplest image source. Generate flat colour cards, gradients (linear, radial, cross), or noise patterns. Use as backgrounds, mattes, or combine with other generators. Resolution follows composition settings.', inputs:[], outputs:['Output'], tags:['creator','background','solid','generator'] },
  'FastNoise':        { short:'Generates procedural noise patterns — plasma, cauliflower, wisps, and more.', detail:'The most versatile noise generator in Fusion. Multiple noise types (fast, turbulent, wispy) with controls for scale, detail, evolution (animation), and contrast. Outputs can be used directly as textures or as displacement maps.', inputs:[['Mask','Optional mask']], outputs:['Output'], tip:'Animate the Z-depth parameter to evolve the noise over time for cloud/smoke animation.', tags:['creator','noise','procedural','texture','generator'] },
  'Gradient':         { short:'Creates a 2D gradient image with full control over colour stops.', detail:'Radial, linear, reflected, cross, or square gradient shapes. Add unlimited colour stops with full alpha support. Animate stop positions for moving gradient effects.', inputs:[], outputs:['Output'], tags:['creator','gradient','generator'] },
  'Mandelbrot':       { short:'Renders the Mandelbrot fractal set — for abstract visuals and backgrounds.', detail:'Generates mathematically precise fractal imagery. Control zoom, position, iteration count, and colour mapping. Can create extraordinary complexity from simple parameters. Performance-intensive at high iterations.', inputs:[], outputs:['Output'], tags:['creator','fractal','abstract','generator'] },
  'Text+':            { short:'Creates 2D text with full typographic control — fonts, styles, layouts, animation.', detail:'The primary text node for Fusion. Supports any installed font, multiline text, per-character colour and transforms, path-based text, and follower animation. Use for titles, lower thirds, captions, and animated typography.', inputs:[['Mask','Optional mask']], outputs:['Output'], tip:'Right-click any parameter to add a Follower modifier for cascading character animation.', tags:['creator','text','typography','titles','generator'] },
  'Plasma':           { short:'Generates animated plasma/interference patterns using multiple sine waves.', detail:'Creates classic plasma effects from overlapping sine waves. Control frequency, phase, amplitude, and colour for each wave. Useful for energy field effects, abstract motion backgrounds, and sci-fi displays.', inputs:[], outputs:['Output'], tags:['creator','plasma','abstract','animated','generator'] },
  'pSphere':          { short:'Creates a particle sphere emitter — the starting point for a particle system.', detail:'One of several particle emitters. Creates particles emitting from a sphere shape. Connect to pRender to visualise. All particle nodes require a pRender at the end of the chain.', inputs:[], outputs:['Output (Particle)'], tags:['particle','creator','emitter','generator'] },

  // ── Effect ───────────────────────────────────────────────────────────────
  'DomainWarp':       { short:'Warps image coordinates using noise for organic, fluid distortions.', detail:'Domain warping applies noise to the sampling coordinates rather than the pixel values, creating flowing, organic distortion. Excellent for fire distortion, heat haze, and morphing effects.', inputs:[['Input','Image to warp']], outputs:['Output'], tip:'Animate Evolution to create flowing, animated warp effects.', tags:['effect','warp','distortion','noise'] },
  'Emboss':           { short:'Creates an embossed relief effect from image detail.', detail:'Simulates the look of embossed paper or relief printing by converting image contrast into directional shading. Produces a raised or sunken appearance depending on the light angle setting.', inputs:[['Input','Image']], outputs:['Output'], tags:['effect','emboss','stylise'] },
  'Erode':            { short:'Shrinks bright areas / grows dark areas in an image or matte.', detail:'Morphological erosion operation. On a matte, it shrinks the white area (erodes the edge inward). On a colour image it darkens edges. Often used for matte shrinking and edge processing.', inputs:[['Input','Image or matte'],['Mask','Optional mask']], outputs:['Output'], tags:['effect','erode','matte','morphology'] },
  'Grow':             { short:'Expands bright areas / shrinks dark areas in an image or matte.', detail:'Morphological dilation. On a matte, white areas expand outward. On a colour image, highlights grow. Used to expand mattes, add edge halo effects, or grow highlight areas.', inputs:[['Input','Image or matte']], outputs:['Output'], tags:['effect','grow','dilate','matte','morphology'] },
  'HardLight':        { short:'Composites using the Hard Light blend mode for punchy, contrast-heavy looks.', detail:'Hard Light combines Screen and Multiply based on the foreground luminance. Values above 50% screen onto the background; below 50% multiply. Creates a strong contrast effect.', inputs:[['Foreground','Blend image'],['Background','Base image']], outputs:['Output'], tags:['effect','blend','hard-light'] },
  'Rays':             { short:'Simulates light rays / god rays emanating from a bright source.', detail:'Creates volumetric-looking light ray streaks from bright areas of the image. Control the source point, ray length, density, and colour. Essential for sun-through-clouds, spotlight, or halo effects.', inputs:[['Input','Image with bright source']], outputs:['Output'], tip:'Apply after a Glow node for a more convincing layered light effect.', tags:['effect','rays','light','god-rays','volumetric'] },
  'Reflect':          { short:'Flips and blends a reflection of the image below itself.', detail:'Creates a mirror reflection below the original image — often used for logo reflections, water reflections, or ground plane reflections in 2D compositing.', inputs:[['Input','Image to reflect']], outputs:['Output'], tags:['effect','reflection','flip','mirror'] },
  'Scanline':         { short:'Applies a CRT scanline pattern to simulate old television screens.', detail:'Darkens alternating horizontal lines to simulate the interlaced appearance of CRT monitors. Control line width, brightness, and a subtle sine wave modulation for colour bleeding.', inputs:[['Input','Image']], outputs:['Output'], tags:['effect','scanline','retro','crt'] },
  'Solarize':         { short:'Inverts tones above a threshold — a photographic solarisation effect.', detail:'Based on the darkroom solarisation technique (Sabattier effect). Tones above the threshold are inverted, creating a distinctive dual-tone look. Often used for creative art direction and retro aesthetics.', inputs:[['Input','Image']], outputs:['Output'], tags:['effect','solarize','invert','creative'] },
  'Trails':           { short:'Creates motion trails by blending the current frame with previous frames.', detail:'Each frame is blended with a held, fading version of previous frames. Creates motion smear and ghosting. Adjust the decay rate to control how quickly the trail fades. Works in proxy or RAM preview only.', inputs:[['Input','Image stream']], outputs:['Output'], tip:'Trails requires playback — it won\'t show in a single frame render.', tags:['effect','trails','motion','time'] },
  'TV':               { short:'Simulates a TV monitor with barrel distortion, scanlines, and RGB bleed.', detail:'A comprehensive retro TV simulation node. Applies barrel distortion, scanlines, chromatic aberration, and noise simultaneously. Good for screen replacement into vintage monitors or retro visual styles.', inputs:[['Input','Image']], outputs:['Output'], tags:['effect','tv','retro','simulation'] },
  'VideoWall':        { short:'Creates a multi-screen video wall effect with a grid of offset clips.', detail:'Tiles the image across a grid with individual timing offsets per cell. Useful for video wall simulations, split-screen effects, and creative grid compositions.', inputs:[['Input','Image to tile']], outputs:['Output'], tags:['effect','wall','grid','tiles'] },
  'WaveDistortion':   { short:'Distorts the image using sine wave-based ripple patterns.', detail:'Applies horizontal, vertical, or radial sine wave distortion. Control amplitude, frequency, phase, and animation. Classic use: water ripple, heat haze, and signal interference effects.', inputs:[['Input','Image to distort'],['Mask','Optional mask']], outputs:['Output'], tags:['effect','wave','distortion','ripple'] },

  // ── Filter ───────────────────────────────────────────────────────────────
  'BandedSwirl':      { short:'Creates a spiral swirl distortion with concentric band structure.', detail:'Applies a rotational distortion emanating from a centre point with periodic banding. Creates psychedelic swirl patterns or stylised warp effects.', inputs:[['Input','Image']], outputs:['Output'], tags:['filter','swirl','distortion','warp'] },
  'Cartoon':          { short:'Applies a cartoon/toon-shading look to photographic images.', detail:'Reduces the image to flat colour areas with hard edges, simulating a hand-drawn or cel-animation appearance. Control edge threshold and colour simplification.', inputs:[['Input','Image']], outputs:['Output'], tags:['filter','cartoon','stylise','toon'] },
  'ChromaticAberration':{ short:'Simulates the colour fringing caused by lens chromatic aberration.', detail:'Separates the red, green, and blue channels by small amounts to simulate how real lenses disperse light differently per wavelength. Adds realism to CG elements or a lo-fi aesthetic to clean footage.', inputs:[['Input','Image']], outputs:['Output'], tip:'Even a very subtle amount (0.5–1px) of chromatic aberration makes CG look much more organic.', tags:['filter','lens','aberration','chromatic','realism'] },
  'ColorNoise':       { short:'Adds photographic noise or grain to the image.', detail:'Adds luminance or colour noise to match film grain or digital camera noise. Supports per-channel noise, temporal noise variation, and noise size control. Essential for matching CG to live action.', inputs:[['Input','Image']], outputs:['Output'], tip:'Always add noise last in your comp — noise on composited elements before blending looks artificial.', tags:['filter','noise','grain','film','realism'] },
  'CornerPin':        { short:'Pins and warps an image to four corner points for screen replacement.', detail:'Move the four corners independently to match perspective-distorted surfaces. The go-to node for screen replacements, sign tracking, and surface texturing. Combine with a Planar Tracker for automated tracking.', inputs:[['Input','Image to warp'],['Background','Optional background to preview against']], outputs:['Output'], tip:'Use a CornerPin with Planar Tracker output for fully automatic screen replacement.', tags:['filter','cornerpin','perspective','screen-replacement','tracking'] },
  'DVE':              { short:'Digital Video Effect — 2D transform node for position, rotation, scale, and crop.', detail:'An all-in-one 2D transformation node. Position, rotate, scale, flip, and crop in a single node. Includes pivot control, edge behaviour (reflect, wrap, black), and motion blur. The first node to reach for when repositioning an element.', inputs:[['Input','Image to transform'],['Mask','Optional mask']], outputs:['Output'], tags:['filter','transform','2d','position','scale'] },
  'EdgeDetect':       { short:'Detects and isolates edges in an image.', detail:'Uses a convolution filter to find areas of rapid brightness change. Output is a edge map — white lines on black where edges exist. Useful for toon effects, technical masks, glow-on-edges, and custom filters.', inputs:[['Input','Image']], outputs:['Output'], tags:['filter','edge','detect','outline'] },
  'FilmEffect':       { short:'Applies a full film simulation: grain, blur, vignette, and colour shift.', detail:'One-stop film simulation. Adds grain matched to film stocks, a subtle soft focus, desaturation in shadows, and a slight warm or cool shift. Saves building all of these manually.', inputs:[['Input','Image']], outputs:['Output'], tags:['filter','film','grain','simulation','grade'] },
  'FieldMerge':       { short:'Combines two interlaced fields into a single progressive frame.', detail:'When working with interlaced video, FieldMerge combines the odd and even fields correctly. Required when mixing interlaced source material with progressive compositing.', inputs:[['Field1','First field'],['Field2','Second field']], outputs:['Output'], tags:['filter','interlace','field','technical'] },
  'Gridwarp':         { short:'Warps the image using a deformable grid of control points.', detail:'Places a grid over the image with movable control points. Drag points to warp the image in a smooth, organic way. Useful for head replacement, limb repositioning, body morphing, and face adjustments.', inputs:[['Input','Image to warp'],['Reference','Optional undistorted reference']], outputs:['Output'], tip:'Right-click a point to add more grid divisions in that area for finer control.', tags:['filter','warp','grid','deform','morph'] },
  'LensDistortion':   { short:'Applies or removes barrel/pincushion lens distortion.', detail:'Corrects or applies radial distortion characteristic of wide-angle or telephoto lenses. Use to undistort footage before compositing, or to add natural lens distortion to CG renders.', inputs:[['Input','Image']], outputs:['Output'], tip:'Use to match lens distortion between plates and CG before compositing.', tags:['filter','lens','distortion','undistort'] },
  'Noise':            { short:'Generates or adds random noise with multiple algorithms.', detail:'More algorithms than ColorNoise — includes Gaussian, uniform, and structured noise types. Can be used to generate textures, add organic variation to clean graphics, or create data visualisation effects.', inputs:[['Input','Optional base image'],['Mask','Optional mask']], outputs:['Output'], tags:['filter','noise','grain','texture'] },
  'OpenCLKernel':     { short:'Runs a custom OpenCL GPU shader for hardware-accelerated image processing.', detail:'Advanced. Write your own GPU code to process images at full hardware speed. Requires GPU programming knowledge. Used in VFX pipelines for custom algorithms that aren\'t available as built-in nodes.', inputs:[['Input','Image to process']], outputs:['Output'], tags:['filter','opencl','gpu','custom','advanced'] },
  'PipeRouter':       { short:'Routes image connections without modifying the image — for cleaner flow layout.', detail:'A passthrough node. The image passes through unchanged. Used purely for tidying up the node graph — routing connections around the canvas without affecting processing.', inputs:[['Input','Image']], outputs:['Output'], tags:['filter','routing','utility','flow'] },
  'Pseudo':           { short:'Replaces pixel colours with procedurally generated replacement colours.', detail:'A colour effect that maps the original image colours to a new colour palette using a gradient. Creates posterised, thermal-camera, or false-colour looks.', inputs:[['Input','Image']], outputs:['Output'], tags:['filter','color','pseudo','effect'] },
  'Resize':           { short:'Resizes or resamples the image to a new resolution.', detail:'Change image dimensions with control over filter quality (bicubic, lanczos, etc.). Supports lock-aspect, letter/pillarbox, and various edge behaviours. Use for format conversion or downsampling proxies.', inputs:[['Input','Image to resize']], outputs:['Output'], tags:['filter','resize','resolution','scale'] },
  'Stabilize':        { short:'Analyzes and removes camera shake or motion from footage.', detail:'Tracks a point or region and applies counter-animation to stabilize it. Options for position only, position + rotation, or full transformation. Crop mode removes the black borders.', inputs:[['Input','Unstable footage']], outputs:['Output'], tip:'Always stabilize on a clean, high-contrast feature — avoid sky or soft areas.', tags:['filter','stabilize','tracking','motion'] },

  // ── Flow ────────────────────────────────────────────────────────────────
  'ChangeDepth':      { short:'Changes the bit depth of the image (8-bit, 16-bit, 32-bit float).', detail:'Controls the precision of the image data flowing through the tree. 32-bit float is lossless and required for HDR work. 8-bit is fastest but clips. Drop to 8-bit for output nodes that require it.', inputs:[['Input','Image']], outputs:['Output'], tags:['flow','depth','bitdepth','technical'] },
  'CustomTool':       { short:'Runs custom Lua expressions per pixel for completely custom image processing.', detail:'The most flexible node in Fusion. Write pixel-level Lua code to implement any image operation. Slower than GPU nodes but can do anything. Used for custom effects, technical tools, and pipeline utilities.', inputs:[['Input1..4','Up to 4 input images']], outputs:['Output'], tip:'Start simple — display a single channel, then build complexity incrementally.', tags:['flow','custom','lua','code','advanced'] },
  'TimeSpeed':        { short:'Retimes footage by changing the playback speed with frame interpolation.', detail:'Speed up, slow down, or reverse footage. Frame interpolation options include duplicate frame, blend, and optical flow. Optical flow creates smooth slow-motion but can artifact on complex motion.', inputs:[['Input','Footage to retime']], outputs:['Output'], tags:['flow','time','retime','slow-motion'] },

  // ── I/O ─────────────────────────────────────────────────────────────────
  'Loader':           { short:'Imports an image sequence or video file into the composition.', detail:'The primary way to bring footage into Fusion. Supports virtually all image formats and video files. Set in/out points, channel mapping, colour space, and proxy settings. Multiple Loaders can run simultaneously.', inputs:[], outputs:['Output'], tip:'Use EXR sequences rather than video files for VFX work — lossless and more flexible.', tags:['io','import','load','footage'] },
  'Saver':            { short:'Exports the composition output to an image sequence or video file.', detail:'Writes frames to disk. Support for all major formats including EXR, TIFF, JPEG, PNG, and video containers. Set file path, format, compression, and render range. Required to export your comp.', inputs:[['Input','Image to save']], outputs:[], tip:'Save as EXR with full float precision to preserve all comp data for later re-grading.', tags:['io','export','save','render','output'] },
  'MediaIn':          { short:'Brings media from the DaVinci Resolve media pool into Fusion.', detail:'Fusion-page specific. Accesses clips, images, or generators from the Resolve media pool and timeline without loading external files. Automatically updates when source media changes.', inputs:[], outputs:['Output'], tags:['io','resolve','media','input'] },
  'MediaOut':         { short:'Outputs the Fusion composition result back to the DaVinci Resolve timeline.', detail:'The final node required when working on the Fusion page inside DaVinci Resolve. Connect your finished comp to MediaOut to see the result on the timeline. Replaces Saver in the Resolve workflow.', inputs:[['Input','Final comp image']], outputs:[], tags:['io','resolve','output','timeline'] },
  'pRenderData':      { short:'Passes particle system data for rendering — connects particle nodes to output.', detail:'Bridge node between the particle system and a visual renderer. Required to convert particle data into a rendered image or to feed particles into 3D nodes.', inputs:[['ParticleInput','Particle system']], outputs:['Output'], tags:['io','particle','render'] },
  'pEmitter':         { short:'Generates particles from an image region or point.', detail:'A basic particle emitter. Particles originate from a defined region. Connect pSphere, pLine, or other emitters to specialise the shape. Always end the particle chain with pRender.', inputs:[['Image','Optional image for particle appearance'],['RegionInput','Optional emission region']], outputs:['Output (Particle)'], tags:['io','particle','emitter'] },

  // ── Keyer ────────────────────────────────────────────────────────────────
  'ChromaKeyer':      { short:'Keys out a colour (green/blue screen) to create a matte.', detail:'Samples a background colour (typically green or blue) and removes it, generating an alpha channel. Basic but fast. Use LumaMatte or PrimateCore for more complex keying work.', inputs:[['Input','Green/blue screen footage']], outputs:['Output'], tip:'Pre-grade your plate to even out screen luminance before keying for best results.', tags:['keyer','greenscreen','bluescreen','matte'] },
  'DeltaKeyer':       { short:'A professional keyer that uses colour difference and spill suppression.', detail:'Fusion\'s most capable keyer. Uses the colour difference method for clean keys, has built-in spill suppression, edge quality controls, and pre/post matte processing. The best choice for challenging green screen shots.', inputs:[['Input','Screen footage'],['Background','Optional background for spill calc']], outputs:['Output'], tip:'DeltaKeyer\'s spill suppression is excellent — use it before MatteControl for the cleanest results.', tags:['keyer','greenscreen','bluescreen','professional','matte'] },
  'LumaMatte':        { short:'Creates a matte based on the luminance (brightness) of the image.', detail:'Extracts a matte based on image brightness rather than colour. Black and dark areas become transparent. Useful for smoke, steam, fire, and other elements where colour-based keying won\'t work.', inputs:[['Input','Image to key by luminance'],['Mask','Optional mask']], outputs:['Output'], tags:['keyer','luma','matte','smoke','fire'] },
  'UltraKeyer':       { short:'An advanced screen keyer with sophisticated edge and detail recovery.', detail:'More accurate than ChromaKeyer for difficult footage. Recovers fine detail in hair and transparent elements. Uses statistical analysis of the clean screen area for better key accuracy.', inputs:[['Input','Screen footage']], outputs:['Output'], tags:['keyer','greenscreen','professional','hair','detail'] },
  'Primatte':         { short:'Port of the industry-standard Primatte keying algorithm.', detail:'Primatte is one of the gold-standard keyers in VFX, originally from After Effects and Nuke. Uses the Primatte algorithm\'s ability to handle multiple background colours and uneven screens. Excellent for challenging footage.', inputs:[['Input','Screen footage']], outputs:['Output'], tags:['keyer','greenscreen','primatte','professional','vfx'] },
  'KeyMix':           { short:'Mixes two images using a keyed matte — combines colour from one and matte from another.', detail:'Takes foreground colour from one input, background colour from another, and uses a keyed matte to composite them. A utility node for when your matte and colour come from different sources.', inputs:[['Foreground','Foreground colour source'],['Background','Background colour source'],['Matte','Key/matte input']], outputs:['Output'], tags:['keyer','matte','mix','composite'] },
  'BSplineBackground':{ short:'Draws a B-Spline (smooth curve) shape as a background or matte.', detail:'Creates a smooth organic shape defined by spline control points. Use as a matte, background fill, or isolate it and use as an alpha channel. Smoother than polygon masks.', inputs:[], outputs:['Output'], tags:['keyer','mask','spline','shape'] },
  'PolylineMask':     { short:'Creates a matte from a manually-drawn polyline (straight-edged polygon).', detail:'Draw a polygon with straight edges to isolate or mask an area. Faster to draw than BSpline. Good for hard-edged objects like buildings, signs, and geometric elements.', inputs:[], outputs:['Output (Mask)'], tags:['keyer','mask','polyline','polygon'] },
  'BSplineMask':      { short:'Creates a smooth matte from a B-Spline drawn shape.', detail:'Draw a smooth spline-based matte. Control points can be tensioned for curves of varying sharpness. Best for curved organic shapes — heads, shoulders, curved objects.', inputs:[], outputs:['Output (Mask)'], tags:['keyer','mask','spline','organic'] },
  'EllipseMask':      { short:'A simple circular or elliptical mask shape.', detail:'Draws an ellipse (or circle). Control centre, width, height, angle, and softness. Faster than drawing a spline for circular elements. Stack multiple ellipses to build complex shapes.', inputs:[], outputs:['Output (Mask)'], tags:['keyer','mask','ellipse','circle'] },
  'RectangleMask':    { short:'A simple rectangular mask shape.', detail:'Draws a rectangle or square with controllable softness. The fastest mask for rectangular areas. Control position, size, corner radius, and edge softness.', inputs:[], outputs:['Output (Mask)'], tags:['keyer','mask','rectangle','square'] },
  'WireRemoval':      { short:'Removes wires, rigs, and thin unwanted elements from footage.', detail:'Samples the background on each side of a wire and fills in the gap with an interpolated patch. Define the wire path and width. Works best on clean, steady plates. Multiple passes for crossing wires.', inputs:[['Input','Footage with wire to remove']], outputs:['Output'], tags:['keyer','wire-removal','cleanup','vfx'] },

  // ── Mask ────────────────────────────────────────────────────────────────
  'BitmapMask':       { short:'Uses an external image as a mask/matte channel.', detail:'Import any image and use its luminance as a mask for other nodes. White = fully affect, black = no affect. Great for using rendered ID passes, custom painted mattes, or any external mask source.', inputs:[['Input','Mask image source']], outputs:['Output (Mask)'], tags:['mask','bitmap','matte'] },
  'RectangleMask':    { short:'Rectangular mask with controllable softness.', detail:'Draws a rectangle matte. Use the four edge controls to adjust each side independently. Border softness applies a gradient to each edge. Stack with other masks using Add or Subtract mode.', inputs:[], outputs:['Output (Mask)'], tags:['mask','rectangle'] },
